name: Deploy Edge Functions
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy all agent functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          for d in supabase/functions/agent-*/ ; do
            name=$(basename "$d")
            echo "Deploying $name"
            supabase functions deploy "$name" --project-ref ndwvsrtyjnaddrifafqk
          done

