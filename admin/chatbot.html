let currentWidgetId = null;

window.generateChatbot = async function() {
  const leadId   = document.getElementById('leadSelect').value || null;
  const bizName  = document.getElementById('bizName').value.trim();
  const niche    = document.getElementById('nicheInput').value.trim();
  const city     = document.getElementById('cityInput').value.trim();
  const services = document.getElementById('servicesInput').value.trim().split(',').map(s=>s.trim()).filter(Boolean);
  const hours    = document.getElementById('hoursInput').value.trim();
  const faq      = document.getElementById('faqInput').value.trim();
  const email    = document.getElementById('alertEmail').value.trim();
  const color    = document.getElementById('brandColor').value;

  if (!bizName) { toast('Enter the business name first', 'warning'); return; }

  const btn = document.getElementById('generateBtn');
  btn.disabled = true; btn.textContent = '⟳ Creating…';

  // Save widget to DB
  const { data: widget, error } = await supabase.from('chatbot_widgets').insert({
    client_id:     clientId,
    lead_id:       leadId || null,
    business_name: bizName,
    niche, city,
    services,
    business_hours: hours,
    faq: faq || null,
    alert_email: email || null,
    brand_color: color,
    active: true,
    deployed_at: new Date().toISOString()
  }).select().single();

  if (error) {
    toast('DB error: ' + error.message, 'error');
    btn.disabled = false; btn.textContent = '🤖 Create AI Receptionist';
    return;
  }

  // Update lead record if linked
  if (leadId) {
    await supabase.from('leads').update({ chatbot_widget_id: widget.id }).eq('id', leadId);
  }

  currentWidgetId = widget.id;

  // Generate embed code
  const snippet = buildEmbedSnippet(widget.id, bizName, color);
  document.getElementById('embedCode').textContent = snippet;
  document.getElementById('embedCodeSection').style.display = '';
  document.getElementById('embedNotice').style.display = 'none';

  // Build preview
  buildPreview(widget.id, bizName, niche, services, color);

  toast(`✓ AI Receptionist created for ${bizName}!`, 'success');
  btn.disabled = false; btn.textContent = '🤖 Create AI Receptionist';
  await loadDeployed();
};

// ── Build embed snippet ───────────────────────────────────────
function buildEmbedSnippet(widgetId, bizName, color) {
  return `<!-- LeadFyn AI Receptionist — ${bizName} -->
<script>
(function(){
  var W='${widgetId}', C='${color}', B='${bizName.replace(/'/g,"\\'")}', U='${SUPABASE_URL}';
  var css='.lf-btn{position:fixed;bottom:24px;right:24px;width:58px;height:58px;border-radius:50%;background:'+C+';color:#fff;border:none;font-size:26px;cursor:pointer;z-index:9999;box-shadow:0 4px 24px rgba(0,0,0,.35);transition:transform .2s,box-shadow .2s}.lf-btn:hover{transform:scale(1.08);box-shadow:0 6px 32px rgba(0,0,0,.4)}.lf-panel{display:none;position:fixed;bottom:94px;right:24px;width:340px;height:500px;border-radius:18px;overflow:hidden;box-shadow:0 12px 50px rgba(0,0,0,.4);z-index:9999;flex-direction:column;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.lf-panel.open{display:flex}.lf-hdr{background:'+C+';padding:14px 16px;display:flex;align-items:center;gap:10px;color:#fff}.lf-msgs{flex:1;overflow-y:auto;padding:14px;background:#fff;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth}.lf-msg{max-width:82%;padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.5;animation:lfPop .2s ease}.lf-bot{align-self:flex-start;background:#f1f5f9;color:#1e293b;border-bottom-left-radius:4px}.lf-user{align-self:flex-end;background:'+C+';color:#fff;border-bottom-right-radius:4px}.lf-typing{align-self:flex-start;padding:10px 14px;background:#f1f5f9;border-radius:14px;border-bottom-left-radius:4px}.lf-dots span{display:inline-block;width:6px;height:6px;background:#94a3b8;border-radius:50%;margin:0 2px;animation:lfDot 1.2s infinite}.lf-dots span:nth-child(2){animation-delay:.2s}.lf-dots span:nth-child(3){animation-delay:.4s}.lf-bar{padding:10px 12px;background:#f8fafc;border-top:1px solid #e2e8f0;display:flex;gap:8px}.lf-input{flex:1;padding:9px 13px;border:1px solid #e2e8f0;border-radius:10px;font-size:14px;outline:none;color:#1e293b}.lf-input:focus{border-color:'+C+'}.lf-send{padding:9px 14px;background:'+C+';color:#fff;border:none;border-radius:10px;font-size:14px;cursor:pointer;font-weight:700}@keyframes lfPop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}@keyframes lfDot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}';
  var s=document.createElement('style');s.textContent=css;document.head.appendChild(s);
  var btn=document.createElement('button');btn.className='lf-btn';btn.title='Chat with us';btn.innerHTML='💬';document.body.appendChild(btn);
  var panel=document.createElement('div');panel.className='lf-panel';
  panel.innerHTML='<div class="lf-hdr"><div style="width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:18px">🤖</div><div style="flex:1"><div style="font-weight:700;font-size:15px">'+B+'</div><div style="font-size:11px;opacity:.8">AI Receptionist · Online now</div></div><button onclick="this.closest(\'.lf-panel\').classList.remove(\'open\')" style="background:none;border:none;color:#fff;font-size:22px;cursor:pointer;line-height:1;opacity:.8">×</button></div><div class="lf-msgs" id="lfMsgs"></div><div class="lf-bar"><input class="lf-input" id="lfInp" placeholder="Type a message…"><button class="lf-send" id="lfSend">Send</button></div>';
  document.body.appendChild(panel);
  var hist=[],vName='',vPhone='',greeted=false;
  function msg(role,txt){var d=document.createElement('div');d.className='lf-msg lf-'+role;d.textContent=txt;document.getElementById('lfMsgs').appendChild(d);document.getElementById('lfMsgs').scrollTop=99999;}
  function typing(){var d=document.createElement('div');d.className='lf-typing';d.id='lfTyping';d.innerHTML='<div class="lf-dots"><span></span><span></span><span></span></div>';document.getElementById('lfMsgs').appendChild(d);document.getElementById('lfMsgs').scrollTop=99999;return d;}
  async function send(){
    var inp=document.getElementById('lfInp'),txt=inp.value.trim();if(!txt)return;
    inp.value='';msg('user',txt);
    var t=typing();
    hist.push({role:'user',content:txt});
    try{
      var r=await fetch(U+'/functions/v1/chatbot-widget',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({widget_id:W,message:txt,history:hist.slice(-8),visitor_name:vName||undefined,visitor_phone:vPhone||undefined})});
      var j=await r.json();
      t.remove();
      var rep=j.reply||'Thanks for your message! We\\'ll be in touch shortly.';
      msg('bot',rep);
      hist.push({role:'assistant',content:rep});
      if(j.captured_name&&!vName)vName=j.captured_name;
      if(j.captured_phone&&!vPhone)vPhone=j.captured_phone;
    }catch(e){t.remove();msg('bot','Thanks for your message! Someone will be in touch shortly.');}
  }
  btn.onclick=function(){panel.classList.toggle('open');if(panel.classList.contains('open')&&!greeted){greeted=true;setTimeout(function(){msg('bot','Hi there! 👋 I\\'m the AI assistant for '+B+'. How can I help you today?\\n\\nAsk me about our services, pricing, or booking an appointment!');},300);}};
  document.getElementById('lfSend').onclick=send;
  document.getElementById('lfInp').addEventListener('keydown',function(e){if(e.key==='Enter')send();});
})();
<\/script>
<!-- End LeadFyn AI Receptionist -->`;
}

// ── Build iframe preview ──────────────────────────────────────
function buildPreview(widgetId, bizName, niche, services, color) {
  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
<style>*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}body{background:linear-gradient(135deg,#f0f9ff,#e0f2fe);min-height:100vh;display:flex;align-items:flex-end;justify-content:flex-end;padding:20px;}</style>
</head><body>
<div style="width:320px;height:460px;border-radius:18px;overflow:hidden;background:#fff;box-shadow:0 12px 50px rgba(0,0,0,.2);display:flex;flex-direction:column">
  <div style="background:${color};padding:14px;color:#fff;display:flex;align-items:center;gap:10px">
    <div style="width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:18px">🤖</div>
    <div><div style="font-weight:700;font-size:15px">${bizName}</div><div style="font-size:11px;opacity:.8">AI Receptionist · Online now</div></div>
  </div>
  <div id="msgs" style="flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px">
    <div style="background:#f1f5f9;color:#1e293b;max-width:82%;padding:10px 14px;border-radius:14px;border-bottom-left-radius:4px;font-size:13px;line-height:1.5">
      Hi there! 👋 I'm the AI assistant for ${bizName}. How can I help you today?<br><br>
      • Book an appointment<br>
      • Ask about services<br>
      • Request a callback
    </div>
    ${services.length > 0 ? `
    <div style="background:#f1f5f9;color:#1e293b;max-width:82%;padding:10px 14px;border-radius:14px;border-bottom-left-radius:4px;font-size:13px;line-height:1.5">
      We offer: <strong>${services.slice(0,3).join(', ')}</strong>${services.length > 3 ? ' and more!' : '.'}
    </div>` : ''}
  </div>
  <div style="padding:10px 12px;background:#f8fafc;border-top:1px solid #e2e8f0;display:flex;gap:8px">
    <input style="flex:1;padding:9px 13px;border:1px solid #e2e8f0;border-radius:10px;font-size:13px;background:#fff" placeholder="Type a message…" disabled>
    <button style="padding:9px 14px;background:${color};color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700">Send</button>
  </div>
</div>
</body></html>`;

  const container = document.getElementById('previewContainer');
  const blob = new Blob([html], { type: 'text/html' });
  container.innerHTML = `<iframe src="${URL.createObjectURL(blob)}" style="width:100%;height:480px;border:none;border-radius:12px"></iframe>`;
}

// ── Load deployed widgets ─────────────────────────────────────
async function loadDeployed() {
  const { data: widgets } = await supabase.from('chatbot_widgets')
    .select('*, leads(business_name)')
    .eq('client_id', clientId)
    .eq('active', true)
    .order('deployed_at', { ascending: false });

  const list = document.getElementById('deployedList');
  if (!widgets?.length) {
    list.innerHTML = '<p style="color:var(--color-text-muted);font-size:13px">No chatbots deployed yet.</p>';
    return;
  }

  const setupRev = widgets.length * 497;
  const monthlyRev = widgets.length * 97;
  document.getElementById('calcDeployed').textContent = widgets.length;
  document.getElementById('calcSetup').textContent = '$' + setupRev.toLocaleString();
  document.getElementById('calcMonthly').textContent = '$' + monthlyRev + '/mo';
  document.getElementById('calcAnnual').textContent = '$' + (setupRev + monthlyRev * 12).toLocaleString();

  list.innerHTML = widgets.map(w => `
    <div style="padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06);display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-size:13px;font-weight:600">${w.business_name}</div>
        <div style="font-size:11px;color:var(--color-text-muted)">${w.niche ?? '—'} · ${w.city ?? '—'}</div>
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        <span style="font-size:10px;padding:2px 7px;border-radius:10px;background:rgba(34,197,94,.1);color:#4ade80;font-weight:700">● Live</span>
        <button onclick="showEmbedForWidget('${w.id}','${w.business_name.replace(/'/g,"\\'")}','${w.brand_color ?? '#6366f1'}')"
          style="font-size:11px;padding:3px 9px;border-radius:6px;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.2);color:#a5b4fc;cursor:pointer">
          📋 Code
        </button>
      </div>
    </div>`).join('');
}

window.showEmbedForWidget = function(id, name, color) {
  const code = buildEmbedSnippet(id, name, color);
  modal(`${name} — Embed Code`,
    `<pre style="font-size:11px;background:rgba(0,0,0,.3);border-radius:8px;padding:12px;overflow-x:auto;white-space:pre-wrap;word-break:break-all;color:#a5b4fc;max-height:300px">${code}</pre>`,
    [{ label: '📋 Copy', action: () => { navigator.clipboard.writeText(code); toast('Copied!','success'); }},
     { label: 'Close', action: closeModal }]
  );
};

// ── Load chatbot logs ─────────────────────────────────────────
async function loadLogs() {
  const { data: logs } = await supabase.from('chatbot_logs')
    .select('*, chatbot_widgets(business_name)')
    .eq('client_id', clientId)
    .order('created_at', { ascending: false })
    .limit(50);

  const el = document.getElementById('logsList');
  if (!logs?.length) {
    el.innerHTML = '<p style="color:var(--color-text-muted);font-size:13px">No chatbot conversations yet. Deploy a chatbot and share the embed code with a client to start capturing leads.</p>';
    return;
  }

  const captured = logs.filter(l => l.captured);
  el.innerHTML = `
    <div style="display:flex;gap:16px;margin-bottom:16px;font-size:13px">
      <div style="padding:10px 16px;border-radius:10px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2)">
        <strong style="color:#4ade80;font-size:20px">${captured.length}</strong><br>
        <span style="color:var(--color-text-muted)">leads captured</span>
      </div>
      <div style="padding:10px 16px;border-radius:10px;background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.2)">
        <strong style="color:#a5b4fc;font-size:20px">${logs.length}</strong><br>
        <span style="color:var(--color-text-muted)">total chats</span>
      </div>
    </div>
    ${logs.map(l => `
      <div style="padding:12px 0;border-bottom:1px solid rgba(255,255,255,.05)">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
          <div style="font-size:12px;font-weight:600;color:var(--color-text-muted)">${l.chatbot_widgets?.business_name ?? '—'}</div>
          <div style="font-size:11px;color:var(--color-text-muted)">${new Date(l.created_at).toLocaleString()}</div>
        </div>
        <div style="font-size:13px;color:#e2e8f0;margin-bottom:4px">💬 ${l.visitor_message}</div>
        ${l.captured ? `<div style="font-size:12px;color:#4ade80;font-weight:700">✅ Lead captured — ${l.visitor_name} · ${l.visitor_phone}</div>` : ''}
      </div>`).join('')}`;
}

window.copyEmbed = function() {
  const code = document.getElementById('embedCode').textContent;
  navigator.clipboard.writeText(code).then(() => toast('Embed code copied!', 'success'));
};
</script>
</body>
</html>
