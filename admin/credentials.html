<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Connected Accounts — AutoFlow</title></head>
<body><div id="app">Loading…</div>
<script type="module">
import { requireAuth, getClientId, supabase, SUPABASE_URL } from '/shared/auth.js';
import { adminNav, injectSharedCSS, toast } from '/shared/ui.js';
import { getClient, updateClient } from '/shared/db.js';

injectSharedCSS();
await requireAuth('admin');
const clientId = await getClientId();
const client   = await getClient(clientId);
const { data:{ session } } = await supabase.auth.getSession();
const userEmail = session?.user?.email ?? '';

// ── Service definitions ───────────────────────────────────────
// type: 'oauth'  → one-click redirect
// type: 'apikey' → inline key input with a direct link to get the key
const SERVICES = [
  {
    section: 'Core (required)',
    items: [
      {
        id: 'google',
        label: 'Google · Gmail + Places',
        logo: 'https://www.google.com/favicon.ico',
        desc: 'Sends emails via your Gmail. Powers lead search via Places API.',
        type: 'oauth',
        provider: 'google',
        connectedField: 'gmail_access',   // truthy = connected
        scopes: ['gmail.send','cloud-platform'],
        color: '#4285F4'
      },
      {
        id: 'gemini_key',
        label: 'Gemini AI',
        logo: 'https://www.gstatic.com/lamda/images/gemini_favicon_f069958c85030456e93de685481c559f160ea06.svg',
        desc: 'AI copy generation. Free tier covers most usage.',
        type: 'apikey',
        placeholder: 'AIza…',
        keyUrl: 'https://aistudio.google.com/app/apikey',
        keyLinkText: 'Get free key →',
        color: '#1967D2'
      }
    ]
  },
  {
    section: 'Email Enrichment',
    items: [
      {
        id: 'hunter_key',
        label: 'Hunter.io',
        logo: 'https://hunter.io/favicon.ico',
        desc: 'Finds business email addresses. 25 free/month.',
        type: 'apikey',
        placeholder: 'xxxxxxxxxxxxxxxx',
        keyUrl: 'https://hunter.io/api-keys',
        keyLinkText: 'Get API key →',
        color: '#F97316'
      },
      {
        id: 'apollo_key',
        label: 'Apollo.io',
        logo: 'https://app.apollo.io/favicon.ico',
        desc: 'Email enrichment fallback. 50 free exports/month.',
        type: 'apikey',
        placeholder: 'xxxxxxxxxxxxxxxx',
        keyUrl: 'https://app.apollo.io/settings/integrations/api',
        keyLinkText: 'Get API key →',
        color: '#6366F1'
      }
    ]
  },
  {
    section: 'AI Engine (required)',
    items: [
      {
        id: 'claude_key',
        label: 'Claude (Anthropic) — required',
        logo: 'https://anthropic.com/favicon.ico',
        desc: 'Powers all 15 pipeline personas. Haiku for bulk copy (~$0.0003/call), Sonnet for replies/proposals (~$0.003/call).',
        type: 'apikey',
        placeholder: 'sk-ant-api03-…',
        keyUrl: 'https://console.anthropic.com/settings/keys',
        keyLinkText: 'Get API key →',
        color: '#C77B47'
      }
    ]
  },
  {
    section: 'Social Channels',
    items: [
      {
        id: 'facebook',
        label: 'Facebook',
        logo: 'https://www.facebook.com/favicon.ico',
        desc: 'DM leads via Facebook Messenger.',
        type: 'oauth_external',
        oauthField: 'facebook_access',
        setupUrl: 'https://developers.facebook.com/apps/',
        setupNote: 'Requires a Facebook App with Messenger permission',
        color: '#1877F2'
      },
      {
        id: 'instagram',
        label: 'Instagram',
        logo: 'https://www.instagram.com/favicon.ico',
        desc: 'DM leads via Instagram Direct.',
        type: 'oauth_external',
        oauthField: 'instagram_access',
        setupUrl: 'https://developers.facebook.com/apps/',
        setupNote: 'Uses same Meta app as Facebook',
        color: '#E1306C'
      },
      {
        id: 'linkedin',
        label: 'LinkedIn',
        logo: 'https://www.linkedin.com/favicon.ico',
        desc: 'Connect with leads on LinkedIn.',
        type: 'oauth_external',
        oauthField: 'linkedin_access',
        setupUrl: 'https://www.linkedin.com/developers/apps',
        setupNote: 'Requires a LinkedIn App',
        color: '#0A66C2'
      }
    ]
  },
  {
    section: 'Other Channels (optional)',
    items: [
      {
        id: 'twilio_sid',
        label: 'Twilio (SMS)',
        logo: 'https://www.twilio.com/favicon.ico',
        desc: 'Send SMS to leads with phone numbers. ~$0.0079/SMS.',
        type: 'apikey_multi',
        fields: [
          { id:'twilio_sid',   label:'Account SID', placeholder:'ACxxxxxxxxxxxxxxxx' },
          { id:'twilio_token', label:'Auth Token',  placeholder:'xxxxxxxxxxxxxxxx'   },
          { id:'twilio_from',  label:'From Number', placeholder:'+1xxxxxxxxxx'       }
        ],
        keyUrl: 'https://console.twilio.com/',
        keyLinkText: 'Open Twilio console →',
        color: '#F22F46'
      },
      {
        id: 'lob_key',
        label: 'Lob.com (Direct Mail)',
        logo: 'https://www.lob.com/favicon.ico',
        desc: 'Sends postcards to high-score leads (≥8). ~$0.88/postcard.',
        type: 'apikey',
        placeholder: 'live_xxxx…',
        keyUrl: 'https://dashboard.lob.com/settings/api-keys',
        keyLinkText: 'Get API key →',
        color: '#0069FF'
      },
      {
        id: 'vercel_token',
        label: 'Vercel',
        logo: 'https://vercel.com/favicon.ico',
        desc: 'Deploy AI-generated websites for leads.',
        type: 'apikey',
        placeholder: 'xxxxxxxxxxxxxxxx',
        keyUrl: 'https://vercel.com/account/tokens',
        keyLinkText: 'Create token →',
        color: '#000000'
      }
    ]
  }
];

// ── Render ────────────────────────────────────────────────────
document.getElementById('app').innerHTML = `
  ${adminNav('Credentials')}
  <main class="main">
    <div class="page-header">
      <h1 class="page-title">Connected Accounts</h1>
      <p class="page-sub">Connect your accounts with one click. Keys are saved to your encrypted client profile — never in code.</p>
    </div>
    <div class="page-body">
      <div id="sections" style="max-width:760px"></div>
    </div>
  </main>`;

renderSections();

function renderSections() {
  document.getElementById('sections').innerHTML = SERVICES.map(section => `
    <div style="margin-bottom:28px">
      <div style="font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
                  color:var(--color-text-muted);margin-bottom:10px">${section.section}</div>
      <div style="display:flex;flex-direction:column;gap:10px">
        ${section.items.map(item => renderCard(item)).join('')}
      </div>
    </div>
  `).join('');
}

function isConnected(item) {
  if (item.type === 'oauth')          return !!client.gmail_access;
  if (item.type === 'oauth_external') return !!client[item.oauthField];
  if (item.type === 'apikey')         return !!client[item.id];
  if (item.type === 'apikey_multi')   return !!client[item.fields[0].id];
  return false;
}

function renderCard(item) {
  const connected = isConnected(item);
  const statusColor  = connected ? '#10B981' : 'var(--color-border)';
  const statusLabel  = connected ? 'Connected' : 'Not connected';
  const statusBg     = connected ? '#D1FAE5' : 'var(--color-surface)';
  const statusFg     = connected ? '#065F46' : 'var(--color-text-muted)';

  let actionHTML = '';

  if (item.type === 'oauth') {
    actionHTML = connected
      ? `<div style="display:flex;gap:8px;align-items:center">
           <span style="font-size:12px;color:#065F46">✓ ${userEmail}</span>
           <button class="conn-btn conn-btn--outline" onclick="disconnectGoogle()">Disconnect</button>
         </div>`
      : `<button class="conn-btn" style="background:${item.color}"
             onclick="connectGoogle()">
           <img src="${item.logo}" width="16" height="16" onerror="this.style.display='none'">
           Connect with Google
         </button>`;
  }

  else if (item.type === 'oauth_external') {
    actionHTML = connected
      ? `<div style="display:flex;gap:8px;align-items:center">
           <span style="font-size:12px;color:#065F46">✓ Connected</span>
           <button class="conn-btn conn-btn--outline" onclick="disconnect('${item.oauthField}')">Disconnect</button>
         </div>`
      : `<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
           <a href="${item.setupUrl}" target="_blank" class="conn-btn" style="background:${item.color};text-decoration:none">
             <img src="${item.logo}" width="16" height="16" onerror="this.style.display='none'">
             Set up ${item.label}
           </a>
           <span style="font-size:11px;color:var(--color-text-muted)">${item.setupNote}</span>
         </div>`;
  }

  else if (item.type === 'apikey') {
    actionHTML = `
      <div id="key-row-${item.id}" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        ${connected
          ? `<span style="font-size:12px;color:#065F46;font-family:monospace">✓ ••••••••${(client[item.id]??'').slice(-4)}</span>
             <button class="conn-btn conn-btn--outline" onclick="showKeyInput('${item.id}')">Update</button>
             <button class="conn-btn conn-btn--danger"  onclick="removeKey('${item.id}')">Remove</button>`
          : `<button class="conn-btn" style="background:${item.color}" onclick="showKeyInput('${item.id}')">
               Add API Key
             </button>
             <a href="${item.keyUrl}" target="_blank" style="font-size:12px;color:var(--color-accent)">${item.keyLinkText}</a>`
        }
      </div>
      <div id="key-input-${item.id}" style="display:none;margin-top:8px">
        <div style="display:flex;gap:8px">
          <input type="text" id="key-val-${item.id}" placeholder="${item.placeholder}"
            style="flex:1;padding:8px 12px;border:1px solid var(--color-border);border-radius:6px;font-size:13px;font-family:monospace">
          <button class="conn-btn" style="background:#10B981" onclick="saveKey('${item.id}')">Save</button>
          <button class="conn-btn conn-btn--outline" onclick="hideKeyInput('${item.id}')">Cancel</button>
        </div>
        <a href="${item.keyUrl}" target="_blank"
           style="font-size:11px;color:var(--color-accent);margin-top:4px;display:inline-block">${item.keyLinkText}</a>
      </div>`;
  }

  else if (item.type === 'apikey_multi') {
    const allSet = item.fields.every(f => !!client[f.id]);
    actionHTML = `
      <div id="key-row-${item.id}">
        ${allSet
          ? `<div style="display:flex;gap:8px;align-items:center">
               <span style="font-size:12px;color:#065F46">✓ All fields set</span>
               <button class="conn-btn conn-btn--outline" onclick="showMultiInput('${item.id}')">Update</button>
               <button class="conn-btn conn-btn--danger"  onclick="removeMultiKey('${item.id}','${item.fields.map(f=>f.id).join(',')}')">Remove</button>
             </div>`
          : `<div style="display:flex;gap:8px;align-items:center">
               <button class="conn-btn" style="background:${item.color}" onclick="showMultiInput('${item.id}')">Connect ${item.label}</button>
               <a href="${item.keyUrl}" target="_blank" style="font-size:12px;color:var(--color-accent)">${item.keyLinkText}</a>
             </div>`
        }
      </div>
      <div id="multi-input-${item.id}" style="display:none;margin-top:8px">
        ${item.fields.map(f => `
          <div style="margin-bottom:8px">
            <label style="font-size:11px;font-weight:600;color:var(--color-text-muted);display:block;margin-bottom:3px">${f.label}</label>
            <input type="text" id="mkey-${f.id}" placeholder="${f.placeholder}" value="${client[f.id]??''}"
              style="width:100%;padding:8px 12px;border:1px solid var(--color-border);border-radius:6px;font-size:13px;font-family:monospace;box-sizing:border-box">
          </div>`).join('')}
        <div style="display:flex;gap:8px;margin-top:4px">
          <button class="conn-btn" style="background:#10B981" onclick="saveMultiKey('${item.id}','${item.fields.map(f=>f.id).join(',')}')">Save</button>
          <button class="conn-btn conn-btn--outline" onclick="document.getElementById('multi-input-${item.id}').style.display='none'">Cancel</button>
          <a href="${item.keyUrl}" target="_blank" style="font-size:11px;color:var(--color-accent);align-self:center;margin-left:4px">${item.keyLinkText}</a>
        </div>
      </div>`;
  }

  return `
    <div class="service-card" style="border-left:3px solid ${statusColor}">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
        <img src="${item.logo}" width="20" height="20" style="border-radius:4px;flex-shrink:0" onerror="this.style.display='none'">
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:8px">
            <strong style="font-size:14px">${item.label}</strong>
            <span style="font-size:11px;padding:2px 8px;border-radius:8px;background:${statusBg};color:${statusFg};font-weight:600">${statusLabel}</span>
          </div>
          <div style="font-size:12px;color:var(--color-text-muted);margin-top:2px">${item.desc}</div>
        </div>
      </div>
      <div style="padding-left:32px">${actionHTML}</div>
    </div>`;
}

// ── Actions ───────────────────────────────────────────────────
window.connectGoogle = async function() {
  const { error } = await supabase.auth.signInWithOAuth({
    provider: 'google',
    options: {
      scopes: 'https://www.googleapis.com/auth/gmail.send https://www.googleapis.com/auth/cloud-platform openid email profile',
      redirectTo: `${location.origin}/admin/credentials.html`,
      queryParams: { access_type: 'offline', prompt: 'consent' }
    }
  });
  if (error) toast('Google connect failed: ' + error.message, 'error');
};

window.disconnectGoogle = async function() {
  if (!confirm('Disconnect Google? Outreach emails will stop working.')) return;
  await updateClient(clientId, { gmail_access: null });
  client.gmail_access = null;
  toast('Google disconnected', 'info');
  renderSections();
};

window.disconnect = async function(field) {
  await updateClient(clientId, { [field]: null });
  client[field] = null;
  toast('Disconnected', 'info');
  renderSections();
};

window.showKeyInput = function(id) {
  document.getElementById(`key-input-${id}`).style.display = 'block';
  const inp = document.getElementById(`key-val-${id}`);
  if (inp) inp.focus();
};

window.hideKeyInput = function(id) {
  document.getElementById(`key-input-${id}`).style.display = 'none';
};

window.saveKey = async function(id) {
  const val = document.getElementById(`key-val-${id}`)?.value?.trim();
  if (!val) { toast('Key cannot be empty', 'warning'); return; }
  await updateClient(clientId, { [id]: val });
  client[id] = val;
  toast(`${id.replace('_key','').replace('_',' ')} key saved ✓`, 'success');
  renderSections();
};

window.removeKey = async function(id) {
  if (!confirm('Remove this API key?')) return;
  await updateClient(clientId, { [id]: null });
  client[id] = null;
  toast('Key removed', 'info');
  renderSections();
};

window.showMultiInput = function(id) {
  document.getElementById(`multi-input-${id}`).style.display = 'block';
};

window.saveMultiKey = async function(id, fieldsCsv) {
  const fields = fieldsCsv.split(',');
  const updates = {};
  for (const f of fields) {
    const val = document.getElementById(`mkey-${f}`)?.value?.trim();
    if (!val) { toast(`${f} cannot be empty`, 'warning'); return; }
    updates[f] = val;
    client[f] = val;
  }
  await updateClient(clientId, updates);
  toast('Saved ✓', 'success');
  renderSections();
};

window.removeMultiKey = async function(id, fieldsCsv) {
  if (!confirm('Remove all fields for this service?')) return;
  const fields = fieldsCsv.split(',');
  const updates = {};
  fields.forEach(f => { updates[f] = null; client[f] = null; });
  await updateClient(clientId, updates);
  toast('Removed', 'info');
  renderSections();
};

// Handle OAuth redirect back to this page
const hash = new URLSearchParams(location.hash.slice(1));
if (hash.get('access_token')) {
  const { data:{ session:newSession } } = await supabase.auth.getSession();
  if (newSession?.provider_token) {
    await updateClient(clientId, {
      gmail_access: newSession.provider_token,
      gmail_user:   newSession.user.email
    });
    client.gmail_access = newSession.provider_token;
    toast('Google connected ✓', 'success');
    renderSections();
    history.replaceState(null, '', location.pathname);
  }
}
</script>

<style>
  .service-card {
    background: var(--color-bg);
    border: 1px solid var(--color-border);
    border-radius: 10px;
    padding: 16px;
    transition: box-shadow .15s;
  }
  .service-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.08); }
  .conn-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: 6px; font-size: 13px; font-weight: 600;
    border: none; cursor: pointer; color: #fff; transition: opacity .15s;
    white-space: nowrap;
  }
  .conn-btn:hover { opacity: .85; }
  .conn-btn--outline {
    background: transparent !important; color: var(--color-text) !important;
    border: 1px solid var(--color-border) !important;
  }
  .conn-btn--danger {
    background: #FEE2E2 !important; color: #991B1B !important; border: none !important;
  }
</style>
</body></html>
