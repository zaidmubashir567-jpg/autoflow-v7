function renderSections() {

function isConnected(item) {
  if (item.type === 'oauth')          return !!client.gmail_access;
  if (item.type === 'oauth_external') return !!client[item.oauthField];
  if (item.type === 'apikey')         return !!client[item.id];
  if (item.type === 'apikey_multi')   return !!client[item.fields[0].id];
  return false;
}

function renderCard(item) {
  const connected = isConnected(item);

  const statusLabel  = connected ? 'Connected' : 'Not connected';

        </div>
        <div style="display:flex;gap:8px">
          <button class="conn-btn conn-btn--outline" style="font-size:11px;padding:5px 12px" onclick="testGmailSend()">📤 Test Send</button>

    } else {
      actionHTML = `<div style="display:flex;flex-direction:column;gap:8px">

          <img src="${item.logo}" width="16" height="16" onerror="this.style.display='none'">

           <button class="conn-btn conn-btn--outline" onclick="disconnect('${item.oauthField}')">Disconnect</button>

}

// ── Actions ───────────────────────────────────────────────────
window.connectGoogle = async function() {
  const { error } = await supabase.auth.signInWithOAuth({
    provider: 'google',
    options: {
      scopes: 'https://www.googleapis.com/auth/gmail.send https://www.googleapis.com/auth/cloud-platform openid email profile',
      redirectTo: `${location.origin}/admin/credentials.html`,
      queryParams: { access_type: 'offline', prompt: 'consent' }
    }
  });
  if (error) toast('Google connect failed: ' + error.message, 'error');
};

window.disconnectGoogle = async function() {
  if (!confirm('Disconnect Google? Outreach emails will stop working.')) return;
  await updateClient(clientId, { gmail_access: null });
  client.gmail_access = null;
  toast('Google disconnected', 'info');
  renderSections();
};

window.disconnect = async function(field) {
  await updateClient(clientId, { [field]: null });
  client[field] = null;
  toast('Disconnected', 'info');
  renderSections();
};

// ── Test connection ───────────────────────────────────────────
// Validates each key: live API call where CORS allows, format check otherwise
const KEY_TESTS = {
  gemini_key: async (k) => {
    const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${k}&pageSize=1`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return 'Gemini reachable ✓';
  },
  hunter_key: async (k) => {
    const r = await fetch(`https://api.hunter.io/v2/account?api_key=${k}`);
    const j = await r.json();
    if (j.errors?.length) throw new Error(j.errors[0].details ?? 'Invalid key');
    return `Hunter: ${j.data?.email ?? 'connected'} ✓`;
  },
  apollo_key: (k) => {
    if (k.length < 20) throw new Error('Too short — check your key');
    return 'Format valid ✓ (server-side test on first run)';
  },
  claude_key: (k) => {
    if (!k.startsWith('sk-ant-')) throw new Error('Must start with sk-ant-');
    if (k.length < 40) throw new Error('Key too short');
    return 'Format valid ✓ (server-side test on first run)';
  },
  lob_key: (k) => {
    if (!k.startsWith('live_') && !k.startsWith('test_')) throw new Error('Must start with live_ or test_');
    return 'Format valid ✓';
  },
  vercel_token: (k) => {
    if (k.length < 20) throw new Error('Token too short');
    return 'Format valid ✓';
  },
  twilio_sid: (k) => {
    if (!k.startsWith('AC') || k.length !== 34) throw new Error('SID must start with AC and be 34 chars');
    return 'Format valid ✓';
  }
};

window.testKey = async function(id) {
  const btn = document.getElementById(`test-btn-${id}`);
  const res = document.getElementById(`test-res-${id}`);
  if (!btn || !res) return;
  const key = client[id];
  if (!key) { res.className = 'test-result test-err'; res.textContent = '✗ No key saved'; return; }
  btn.classList.add('testing'); btn.textContent = '⟳ Testing…';
  res.className = ''; res.textContent = '';
  try {
    const fn = KEY_TESTS[id];
    const msg = fn ? await Promise.resolve(fn(key)) : 'Saved ✓';
    res.className = 'test-result test-ok'; res.textContent = '✓ ' + msg;
  } catch(e) {
    res.className = 'test-result test-err'; res.textContent = '✗ ' + (e.message || 'Failed');
  } finally {
    btn.classList.remove('testing'); btn.textContent = '⚡ Test';
  }
};

window.showKeyInput = function(id) {
  document.getElementById(`key-input-${id}`).style.display = 'block';
  const inp = document.getElementById(`key-val-${id}`);
  if (inp) inp.focus();
};

window.hideKeyInput = function(id) {
  document.getElementById(`key-input-${id}`).style.display = 'none';
};

window.saveKey = async function(id) {
  const val = document.getElementById(`key-val-${id}`)?.value?.trim();
  if (!val) { toast('Key cannot be empty', 'warning'); return; }
  await updateClient(clientId, { [id]: val });
  client[id] = val;
  toast(`${id.replace('_key','').replace('_',' ')} key saved ✓`, 'success');
  renderSections();
};

window.removeKey = async function(id) {
  if (!confirm('Remove this API key?')) return;
  await updateClient(clientId, { [id]: null });
  client[id] = null;
  toast('Key removed', 'info');
  renderSections();
};

window.showMultiInput = function(id) {
  document.getElementById(`multi-input-${id}`).style.display = 'block';
};

window.saveMultiKey = async function(id, fieldsCsv) {
  const fields = fieldsCsv.split(',');
  const updates = {};
  for (const f of fields) {
    const val = document.getElementById(`mkey-${f}`)?.value?.trim();
    if (!val) { toast(`${f} cannot be empty`, 'warning'); return; }
    updates[f] = val;
    client[f] = val;
  }
  await updateClient(clientId, updates);
  toast('Saved ✓', 'success');
  renderSections();
};

window.removeMultiKey = async function(id, fieldsCsv) {
  if (!confirm('Remove all fields for this service?')) return;
  const fields = fieldsCsv.split(',');
  const updates = {};
  fields.forEach(f => { updates[f] = null; client[f] = null; });
  await updateClient(clientId, updates);
  toast('Removed', 'info');
  renderSections();
};

// Handle OAuth redirect back to this page
const hash = new URLSearchParams(location.hash.slice(1));
if (hash.get('access_token')) {
  const { data:{ session:newSession } } = await supabase.auth.getSession();
  if (newSession?.provider_token) {
    const gmailUpdate = {
      gmail_access:        newSession.provider_token,
      gmail_user:          newSession.user.email,
      gmail_token_saved_at: new Date().toISOString()
    };
    // Save refresh token if provided (requires offline access scope)
    if (newSession.provider_refresh_token) {
      gmailUpdate.gmail_refresh = newSession.provider_refresh_token;
    }
    await updateClient(clientId, gmailUpdate);
    Object.assign(client, gmailUpdate);
    toast('Gmail connected ✓ — follow-ups will now send automatically', 'success');
    renderSections();
    history.replaceState(null, '', location.pathname);
  }
}

// ── Gmail token status helper ─────────────────────────────────
window.getGmailStatus = function() {
  if (!client.gmail_access) return { ok: false, label: 'Not connected', color: '#ef4444' };
  const saved = client.gmail_token_saved_at ? new Date(client.gmail_token_saved_at) : null;
  if (!saved) return { ok: true, label: 'Connected', color: '#22c55e' };
  const ageHours = (Date.now() - saved.getTime()) / 3600000;
  if (ageHours < 0.8)  return { ok: true,  label: `Connected · fresh`,        color: '#22c55e' };
  if (ageHours < 1.0)  return { ok: true,  label: `Expiring soon — reconnect`, color: '#f59e0b' };
  if (client.gmail_refresh) return { ok: true, label: `Connected · auto-refresh`, color: '#22c55e' };
  return { ok: false, label: 'Token expired — reconnect', color: '#ef4444' };
};

// ── Test Gmail send ───────────────────────────────────────────
window.testGmailSend = async function() {
  if (!client.gmail_access) {
    toast('No Gmail token — connect Gmail first', 'warning');
    return;
  }

  const toAddr = client.gmail_user || userEmail;
  if (!toAddr) {
    toast('Cannot determine your email address', 'error');
    return;
  }

  // Visual feedback: disable button
  const btn = [...document.querySelectorAll('button')].find(b => b.textContent.includes('Test Send'));
  if (btn) { btn.disabled = true; btn.textContent = '⟳ Sending…'; }

  try {
    // Build MIME email
    const subject = 'AutoFlow — Gmail test ✓';
    const body    = [
      `Hi there,`,
      ``,
      `Your Gmail is successfully connected to AutoFlow. Follow-up emails will send automatically.`,
      ``,
      `This is a test sent at ${new Date().toLocaleString()}.`,
      ``,
      `— AutoFlow`
    ].join('\n');

    const mime = [
      `To: ${toAddr}`,
      `Subject: ${subject}`,
      `Content-Type: text/plain; charset=utf-8`,
      `MIME-Version: 1.0`,
      ``,
      body
    ].join('\r\n');

    const raw = btoa(mime).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');

    const res = await fetch('https://gmail.googleapis.com/gmail/v1/users/me/messages/send', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${client.gmail_access}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ raw })
    });

    if (res.status === 401) {
      toast('Gmail token expired — click Reconnect to refresh it', 'error');
    } else if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      const msg = err?.error?.message || `HTTP ${res.status}`;
      toast(`Send failed: ${msg}`, 'error');
    } else {
      toast(`Test email sent to ${toAddr} ✓`, 'success');
    }
  } catch(e) {
    toast('Send error: ' + (e.message || String(e)), 'error');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '📤 Test Send'; }
  }
};
</script>
