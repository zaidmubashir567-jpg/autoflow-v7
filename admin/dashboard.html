<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Dashboard — LeadFyn</title>
  <link rel="preconnect" href="https://ndwvsrtyjnaddrifafqk.supabase.co" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="modulepreload" href="/shared/auth.js">
  <link rel="modulepreload" href="/shared/ui.js">
  <link rel="modulepreload" href="/shared/db.js">
  <link rel="modulepreload" href="/shared/api.js">

  <!-- ── 3D DARK OVERRIDES ───────────────────────────────── -->
  <style>
    /* Depth tokens */
    :root {
      --d-bg:       #060614;
      --d-surface:  #0d0d2b;
      --d-card:     rgba(255,255,255,0.04);
      --d-border:   rgba(255,255,255,0.09);
      --d-border2:  rgba(99,102,241,0.35);
      --d-accent:   #6366f1;
      --d-accent2:  #818cf8;
      --d-glow:     0 0 40px rgba(99,102,241,.18);
      --d-glow2:    0 0 20px rgba(99,102,241,.10);
      --d-shadow:   0 8px 32px rgba(0,0,0,.55);
    }

    /* ── Base overrides ── */
    body {
      background: var(--d-bg) !important;
      background-image:
        radial-gradient(ellipse 60% 50% at 20% -10%, rgba(99,102,241,.12), transparent),
        radial-gradient(ellipse 40% 40% at 80% 90%, rgba(139,92,246,.08), transparent) !important;
      background-attachment: fixed !important;
    }
    :root {
      --color-bg:         var(--d-bg);
      --color-surface:    var(--d-surface);
      --color-border:     var(--d-border);
      --color-text:       #f1f5f9;
      --color-text-muted: #94a3b8;
      --color-accent:     var(--d-accent);
      --shadow:           0 2px 8px rgba(0,0,0,.4);
      --shadow-md:        0 8px 32px rgba(0,0,0,.5);
    }

    /* ── Sidebar 3D ── */
    .sidebar {
      background: rgba(6,6,20,0.95) !important;
      border-right: 1px solid var(--d-border);
      backdrop-filter: blur(20px);
      box-shadow: 4px 0 24px rgba(0,0,0,.4);
    }
    .sidebar-brand { border-bottom: 1px solid var(--d-border) !important; }
    .brand-icon { font-size: 22px; filter: drop-shadow(0 0 8px rgba(99,102,241,.6)); }
    .nav-item.active {
      background: rgba(99,102,241,.15) !important;
      border-left-color: var(--d-accent) !important;
      box-shadow: inset 0 0 20px rgba(99,102,241,.08);
    }
    .nav-item:hover { background: rgba(255,255,255,.05) !important; }

    /* ── Page header ── */
    .page-title { font-size: 26px !important; font-weight: 900 !important; letter-spacing: -.5px; }

    /* ── Stat cards — 3D ── */
    .stat-card {
      background: var(--d-card) !important;
      border: 1px solid var(--d-border) !important;
      border-radius: 14px !important;
      backdrop-filter: blur(16px);
      box-shadow: var(--d-shadow), inset 0 1px 0 rgba(255,255,255,.07) !important;
      transition: transform .3s ease, box-shadow .3s ease !important;
      transform: perspective(600px) rotateX(3deg);
      position: relative; overflow: hidden;
    }
    .stat-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(99,102,241,.5), transparent);
    }
    .stat-card:hover {
      transform: perspective(600px) rotateX(0deg) translateY(-6px) !important;
      box-shadow: var(--d-shadow), var(--d-glow), inset 0 1px 0 rgba(255,255,255,.12) !important;
      border-color: var(--d-border2) !important;
    }
    .stat-value {
      font-size: 32px !important; font-weight: 900 !important;
      background: linear-gradient(135deg, #fff, var(--d-accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .stat-icon { font-size: 28px !important; filter: drop-shadow(0 2px 6px rgba(99,102,241,.4)); }
    .stat-sub { color: var(--d-accent2) !important; font-size: 11px !important; font-weight: 600 !important; }

    /* ── Cards — 3D glass ── */
    .card {
      background: var(--d-card) !important;
      border: 1px solid var(--d-border) !important;
      border-radius: 14px !important;
      backdrop-filter: blur(16px);
      box-shadow: var(--d-shadow), inset 0 1px 0 rgba(255,255,255,.05) !important;
      transition: box-shadow .3s, border-color .3s !important;
    }
    .card:hover { border-color: var(--d-border2) !important; box-shadow: var(--d-shadow), var(--d-glow2) !important; }
    .card-title { color: #f1f5f9 !important; font-weight: 700 !important; font-size: 14px !important;
                  letter-spacing: .2px; padding-bottom: 12px; border-bottom: 1px solid var(--d-border); margin-bottom: 16px !important; }

    /* ── Alerts — 3D dark ── */
    .alert--warning {
      background: rgba(245,158,11,.08) !important;
      border: 1px solid rgba(245,158,11,.25) !important;
      color: #fcd34d !important; border-radius: 12px !important;
      backdrop-filter: blur(10px);
    }
    .alert--info {
      background: rgba(99,102,241,.08) !important;
      border: 1px solid rgba(99,102,241,.25) !important;
      color: var(--d-accent2) !important; border-radius: 12px !important;
      backdrop-filter: blur(10px);
    }
    .alert-link { color: inherit !important; opacity: .85; }
    .alert-link:hover { opacity: 1; }

    /* ── Status pills ── */
    .status-running   { background: rgba(139,92,246,.2) !important; color: #c4b5fd !important; border-radius: 20px !important; }
    .status-completed { background: rgba(16,185,129,.15) !important; color: #6ee7b7 !important; border-radius: 20px !important; }
    .status-error     { background: rgba(239,68,68,.15) !important; color: #fca5a5 !important; border-radius: 20px !important; }

    /* ── Run rows ── */
    .run-row { padding: 10px 0; border-bottom: 1px solid var(--d-border); transition: background .15s; border-radius: 6px; padding-inline: 8px; margin-inline: -8px; }
    .run-row:hover { background: rgba(99,102,241,.05); }

    /* ── Funnel bars 3D ── */
    .funnel-bar-3d {
      background: linear-gradient(180deg, rgba(99,102,241,.9), rgba(139,92,246,.7)) !important;
      border-radius: 6px 6px 0 0 !important;
      box-shadow: 0 -4px 12px rgba(99,102,241,.3), inset 0 1px 0 rgba(255,255,255,.2) !important;
    }
    .funnel-bar-won  { background: linear-gradient(180deg, #10b981, #059669) !important; box-shadow: 0 -4px 12px rgba(16,185,129,.3) !important; }
    .funnel-bar-lost { background: linear-gradient(180deg, #ef4444, #dc2626) !important; box-shadow: 0 -4px 12px rgba(239,68,68,.3) !important; }

    /* ── A/B bars ── */
    .ab-track { background: rgba(255,255,255,.06) !important; border-radius: 6px !important; }
    .ab-fill  { background: linear-gradient(90deg, var(--d-accent), var(--d-accent2)) !important; border-radius: 6px !important; }

    /* ── Skeleton shimmer ── */
    .skeleton-line {
      background: linear-gradient(90deg, rgba(255,255,255,.04) 25%, rgba(255,255,255,.08) 50%, rgba(255,255,255,.04) 75%) !important;
      background-size: 200% 100% !important;
      animation: shimmer 1.5s infinite !important;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ── Two-col grid ── */
    .dash-two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
    @media (max-width: 900px) { .dash-two-col { grid-template-columns: 1fr; } }

    /* ── Floating glow accent ── */
    .main::before {
      content: ''; position: fixed; width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(99,102,241,.06) 0%, transparent 70%);
      top: 10%; right: 5%; pointer-events: none; border-radius: 50%; z-index: 0;
    }

    /* ── Loader bar accent ── */
    #af-loader { background: linear-gradient(90deg, var(--d-accent), #a78bfa) !important; }

    /* ── Super Brain feed ── */
    .brain-feed {
      height: 220px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px;
      scrollbar-width: thin; scrollbar-color: rgba(99,102,241,.3) transparent;
    }
    .brain-feed::-webkit-scrollbar { width: 4px; }
    .brain-feed::-webkit-scrollbar-thumb { background: rgba(99,102,241,.3); border-radius: 4px; }
    .brain-msg {
      padding: 8px 12px; border-radius: 10px; font-size: 12.5px; line-height: 1.5;
      border-left: 3px solid transparent; background: rgba(255,255,255,.03);
    }
    .brain-msg-info    { border-color: #6366f1; color: #c7d2fe; }
    .brain-msg-success { border-color: #10b981; color: #6ee7b7; background: rgba(16,185,129,.05); }
    .brain-msg-warning { border-color: #f59e0b; color: #fcd34d; background: rgba(245,158,11,.05); }
    .brain-msg-insight { border-color: #f472b6; color: #fbcfe8; background: rgba(244,114,182,.05); }
    .brain-msg-error   { border-color: #ef4444; color: #fca5a5; background: rgba(239,68,68,.05); }
    .brain-status-bar {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px; border-radius: 8px;
      background: rgba(99,102,241,.07); border: 1px solid rgba(99,102,241,.15);
      font-size: 12px; color: #a5b4fc; margin-bottom: 10px;
    }
    .brain-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #6366f1;
      flex-shrink: 0; animation: brainPulse 1.5s infinite;
    }
    @keyframes brainPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }
    .brain-dot.idle { background: #475569; animation: none; }
  </style>
  <link rel="stylesheet" href="/shared/attoleads-theme.css">
</head>
<body>
<div id="app">Loading…</div>

<script type="module">
import { requireAuth, getClientId, supabase as _sb } from '/shared/auth.js';
import { adminNav, injectSharedCSS, injectLeadFynTheme, statCard, toast, skeleton } from '/shared/ui.js';
import { getRecentRuns, getRunHistory, getLeads, getPendingDrafts, getManualQueue, getVariationStats } from '/shared/db.js';
import { getDashboardStats } from '/brain/reporter.js';
import { diagnoseAll, renderErrorCard } from '/brain/solver.js';

injectLeadFynTheme();
injectSharedCSS();

try {

const auth = await requireAuth('admin');
if (!auth) throw new Error('not authed');
const clientId = await getClientId();

document.getElementById('app').innerHTML = `
  ${adminNav('Dashboard')}
  <main class="main" style="position:relative;z-index:1">
    <div class="page-header">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <h1 class="page-title">Dashboard</h1>
        <span id="rt-pill" style="font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;
              background:rgba(16,185,129,.15);color:#34d399;border:1px solid rgba(16,185,129,.25);
              transition:background .4s">● LIVE</span>
      </div>
      <p class="page-sub" id="sub">Loading your pipeline stats…</p>
    </div>
    <div class="page-body">
      <div id="alerts"></div>

      <!-- ── System Status Bar ────────────────────────────────── -->
      <div id="systemStatusBar" style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;padding:12px 16px;
           background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:12px;align-items:center">
        <span style="font-size:11px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.7px;margin-right:4px">System Status</span>
        <span id="status-pipeline" style="font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;background:rgba(71,85,105,.2);color:#94a3b8;border:1px solid rgba(71,85,105,.25)">⏸ Pipeline Idle</span>
        <span id="status-followup" style="font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;background:rgba(71,85,105,.2);color:#94a3b8;border:1px solid rgba(71,85,105,.25)">📅 Follow-ups Loading…</span>
        <span id="status-apify" style="font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;background:rgba(71,85,105,.2);color:#94a3b8;border:1px solid rgba(71,85,105,.25)">🗺️ Apify Loading…</span>
        <span id="status-gmail" style="font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;background:rgba(71,85,105,.2);color:#94a3b8;border:1px solid rgba(71,85,105,.25)">✉️ Gmail Loading…</span>
        <span style="margin-left:auto;font-size:11px;color:#475569" id="status-updated"></span>
      </div>

      <!-- ── Apify Import Leads Panel ─────────────────────────── -->
      <div class="card" id="apifyImportPanel" style="margin-bottom:20px;padding:16px 20px;display:none">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px">
          <div>
            <div class="card-title" style="margin-bottom:2px;padding-bottom:0;border-bottom:none">📥 Apify Import Leads</div>
            <div style="font-size:12px;color:var(--color-text-muted)" id="apifyImportSub">Leads imported directly from Apify datasets</div>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button onclick="location.href='/admin/leads.html?filter=apify'" style="padding:8px 16px;background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.35);color:#818cf8;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s"
              onmouseover="this.style.background='rgba(99,102,241,.25)'" onmouseout="this.style.background='rgba(99,102,241,.15)'">
              👁️ View All Leads
            </button>
            <button id="sendApifyOutreachBtn" onclick="sendApifyOutreach()" style="padding:8px 18px;background:linear-gradient(135deg,#6366f1,#818cf8);border:none;color:#fff;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:0 2px 12px rgba(99,102,241,.3)"
              onmouseover="this.style.opacity='.85'" onmouseout="this.style.opacity='1'">
              📧 Send Outreach to All
            </button>
          </div>
        </div>
        <div id="apifyImportRuns" style="display:grid;gap:10px"></div>
      </div>

      <!-- ── Daily Temperature Panel ───────────────────────── -->
      <div class="card" style="margin-bottom:20px;padding:16px 20px" id="tempPanel">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
          <div class="card-title" style="margin-bottom:0;padding-bottom:0;border-bottom:none">🌡️ Today's Pipeline Temperature</div>
          <span style="font-size:11px;color:var(--color-text-muted)" id="tempRefreshTime"></span>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px" id="tempCards">
          <div class="skeleton-line" style="height:72px;border-radius:12px"></div>
          <div class="skeleton-line" style="height:72px;border-radius:12px"></div>
          <div class="skeleton-line" style="height:72px;border-radius:12px"></div>
          <div class="skeleton-line" style="height:72px;border-radius:12px"></div>
        </div>
        <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--d-border);font-size:12px;color:var(--color-text-muted)" id="autoReplySummary"></div>
      </div>

      <div class="stats-grid" id="statsGrid" style="margin-bottom:24px">${skeleton(1)}</div>
      <div class="dash-two-col">
        <div class="card">
          <div class="card-title">⚡ Recent Runs</div>
          <div id="recentRuns">${skeleton(3)}</div>
        </div>
        <div class="card">
          <div class="card-title">📊 A/B/C Variation Performance</div>
          <div id="varStats">${skeleton(3)}</div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">🎯 Pipeline Stage Funnel</div>
        <div id="stageFunnel">${skeleton(2)}</div>
      </div>
      <div class="card" style="margin-top:0">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
          <div class="card-title" style="margin-bottom:0;padding-bottom:0;border-bottom:none">🧠 Claude Super Brain — Live Activity</div>
          <span id="brain-live-pill" style="font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;
                background:rgba(71,85,105,.2);color:#94a3b8;border:1px solid rgba(71,85,105,.3)">● IDLE</span>
        </div>
        <div id="brain-status-bar" class="brain-status-bar" style="display:none">
          <div class="brain-dot" id="brain-dot"></div>
          <span id="brain-status-text">Starting…</span>
        </div>
        <div class="brain-feed" id="brainFeed">
          <div class="brain-msg brain-msg-info" style="color:var(--color-text-muted)">
            Super Brain will appear here when a pipeline is running. <a href="/admin/pipeline.html" style="color:#818cf8">Start a run →</a>
          </div>
        </div>
      </div>
      <div class="dash-two-col" style="margin-top:0">
        <div class="card">
          <div class="card-title">📅 Follow-up Queue</div>
          <div id="followUpQueue" style="min-height:60px"></div>
        </div>
        <div class="card">
          <div class="card-title">🧠 Niche Memory</div>
          <div id="nicheMemoryPanel" style="min-height:60px"></div>
        </div>
      </div>
    </div>
  </main>`;

const [runs, history, drafts, queue, varStats, brainStats, allLeads] = await Promise.all([
  getRecentRuns(clientId, 5).catch(e    => { console.error('[dash] getRecentRuns:', e?.message ?? e); return []; }),
  getRunHistory(clientId, 8).catch(e    => { console.error('[dash] getRunHistory:', e?.message ?? e); return []; }),
  getPendingDrafts(clientId).catch(e    => { console.error('[dash] getPendingDrafts:', e?.message ?? e); return []; }),
  getManualQueue(clientId).catch(e      => { console.error('[dash] getManualQueue:', e?.message ?? e); return []; }),
  getVariationStats(clientId).catch(e   => { console.error('[dash] getVariationStats:', e?.message ?? e); return {}; }),
  getDashboardStats(clientId).catch(e   => { console.error('[dash] getDashboardStats:', e?.message ?? e); return null; }),
  getLeads(clientId).catch(e            => { console.error('[dash] getLeads:', e?.message ?? e); return []; })
]);

// Alerts
const alerts = [];
if (drafts.length > 0)
  alerts.push(`<div class="alert alert--warning" style="position:relative;padding-right:40px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
    <span>📬 <strong>${drafts.length} reply draft${drafts.length > 1 ? 's' : ''}</strong> waiting for your approval</span>
    <a href="/admin/pipeline-manager.html" class="alert-link" style="margin-left:auto">Review now →</a>
    <button onclick="this.closest('.alert').remove()" title="Dismiss"
      style="position:absolute;top:50%;right:12px;transform:translateY(-50%);background:none;border:none;color:inherit;font-size:18px;line-height:1;cursor:pointer;opacity:.55;padding:2px 5px;border-radius:4px;transition:opacity .15s"
      onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='.55'">×</button>
  </div>`);
if (queue.length > 0)
  alerts.push(`<div class="alert alert--info" style="position:relative;padding-right:40px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
    <span>💬 <strong>${queue.length} lead${queue.length > 1 ? 's' : ''}</strong> in manual DM queue</span>
    <a href="/admin/outreach-hub.html" class="alert-link" style="margin-left:auto">Send DMs →</a>
    <button onclick="this.closest('.alert').remove()" title="Dismiss"
      style="position:absolute;top:50%;right:12px;transform:translateY(-50%);background:none;border:none;color:inherit;font-size:18px;line-height:1;cursor:pointer;opacity:.55;padding:2px 5px;border-radius:4px;transition:opacity .15s"
      onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='.55'">×</button>
  </div>`);
document.getElementById('alerts').innerHTML = alerts.join('');

// ── Temperature daily summary ─────────────────────────────────
(function renderTemperature() {
  const leads = allLeads ?? [];
  function getTemp(lead) {
    if (lead.do_not_contact) return 'dead';
    switch (lead.stage) {
      case 'interested': return 'hot';
      case 'replied':    return 'warm';
      case 'contacted':  return 'cold';
      case 'won':        return 'won';
      case 'lost':       return 'dead';
      default:           return 'new';
    }
  }
  const counts = { hot: 0, warm: 0, cold: 0, new: 0, won: 0, dead: 0 };
  leads.forEach(l => { const t = getTemp(l); if (t in counts) counts[t]++; });
  const interested = leads.filter(l => l.stage === 'interested');
  const autoReplies = drafts.filter(d => d.status === 'auto_sent').length;
  const pendingReview = drafts.filter(d => d.status === 'pending_review').length;

  const tileStyle = (bg, border, glow) =>
    `border-radius:12px;padding:14px 16px;border:1px solid ${border};background:${bg};box-shadow:${glow};`;

  document.getElementById('tempCards').innerHTML = [
    // HOT
    `<div style="${tileStyle('rgba(239,68,68,.1)','rgba(239,68,68,.3)','0 0 14px rgba(239,68,68,.15)')}cursor:pointer"
          onclick="location.href='/admin/leads.html'">
       <div style="font-size:22px;line-height:1">🔴</div>
       <div style="font-size:28px;font-weight:900;color:#f87171;margin-top:4px">${counts.hot}</div>
       <div style="font-size:11px;color:#fca5a5;font-weight:700;margin-top:2px">HOT</div>
       <div style="font-size:10px;color:rgba(252,165,165,.7);margin-top:2px">INTERESTED — call now</div>
     </div>`,
    // WARM
    `<div style="${tileStyle('rgba(234,179,8,.08)','rgba(234,179,8,.25)','0 0 14px rgba(234,179,8,.1)')}cursor:pointer"
          onclick="location.href='/admin/leads.html'">
       <div style="font-size:22px;line-height:1">🟡</div>
       <div style="font-size:28px;font-weight:900;color:#facc15;margin-top:4px">${counts.warm}</div>
       <div style="font-size:11px;color:#fde68a;font-weight:700;margin-top:2px">WARM</div>
       <div style="font-size:10px;color:rgba(253,230,138,.7);margin-top:2px">Replied — AI is handling</div>
     </div>`,
    // COLD
    `<div style="${tileStyle('rgba(59,130,246,.08)','rgba(59,130,246,.25)','0 0 14px rgba(59,130,246,.1)')}cursor:pointer"
          onclick="location.href='/admin/leads.html'">

function appendBrainMsg(row) {
  const feed = document.getElementById('brainFeed');
  if (!feed) return;
  // Clear placeholder
  const placeholder = feed.querySelector('[style*="color:var(--color-text-muted)"]');
  if (placeholder) placeholder.remove();

  const cls = `brain-msg brain-msg-${row.type || 'info'}`;
  const icon = { info:'ℹ️', success:'✅', warning:'⚠️', insight:'💡', error:'❌' }[row.type] || 'ℹ️';
  const time = new Date(row.created_at || Date.now()).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const div = document.createElement('div');
  div.className = cls;
  div.innerHTML = `<span style="font-size:10px;opacity:.5;margin-right:6px">${time}</span>${icon} ${row.message}`;
  feed.appendChild(div);
  feed.scrollTop = feed.scrollHeight;
}

function setBrainActive(msg, isRunning) {
  const bar = document.getElementById('brain-status-bar');
  const dot = document.getElementById('brain-dot');
  const text = document.getElementById('brain-status-text');
  const pill = document.getElementById('brain-live-pill');
  if (!bar) return;
  bar.style.display = 'flex';
  if (text) text.textContent = msg;
  if (dot) { dot.className = isRunning ? 'brain-dot' : 'brain-dot idle'; }
  if (pill && isRunning) {
    pill.textContent = '● LIVE';
    pill.style.background = 'rgba(99,102,241,.15)';
    pill.style.color = '#818cf8';
    pill.style.borderColor = 'rgba(99,102,241,.3)';
  }
}

window.approveRunOutreach = async function(runId) {
  const btn = event.target;
  btn.textContent = '⏳ Approving…'; btn.disabled = true;
  try {
    // Move all draft emails for this run to 'approved' so follow-up-engine picks them up
    const { error } = await _sb.from('outreach_log')
      .update({ status: 'approved', approved_at: new Date().toISOString() })
      .eq('run_id', runId).eq('status', 'draft');
    if (error) throw error;
    btn.textContent = '✅ Approved!'; btn.style.background = 'rgba(16,185,129,.15)'; btn.style.borderColor = 'rgba(16,185,129,.3)'; btn.style.color = '#34d399';
    setTimeout(() => { btn.textContent = '📧 Send Outreach'; btn.disabled = false; btn.style.background='linear-gradient(135deg,#6366f1,#818cf8)'; btn.style.color='#fff'; }, 2500);
  } catch(e) {
    btn.textContent = '❌ Error'; btn.disabled = false;
    console.error('[approveOutreach]', e);
  }
};

window.sendApifyOutreach = async function() {
  const btn = document.getElementById('sendApifyOutreachBtn');
  if (btn) { btn.textContent = '⏳ Approving all…'; btn.disabled = true; }
  try {
    const { error } = await _sb.from('outreach_log')
      .update({ status: 'approved', approved_at: new Date().toISOString() })
      .eq('client_id', clientId).eq('status', 'draft');
    if (error) throw error;
    if (btn) { btn.textContent = '✅ All Approved!'; btn.style.background = 'rgba(16,185,129,.2)'; }
    setTimeout(() => { if(btn){btn.textContent='📧 Send Outreach to All';btn.disabled=false;btn.style.background='linear-gradient(135deg,#6366f1,#818cf8)';} }, 3000);
  } catch(e) {
    if (btn) { btn.textContent = '❌ Error'; btn.disabled = false; }
  }
};

// Solver errors
if (runs.length > 0) {
  const latestRun = runs[0];
  if (latestRun.errors?.length > 0) {
    const diagnosed = await diagnoseAll(latestRun.errors, clientId).catch(() => []);
    const errorHTML = diagnosed.map(renderErrorCard).join('');
    document.getElementById('alerts').innerHTML += `
      <div style="margin-bottom:16px">
        <div style="font-size:13px;font-weight:600;color:var(--color-text-muted);margin-bottom:8px">Last run issues (auto-diagnosis):</div>
        ${errorHTML}
      </div>`;
  }
}

// ── Follow-up Queue ──────────────────────────────────────────────
(async () => {
  try {
    const { data: scheduled } = await _sb.from('outreach_log')
      .select('id,subject,body,scheduled_at,follow_up_seq,status,leads(business_name,email,phone)')
      .eq('client_id', clientId)
      .eq('status', 'scheduled')
      .not('scheduled_at', 'is', null)
      .order('scheduled_at', { ascending: true })
      .limit(8);

    const el = document.getElementById('followUpQueue');
    if (!el) return;
    if (!scheduled || scheduled.length === 0) {
      el.innerHTML = `<p style="color:var(--color-text-muted);font-size:13px">No scheduled follow-ups yet.<br>Follow-ups are created automatically after each pipeline run.</p>`;
      return;
    }
    const dayLabels = ['—', 'Day 3', 'Day 7', 'Day 14'];
    const now = Date.now();
    el.innerHTML = scheduled.map(row => {
      const dueDate   = new Date(row.scheduled_at);
      const daysUntil = Math.ceil((dueDate - now) / 86400000);
      const dueLabel  = daysUntil <= 0 ? '<span style="color:#f87171;font-weight:700">Due now</span>'
                      : daysUntil === 1 ? '<span style="color:#fcd34d">Tomorrow</span>'
                      : `<span style="color:#94a3b8">In ${daysUntil}d</span>`;
      const seqLabel  = dayLabels[row.follow_up_seq] ?? `Seq ${row.follow_up_seq}`;
      const biz       = row.leads?.business_name ?? 'Unknown';
      return `<div style="display:flex;justify-content:space-between;align-items:center;
                          padding:9px 8px;border-bottom:1px solid var(--d-border);
                          border-radius:6px;gap:8px;transition:background .15s"
                   onmouseover="this.style.background='rgba(99,102,241,.05)'"
                   onmouseout="this.style.background=''">
        <div style="min-width:0">
          <div style="font-size:13px;font-weight:600;color:#f1f5f9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${biz}</div>
          <div style="font-size:11px;color:#64748b">${seqLabel} follow-up</div>
        </div>
        <div style="text-align:right;flex-shrink:0;font-size:12px">${dueLabel}</div>
      </div>`;
    }).join('');
  } catch (e) {
    const el = document.getElementById('followUpQueue');
    if (el) el.innerHTML = `<p style="color:#64748b;font-size:12px">Follow-up table loading…<br>(Run migration 006 if this persists)</p>`;
  }
})();

// ── Niche Memory Panel ───────────────────────────────────────────
(async () => {
  try {
    const { data: memories } = await _sb.from('niche_memory')
      .select('niche,city,state,avg_score,runs_count,notes,pain_signals,updated_at')
      .eq('client_id', clientId)
      .order('updated_at', { ascending: false })
      .limit(5);

    const el = document.getElementById('nicheMemoryPanel');
    if (!el) return;
    if (!memories || memories.length === 0) {
      el.innerHTML = `<p style="color:var(--color-text-muted);font-size:13px">No niche memory yet.<br>After your first pipeline run, Claude will save what it learned here for smarter future runs.</p>`;
      return;
    }
    el.innerHTML = memories.map(m => {
      const scoreColor = m.avg_score >= 8 ? '#6ee7b7' : m.avg_score >= 6 ? '#fcd34d' : '#f87171';
      return `<div style="padding:10px 0;border-bottom:1px solid var(--d-border)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
          <span style="font-size:13px;font-weight:700;color:#f1f5f9">${m.niche} · ${m.city}${m.state ? ', '+m.state : ''}</span>
          <span style="font-size:11px;font-weight:700;color:${scoreColor}">avg ${m.avg_score}/10</span>
        </div>
        <div style="font-size:11px;color:#94a3b8;margin-bottom:4px">${m.runs_count} run${m.runs_count !== 1 ? 's' : ''} · last: ${new Date(m.updated_at).toLocaleDateString()}</div>
        ${m.notes ? `<div style="font-size:12px;color:#a5b4fc;font-style:italic">"${m.notes}"</div>` : ''}
        ${m.pain_signals?.length ? `<div style="margin-top:4px">${m.pain_signals.slice(0,2).map(s => `<span style="font-size:10px;background:rgba(99,102,241,.12);color:#818cf8;padding:2px 7px;border-radius:10px;margin-right:4px;display:inline-block">${s}</span>`).join('')}</div>` : ''}
      </div>`;
    }).join('');
  } catch (e) {
    const el = document.getElementById('nicheMemoryPanel');
    if (el) el.innerHTML = `<p style="color:#64748b;font-size:12px">Niche memory loading…<br>(Run migration 006 if this persists)</p>`;
  }
})();

} catch(e) {
  console.error('[Dashboard] Fatal error:', e);
  document.getElementById('app').innerHTML = `<div style="padding:40px;font-family:monospace;background:#fff;min-height:100vh">
    <h2 style="color:#ef4444;margin-bottom:16px">⚠️ Dashboard Error</h2>
    <pre style="color:#ef4444;white-space:pre-wrap;font-size:13px;background:#fef2f2;padding:16px;border-radius:8px;border:1px solid #fecaca">${(e?.stack ?? e?.message ?? String(e)).replace(/</g,'&lt;')}</pre>
    <p style="color:#6b7280;font-size:13px;margin-top:16px">Check browser console for full details. <a href="/admin/login.html" style="color:#4f46e5">Back to login →</a></p>
  </div>`;
}
</script>
</body>
</html>
