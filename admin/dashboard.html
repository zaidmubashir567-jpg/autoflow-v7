<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Dashboard — AutoFlow</title>
</head>
<body>
<div id="app">Loading…</div>

<script type="module">
import { requireAuth, getClientId } from '/shared/auth.js';
import { adminNav, injectSharedCSS, statCard, toast, skeleton } from '/shared/ui.js';
import { getRecentRuns, getRunHistory, getLeads, getPendingDrafts, getManualQueue, getVariationStats } from '/shared/db.js';
import { getDashboardStats } from '/brain/reporter.js';
import { diagnoseAll, renderErrorCard } from '/brain/solver.js';

injectSharedCSS();

const auth = await requireAuth('admin');
if (!auth) throw new Error('not authed');
const clientId = await getClientId();

document.getElementById('app').innerHTML = `
  ${adminNav('Dashboard')}
  <main class="main">
    <div class="page-header">
      <h1 class="page-title">Dashboard</h1>
      <p class="page-sub" id="sub">Loading your pipeline stats…</p>
    </div>
    <div class="page-body">
      <!-- Alert banner for pending actions -->
      <div id="alerts"></div>

      <!-- Stats -->
      <div class="stats-grid" id="statsGrid" style="margin-bottom:24px">
        ${skeleton(1)}
      </div>

      <!-- Two col: recent runs + A/B stats -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px">
        <div class="card">
          <div class="card-title">Recent Runs</div>
          <div id="recentRuns">${skeleton(3)}</div>
        </div>
        <div class="card">
          <div class="card-title">A/B/C Variation Performance</div>
          <div id="varStats">${skeleton(3)}</div>
        </div>
      </div>

      <!-- Pipeline stage funnel -->
      <div class="card">
        <div class="card-title">Pipeline Stage Funnel</div>
        <div id="stageFunnel">${skeleton(2)}</div>
      </div>
    </div>
  </main>`;

// Load all data in parallel — brain stats + raw data
// Each call gets a .catch() so a single failing table never blanks the whole page
const [runs, history, drafts, queue, varStats, brainStats] = await Promise.all([
  getRecentRuns(clientId, 5).catch(e    => { console.error('[dash] getRecentRuns:', e?.message ?? e); return []; }),
  getRunHistory(clientId, 8).catch(e    => { console.error('[dash] getRunHistory:', e?.message ?? e); return []; }),
  getPendingDrafts(clientId).catch(e    => { console.error('[dash] getPendingDrafts:', e?.message ?? e); return []; }),
  getManualQueue(clientId).catch(e      => { console.error('[dash] getManualQueue:', e?.message ?? e); return []; }),
  getVariationStats(clientId).catch(e   => { console.error('[dash] getVariationStats:', e?.message ?? e); return {}; }),
  getDashboardStats(clientId).catch(e   => { console.error('[dash] getDashboardStats:', e?.message ?? e); return null; })
]);

// Alert banners (3 human touchpoints)
const alerts = [];
if (drafts.length > 0)
  alerts.push(`<div class="alert alert--warning">
    📬 <strong>${drafts.length} reply draft${drafts.length > 1 ? 's' : ''}</strong> waiting for your approval
    <a href="/admin/pipeline-manager.html" class="alert-link">Review now →</a>
  </div>`);
if (queue.length > 0)
  alerts.push(`<div class="alert alert--info">
    💬 <strong>${queue.length} lead${queue.length > 1 ? 's' : ''}</strong> in manual DM queue
    <a href="/admin/outreach-hub.html" class="alert-link">Send DMs →</a>
  </div>`);

document.getElementById('alerts').innerHTML = alerts.join('');

// Stats: totals from history
const totalLeads     = history.reduce((s,r) => s + (r.leads_found ?? 0), 0);
const totalQualified = history.reduce((s,r) => s + (r.leads_qualified ?? 0), 0);
const avgContact     = history.length
  ? (history.reduce((s,r) => s + (r.contact_rate ?? 0), 0) / history.length).toFixed(1)
  : 0;
const avgReply       = history.length
  ? (history.reduce((s,r) => s + (r.reply_rate ?? 0), 0) / history.length).toFixed(1)
  : 0;

document.getElementById('statsGrid').innerHTML = [
  statCard('Total Leads Found',   totalLeads,        'all time', '👥'),
  statCard('Qualified Leads',     totalQualified,    'score ≥ 6', '✅'),
  statCard('Avg Contact Rate',    avgContact + '%',  'target 55%+', '📡'),
  statCard('Avg Reply Rate',      avgReply + '%',    'all channels', '💬'),
  statCard('Pending Drafts',      drafts.length,     'need approval', '📬'),
  statCard('Manual DM Queue',     queue.length,      'no-email leads', '📲'),
].join('');

// Recent runs table
document.getElementById('recentRuns').innerHTML = runs.length === 0
  ? `<p style="color:var(--color-text-muted);font-size:14px">No runs yet. <a href="/admin/pipeline.html">Run your first pipeline →</a></p>`
  : runs.map(r => `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--color-border)">
      <div>
        <div style="font-size:14px;font-weight:600">${r.city}, ${r.state} · ${r.niche}</div>
        <div style="font-size:12px;color:var(--color-text-muted)">${new Date(r.created_at).toLocaleDateString()}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:13px">${r.leads_found ?? 0} found · ${r.leads_qualified ?? 0} qualified</div>
        <span class="status-pill status-${r.status}">${r.status}</span>
      </div>
    </div>`).join('');

// A/B/C stats
const varHTML = Object.entries(varStats).map(([v, s]) => {
  const rate = s.sent > 0 ? ((s.replied / s.sent) * 100).toFixed(1) : 0;
  const w = Math.min(100, rate * 3);
  return `<div style="margin-bottom:12px">
    <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
      <span><strong>Variant ${v}</strong> — ${s.sent} sent</span><span>${rate}% reply rate</span>
    </div>
    <div style="background:var(--color-border);border-radius:4px;height:8px">
      <div style="background:var(--color-accent);width:${w}%;height:100%;border-radius:4px;transition:width .5s"></div>
    </div>
  </div>`;
}).join('') || '<p style="color:var(--color-text-muted);font-size:14px">No sends yet.</p>';
document.getElementById('varStats').innerHTML = varHTML;

// Stage funnel
const stages = ['new','contacted','replied','interested','discovery_call','proposal_sent','negotiation','won','lost'];
const stageLabels = {new:'New',contacted:'Contacted',replied:'Replied',interested:'Interested',
  discovery_call:'Discovery Call',proposal_sent:'Proposal Sent',negotiation:'Negotiation',won:'Won',lost:'Lost'};
const allLeads = await getLeads(clientId, { qualified: true }).catch(e => { console.error('[dash] getLeads:', e?.message ?? e); return []; });
const stageCounts = {};
stages.forEach(s => stageCounts[s] = 0);
allLeads.forEach(l => { if (stageCounts[l.stage] !== undefined) stageCounts[l.stage]++; });
const maxCount = Math.max(...Object.values(stageCounts), 1);

document.getElementById('stageFunnel').innerHTML = `
  <div style="display:flex;gap:8px;align-items:flex-end;height:100px">
    ${stages.map(s => {
      const h = Math.max(8, (stageCounts[s] / maxCount) * 90);
      const color = s === 'won' ? 'var(--color-success)' : s === 'lost' ? 'var(--color-danger)' : 'var(--color-accent)';
      return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
        <span style="font-size:11px;color:var(--color-text-muted)">${stageCounts[s]}</span>
        <div style="width:100%;background:${color};opacity:.8;border-radius:4px 4px 0 0;height:${h}px"></div>
        <span style="font-size:10px;color:var(--color-text-muted);text-align:center;white-space:nowrap;transform:rotate(-30deg);transform-origin:top left;display:block;margin-top:6px">${stageLabels[s]}</span>
      </div>`;
    }).join('')}
  </div>`;

document.getElementById('sub').textContent = `Welcome back. ${runs.length} runs total.`;

// ── Brain: enhanced stats from reporter (overwrites raw counts if available) ─
if (brainStats) {
  // Update stat cards with live brain data
  document.getElementById('statsGrid').innerHTML = [
    statCard('Total Leads Found',   brainStats.total_leads,         'all time', '👥'),
    statCard('Active Leads',        brainStats.active_leads,        'with email', '✅'),
    statCard('Weekly Reply Rate',   (brainStats.weekly_reply_rate ?? 0).toFixed(1) + '%',
             brainStats.trend === 'improving' ? '↑ improving' : brainStats.trend === 'declining' ? '↓ declining' : 'stable', '💬'),
    statCard("Today's Sends",       brainStats.today_sent,          'of daily cap', '📧'),
    statCard('Pending Drafts',      brainStats.pending_drafts,      'need approval', '📬'),
    statCard('Manual DM Queue',     brainStats.pending_dm,          'no-email leads', '📲'),
  ].join('');
}

// ── Solver: show recent run errors if any ────────────────────
if (runs.length > 0) {
  const latestRun = runs[0];
  if (latestRun.errors?.length > 0) {
    const diagnosed = await diagnoseAll(latestRun.errors, clientId).catch(() => []);
    const errorHTML = diagnosed.map(renderErrorCard).join('');
    document.getElementById('alerts').innerHTML += `
      <div style="margin-bottom:16px">
        <div style="font-size:13px;font-weight:600;color:var(--color-text-muted);margin-bottom:8px">
          Last run issues (Raj auto-diagnosis):
        </div>
        ${errorHTML}
      </div>`;
  }
}
</script>

<style>
  .alert { display:flex; align-items:center; gap:12px; padding:12px 16px; border-radius:8px;
           font-size:14px; margin-bottom:12px; }
  .alert--warning { background:#fffbeb; border:1px solid #fcd34d; color:#92400e; }
  .alert--info    { background:#eff6ff; border:1px solid #93c5fd; color:#1e40af; }
  .alert-link { margin-left:auto; font-weight:600; color:inherit; text-decoration:underline; white-space:nowrap; }
  .status-pill { font-size:11px; padding:2px 8px; border-radius:10px; font-weight:600;
                 background:var(--color-surface); color:var(--color-text-muted); }
  .status-running   { background:#ede9fe; color:#7c3aed; }
  .status-completed { background:#d1fae5; color:#065f46; }
  .status-error     { background:#fee2e2; color:#991b1b; }
</style>
</body>
</html>
