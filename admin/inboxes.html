<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Inboxes — LeadFyn</title>
  <link rel="preconnect" href="https://ndwvsrtyjnaddrifafqk.supabase.co" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="modulepreload" href="/shared/auth.js">
  <link rel="modulepreload" href="/shared/ui.js">
  <link rel="stylesheet" href="/shared/attoleads-theme.css">
</head>
<body>
<div id="app"></div>
<script type="module">
import { injectLeadFynTheme, injectSharedCSS, adminNav } from '/shared/ui.js';
import { requireAuth, getClientId } from '/shared/auth.js';
injectLeadFynTheme();
try { requireAuth(); } catch(e){}
if (typeof injectSharedCSS === 'function') injectSharedCSS();
const CID = (typeof getClientId==='function' && getClientId()) || 'dc076116-c6fa-4f27-ad91-cfbd2e871a48';
const ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kd3ZzcnR5am5hZGRyaWZhZnFrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4ODMxMDgsImV4cCI6MjA5MzQ1OTEwOH0.7XoOKB74DGiXac3cfSSiyvREuWZ7qbQ2QbxE6d1rnlM';
const BASE = 'https://ndwvsrtyjnaddrifafqk.supabase.co/rest/v1';

const ICONS = ['\u{1F4EE}','\u{1F4EC}','\u{1F4ED}','\u{1F4EA}'];
const ICON_BG = ['#eef2ff','#ecfdf5','#fff7ed','#fef2f2'];
const ICON_FG = ['#4f46e5','#059669','#d97706','#dc2626'];

function idxFor(id, n){ return parseInt(String(id).replace(/-/g,'').slice(-6),16) % n; }

function pill(status, isPrimary){
  var s = (status||'').toLowerCase();
  var bg, fg, label;
  if (isPrimary){ bg='#eff6ff'; fg='#1d4ed8'; label='Primary'; }
  else if (s==='healthy' || s==='active'){ bg='#ecfdf5'; fg='#059669'; label='Healthy'; }
  else if (s==='warming'){ bg='#fffbeb'; fg='#b45309'; label='Warming'; }
  else if (s==='paused'){ bg='#fef2f2'; fg='#dc2626'; label='Paused'; }
  else { bg='#f3f4f6'; fg='#6b7280'; label=status||'-'; }
  return '<span style="display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600;background:'+bg+';color:'+fg+'">'+label+'</span>';
}
function statRow(label, val){
  return '<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-top:1px solid #f1f1f4;font-size:13px"><span style="color:#6b7280">'+label+'</span><span style="color:#111;font-weight:600">'+val+'</span></div>';
}
function bar(sent, cap){
  var pct = cap>0 ? Math.min(100, Math.round(sent/cap*100)) : 0;
  var col = pct>=100 ? '#059669' : (pct>0 ? '#2563eb' : '#e5e7eb');
  return '<div style="margin-top:10px"><div style="display:flex;justify-content:space-between;font-size:11px;color:#9ca3af;margin-bottom:4px"><span>Today sending</span><span>'+sent+' / '+cap+'</span></div><div style="height:7px;border-radius:999px;background:#f1f1f4;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:'+col+';border-radius:999px"></div></div></div>';
}

document.getElementById('app').innerHTML = adminNav('Inboxes') +
  '<main class="main"><div class="page-header"><h1>\u{1F4EE} Inboxes</h1><p style="color:#6b7280;font-size:13px;margin-top:2px">Every sending mailbox on attoleads.com. Leads are split automatically so no prospect is ever emailed twice, and both inboxes run the same daily automations.</p></div>'+
  '<div class="page-body"><div id="inbGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px">'+
  '<div class="card" style="padding:16px;color:#6b7280;font-size:13px">Loading inboxes...</div></div>'+
  '<div style="margin-top:14px"><a href="/admin/add-inbox.html" style="display:inline-block;padding:9px 16px;border-radius:8px;background:#111;color:#fff;font-size:13px;font-weight:600;text-decoration:none">+ Add another inbox</a></div>'+
  '<div id="inbNote" style="margin-top:12px;font-size:12px;color:#9ca3af"></div></div></main>';

(async function(){
  try{
    var raw = localStorage.getItem('sb-ndwvsrtyjnaddrifafqk-auth-token');
    if(!raw){ document.getElementById('inbGrid').innerHTML='<div class="card" style="padding:16px;color:#6b7280">Sign in to view your inboxes.</div>'; return; }
    var tok = JSON.parse(raw).access_token;
    var H = { apikey:ANON, Authorization:'Bearer '+tok };

    var inboxes = await fetch(BASE+'/sending_inboxes?client_id=eq.'+CID+'&order=is_primary.desc,created_at.asc&select=*',{headers:H}).then(function(r){return r.json();});
    if(!Array.isArray(inboxes) || !inboxes.length){ document.getElementById('inbGrid').innerHTML='<div class="card" style="padding:16px;color:#6b7280">No inboxes found yet. Click Add another inbox to connect one.</div>'; return; }
    var N = inboxes.length;

    var drafts = await fetch(BASE+'/outreach_log?client_id=eq.'+CID+'&status=eq.draft&select=id,lead_id&limit=2000',{headers:H}).then(function(r){return r.json();}).catch(function(){return [];});
    var pendingBy = new Array(N).fill(0);
    (drafts||[]).forEach(function(d){ var key=d.lead_id||d.id; pendingBy[ idxFor(key, N) ]++; });

    var leads = await fetch(BASE+'/leads?client_id=eq.'+CID+'&select=id&limit=5000',{headers:H}).then(function(r){return r.json();}).catch(function(){return [];});
    var assignedBy = new Array(N).fill(0);
    (leads||[]).forEach(function(l){ assignedBy[ idxFor(l.id, N) ]++; });

    var html = inboxes.map(function(ib, i){
      var sq = '<div style="width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;background:'+ICON_BG[i%4]+';color:'+ICON_FG[i%4]+'">'+ICONS[i%4]+'</div>';
      var head = '<div style="display:flex;align-items:center;gap:12px">'+sq+'<div style="min-width:0"><div style="font-weight:700;font-size:15px;color:#111;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+ib.email+'</div><div style="margin-top:4px">'+pill(ib.status, ib.is_primary)+'</div></div></div>';
      var connected = ib.gmail_refresh ? '✅ Connected' : '⚠️ Not connected';
      var rows = statRow('Role', ib.is_primary ? 'Primary sender' : 'Secondary sender')
        + statRow('Daily cap', (ib.daily_cap||0)+' / day')
        + statRow('Warmup day', ib.warmup_day ? ('Day '+ib.warmup_day) : '-')
        + statRow('Gmail', connected)
        + statRow('Leads assigned', assignedBy[i].toLocaleString())
        + statRow('Pending to send', pendingBy[i].toLocaleString());
      return '<div class="card" style="padding:16px">'+head+ bar(ib.sent_today||0, ib.daily_cap||0) +'<div style="margin-top:10px">'+rows+'</div></div>';
    }).join('');
    document.getElementById('inbGrid').innerHTML = html;

    var totPending = pendingBy.reduce(function(a,b){return a+b;},0);
    document.getElementById('inbNote').innerHTML = 'Assignment is computed live from each lead ID, so it never double-sends. Total fresh drafts queued across all inboxes: <b>'+totPending+'</b>. Follow-ups are queued separately and not shown in this count.';
  }catch(e){
    document.getElementById('inbGrid').innerHTML='<div class="card" style="padding:16px;color:#dc2626">Could not load inboxes: '+(e&&e.message||e)+'</div>';
  }
})();
</script>
</body>
</html>
