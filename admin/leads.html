<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Leads — LeadFyn</title>
  <link rel="preconnect" href="https://ndwvsrtyjnaddrifafqk.supabase.co" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="modulepreload" href="/shared/auth.js">
  <link rel="modulepreload" href="/shared/ui.js">
  <link rel="modulepreload" href="/shared/db.js">
  <link rel="modulepreload" href="/shared/api.js">
  <link rel="stylesheet" href="/shared/attoleads-theme.css">
</head>
<body>
<div id="app">Loading…</div>

<script type="module">
  import { injectLeadFynTheme } from '/shared/ui.js';
  injectLeadFynTheme();
import { requireAuth, getClientId, supabase, SUPABASE_URL } from '/shared/auth.js';
import { adminNav, injectSharedCSS, toast, channelBadge, pipelineProgress, modal, closeModal, dataTable } from '/shared/ui.js';
import { getLeads, updateLead, setDoNotContact, getChannels } from '/shared/db.js';

injectSharedCSS();
const auth = await requireAuth('admin');
const clientId = await getClientId();

document.getElementById('app').innerHTML = `
  ${adminNav('Leads')}
  <main class="main">
    <div class="page-header">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px">
        <div>
          <h1 class="page-title">Leads</h1>
          <p class="page-sub">All qualified leads with contact channels found</p>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button id="sheetsBtn" class="btn" style="display:flex;align-items:center;gap:6px;padding:8px 14px;font-size:13px;font-weight:700;background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.25);color:#4ade80;border-radius:9px;cursor:pointer" onclick="exportToSheets()">
            <span>📊</span> Export to Google Sheets
          </button>
          <button id="siteBtn" class="btn" style="display:flex;align-items:center;gap:6px;padding:8px 14px;font-size:13px;font-weight:700;background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.25);color:#a5b4fc;border-radius:9px;cursor:pointer" onclick="generateTopSite()">
            <span>🌐</span> Generate Demo Site
          </button>
        </div>
      </div>
    </div>
    <div class="page-body">
      <!-- Filters -->
      <div class="card" style="margin-bottom:16px;padding:14px">
        <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center">
          <input type="text" id="searchInput" placeholder="Search business name…"
            oninput="filterLeads()" style="padding:8px 12px;border:1px solid var(--color-border);border-radius:6px;font-size:14px;width:240px">
          <select id="stageFilter" onchange="filterLeads()" style="padding:8px;border:1px solid var(--color-border);border-radius:6px;font-size:14px">
            <option value="">All stages</option>
            <option value="new">New</option><option value="contacted">Contacted</option>
            <option value="replied">Replied</option><option value="interested">Interested</option>
            <option value="won">Won</option><option value="lost">Lost</option>
          </select>
          <select id="emailFilter" onchange="filterLeads()" style="padding:8px;border:1px solid var(--color-border);border-radius:6px;font-size:14px">
            <option value="">All contact status</option>
            <option value="has_email">Has email</option>
            <option value="no_email">No email</option>
            <option value="dnc">Do Not Contact</option>
          </select>
          <select id="tempFilter" onchange="filterLeads()" style="padding:8px;border:1px solid var(--color-border);border-radius:6px;font-size:14px">
            <option value="">🌡️ All temps</option>
            <option value="hot">🔴 Hot (Interested)</option>
            <option value="warm">🟡 Warm (Replied)</option>
            <option value="cold">🔵 Cold (Contacted)</option>
            <option value="new">⚪ New</option>
          </select>
          <span id="leadCount" style="margin-left:auto;font-size:13px;color:var(--color-text-muted)"></span>
        </div>
      </div>

      <!-- Table -->
      <div class="card">
        <div id="leadsTable">Loading…</div>
      </div>
    </div>
  </main>`;

let allLeads = [];
let filtered = [];

allLeads = await getLeads(clientId);
filtered  = [...allLeads];
renderTable();

function getTemperature(lead) {
  if (lead.do_not_contact) return 'dead';
  switch (lead.stage) {
    case 'interested': return 'hot';
    case 'replied':    return 'warm';
    case 'contacted':  return 'cold';
    case 'new':        return 'new';
    case 'won':        return 'won';
    case 'lost':       return 'dead';
    default:           return 'new';
  }
}

function tempBadge(lead) {
  const t = getTemperature(lead);
  const map = {
    hot:  { icon: '🔴', label: 'Hot',  bg: 'rgba(239,68,68,.12)',   color: '#f87171' },
    warm: { icon: '🟡', label: 'Warm', bg: 'rgba(234,179,8,.12)',   color: '#facc15' },
    cold: { icon: '🔵', label: 'Cold', bg: 'rgba(59,130,246,.12)',  color: '#60a5fa' },
    new:  { icon: '⚪', label: 'New',  bg: 'rgba(148,163,184,.1)', color: '#94a3b8' },
    won:  { icon: '✅', label: 'Won',  bg: 'rgba(34,197,94,.12)',   color: '#4ade80' },
    dead: { icon: '❌', label: 'Dead', bg: 'rgba(100,116,139,.1)', color: '#64748b' },
  };
  const m = map[t] || map.new;
  return `<span style="font-size:12px;padding:2px 8px;border-radius:10px;font-weight:700;background:${m.bg};color:${m.color}">${m.icon} ${m.label}</span>`;
}

window.filterLeads = function() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const stage  = document.getElementById('stageFilter').value;
  const email  = document.getElementById('emailFilter').value;
  const temp   = document.getElementById('tempFilter').value;

  filtered = allLeads.filter(l => {
    if (search && !l.business_name.toLowerCase().includes(search)) return false;
    if (stage  && l.stage !== stage) return false;
    if (email === 'has_email' && !l.email) return false;
    if (email === 'no_email'  && l.email)  return false;
    if (email === 'dnc'       && !l.do_not_contact) return false;
    if (temp && getTemperature(l) !== temp) return false;
    return true;
  });
  renderTable();
};

function renderTable() {
  document.getElementById('leadCount').textContent = `${filtered.length} leads`;

  const cols = [
    { key: 'business_name', label: 'Business',
      render: (v, r) => `<div style="font-weight:600">${v}</div><div style="font-size:11px;color:var(--color-text-muted)">${r.city}, ${r.state}</div>` },
    { key: 'niche',  label: 'Niche',  render: v => `<span style="font-size:13px">${v ?? '—'}</span>` },
    { key: 'score',  label: 'Score',  render: v => `<strong>${v}/10</strong>` },
    { key: 'stage',  label: 'Temp',   render: (_, r) => tempBadge(r) },
    { key: 'email',  label: 'Email',  render: (v, r) => v
        ? `<span style="font-size:12px">${v}<br><span class="conf-${r.email_confidence}">${r.email_confidence ?? ''}</span></span>`
        : '<span style="color:var(--color-text-muted)">—</span>' },
    { key: 'channels', label: 'Channels',
      render: (_, r) => channelBadge(r.contact_channels ?? []) },
    { key: 'stage', label: 'Stage',
      render: v => `<span class="stage-pill stage-${v}">${v?.replace('_',' ') ?? '—'}</span>` },
    { key: 'do_not_contact', label: 'DNC',
      render: v => v ? '<span style="color:var(--color-danger);font-weight:600">🚫 DNC</span>' : '' },
    { key: 'demo_url', label: 'Demo Site',
      render: (v, r) => v
        ? `<a href="${v}" target="_blank" style="font-size:11px;color:#818cf8;font-weight:700">🌐 View Site</a>`
        : `<button style="font-size:11px;padding:3px 9px;border-radius:6px;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.2);color:#a5b4fc;cursor:pointer" onclick="genSite('${r.id}',event)">Generate</button>` },
    { key: 'id', label: '',
      render: (v, r) => `<button class="btn" style="font-size:12px;padding:4px 10px" onclick="openLead('${v}')">View</button>` }
  ];

  // Fetch channels for display (join already included if using getLeadWithChannels)
  document.getElementById('leadsTable').innerHTML = dataTable(cols, filtered, {
    emptyMsg: 'No leads found. Run a pipeline to start finding businesses.',
    colCount: 10
  });
}

// ── Export all leads to Google Sheets ────────────────────────
window.exportToSheets = async function() {
  const btn = document.getElementById('sheetsBtn');
  btn.disabled = true; btn.innerHTML = '⟳ Exporting…';
  try {
    const { data: { session } } = await supabase.auth.getSession();
    const res = await fetch(`${SUPABASE_URL}/functions/v1/sheets-export`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` },
      body: JSON.stringify({ client_id: clientId })
    });
    const json = await res.json();
    if (!res.ok || json.error) {
      toast(json.error || 'Export failed', 'error'); return;
    }
    toast(`✓ ${json.rows_written} leads exported to Google Sheets!`, 'success');
    // Open the sheet in a new tab
    if (json.sheet_url) window.open(json.sheet_url, '_blank');
  } catch(e) {
    toast('Export error: ' + e.message, 'error');
  } finally {
    btn.disabled = false; btn.innerHTML = '<span>📊</span> Export to Google Sheets';
  }
};

// ── Generate demo site for top-scored lead ────────────────────
window.generateTopSite = async function() {
  const top = [...allLeads].sort((a,b) => (b.score||0)-(a.score||0)).find(l => !l.demo_url);
  if (!top) { toast('All leads already have demo sites!', 'info'); return; }
  await genSite(top.id, null, true);
};

// ── Generate demo site for a specific lead ────────────────────
window.genSite = async function(leadId, evt, isTop = false) {
  if (evt) evt.target.textContent = '⟳';
  const btn = document.getElementById('siteBtn');
  if (isTop) { btn.disabled = true; btn.innerHTML = '⟳ Generating…'; }

  const lead = allLeads.find(l => l.id === leadId);
  toast(`Generating demo site for ${lead?.business_name || 'lead'}… (30-60 sec)`, 'info');

  try {
    const { data: { session } } = await supabase.auth.getSession();
    const res = await fetch(`${SUPABASE_URL}/functions/v1/generate-site`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` },
      body: JSON.stringify({ lead_id: leadId, client_id: clientId })
    });
    const json = await res.json();
    if (!res.ok || json.error) { toast(json.error || 'Generation failed', 'error'); return; }

    // Update in-memory lead — only set demo_url if we got a real URL back
    const idx = allLeads.findIndex(l => l.id === leadId);
    if (idx >= 0 && json.demo_url) allLeads[idx].demo_url = json.demo_url;
    filterLeads();

    if (json.demo_url) {
      toast(`🌐 Demo site is live — opening now!`, 'success');
      window.open(json.demo_url, '_blank');
    } else if (json.deployed === false) {
      toast('HTML generated but no Vercel token — add Vercel token in Credentials to get a live URL', 'warning');
    } else {
      toast('Deployment timed out — try the URL in a minute', 'warning');
    }
  } catch(e) {
    toast('Site error: ' + e.message, 'error');
  } finally {
    if (isTop) { btn.disabled = false; btn.innerHTML = '<span>🌐</span> Generate Demo Site'; }
  }
};

window.openLead = async function(leadId) {
  const lead = allLeads.find(l => l.id === leadId);
  if (!lead) return;
  const channels = await getChannels(leadId);

  modal(`${lead.business_name}`, `
    <div style="font-size:14px">
      ${pipelineProgress(lead.stage)}
      <div style="margin-top:16px;display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div><strong>Address:</strong> ${lead.address ?? '—'}</div>
        <div><strong>Phone:</strong> ${lead.phone ?? '—'}</div>
        <div><strong>Website:</strong> ${lead.website ? `<a href="${lead.website}" target="_blank">${lead.website}</a>` : '—'}</div>
        <div><strong>Demo Site:</strong> ${lead.demo_url ? `<a href="${lead.demo_url}" target="_blank" style="color:#818cf8;font-weight:700">🌐 View Live Demo</a>` : `<button style="font-size:12px;padding:3px 10px;border-radius:6px;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.2);color:#a5b4fc;cursor:pointer" onclick="genSite('${lead.id}',null,false);closeModal()">Generate Site</button>`}</div>
        <div><strong>Rating:</strong> ${lead.google_rating ?? '—'} ⭐ (${lead.review_count ?? 0} reviews)</div>
        <div><strong>Email:</strong> ${lead.email ?? 'Not found'}</div>
        <div><strong>Confidence:</strong> ${lead.email_confidence ?? '—'} (${lead.email_source ?? '—'})</div>
      </div>
      <div style="margin-top:14px">
        <strong>Contact Channels Found:</strong>
        <div style="margin-top:8px">${channelBadge(channels)}</div>
      </div>
      ${lead.do_not_contact ? '<div style="margin-top:12px;padding:8px;background:#fee2e2;border-radius:6px;color:#991b1b;font-size:13px">🚫 Do Not Contact flag is set — no outreach will be sent</div>' : ''}
    </div>`,
    [
      ...(lead.do_not_contact ? [] : [{ label: '🚫 Set Do Not Contact', action: async () => {
        await setDoNotContact(leadId);
        const idx = allLeads.findIndex(l => l.id === leadId);
        if (idx >= 0) allLeads[idx].do_not_contact = true;
        filtered = filtered.map(l => l.id === leadId ? { ...l, do_not_contact: true } : l);
        closeModal(); renderTable();
        toast('Do Not Contact flag set', 'warning');
      }}]),
      { label: 'Close', action: closeModal }
    ]
  );
};
</script>

<style>
  .conf-high   { color: var(--color-success); font-weight:600; }
  .conf-medium { color: var(--color-warning);  font-weight:600; }
  .conf-low    { color: var(--color-text-muted); }
  .stage-pill  { font-size:11px; padding:2px 8px; border-radius:10px; background:var(--color-surface);
                 font-weight:600; white-space:nowrap; }
  .stage-won  { background:#d1fae5; color:#065f46; }
  .stage-lost { background:#fee2e2; color:#991b1b; }
  .stage-interested { background:#ede9fe; color:#7c3aed; }
</style>
</body>
</html>
