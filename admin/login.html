<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — LeadFyn</title>
  <link rel="preconnect" href="https://ndwvsrtyjnaddrifafqk.supabase.co" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f;
      --card: #12121a;
      --border: #1e1e2e;
      --accent: #6366f1;
      --accent2: #8b5cf6;
      --text: #e2e8f0;
      --muted: #64748b;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -20%, rgba(99,102,241,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 80% 80%, rgba(139,92,246,0.10) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      position: relative;
      z-index: 1;
      box-shadow:
        0 0 0 1px rgba(99,102,241,0.08),
        0 24px 80px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.05);
    }
    .logo {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #fff;
      margin-bottom: 8px;
      text-align: center;
    }
    .logo em { font-style: normal; color: var(--accent); }
    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 40px;
    }
    .btn-google {
      width: 100%;
      padding: 14px 20px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #1a1a2e;
      color: var(--text);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .btn-google:hover {
      background: #1e1e38;
      border-color: var(--accent);
      box-shadow: 0 0 20px rgba(99,102,241,0.2);
      transform: translateY(-1px);
    }
    .btn-google:active { transform: translateY(0); }
    .btn-google svg { flex-shrink: 0; }
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
      color: var(--muted);
      font-size: 13px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .form-group { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #0f0f1a;
      color: var(--text);
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--accent); }
    .btn-primary {
      width: 100%;
      padding: 13px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
      margin-top: 8px;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .status {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 13px;
      text-align: center;
      display: none;
    }
    .status.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #f87171; display: block; }
    .status.success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #4ade80; display: block; }
    .back-link {
      text-align: center;
      margin-top: 28px;
      font-size: 13px;
      color: var(--muted);
    }
    .back-link a { color: var(--accent); text-decoration: none; }
    .back-link a:hover { text-decoration: underline; }
    .badge {
      display: inline-block;
      background: rgba(99,102,241,0.15);
      border: 1px solid rgba(99,102,241,0.3);
      color: var(--accent);
      font-size: 11px;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin: 0 auto 24px;
      display: block;
      text-align: center;
      width: fit-content;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Lead<em>Fyn</em></div>
    <div class="subtitle">Sign in to your admin control center</div>
    <span class="badge">Admin Access</span>

    <div class="form-group">
      <label>Email address</label>
      <input type="email" id="email" placeholder="admin@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"
             onkeydown="if(event.key==='Enter') loginEmail()">
    </div>

    <button class="btn-primary" id="btnEmail" onclick="loginEmail()">Sign In →</button>

    <div id="status" class="status"></div>

    <div class="back-link">
      <a href="/">← Back to LeadFyn.com</a>
    </div>
  </div>

  <script type="module">
    import { supabase } from '/shared/auth.js';
    import { routeByRole } from '/shared/router.js';

    // If already logged in, go straight to dashboard
    const { data: { session } } = await supabase.auth.getSession();
    if (session) { routeByRole(); }

    const status = (msg, type) => {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status ' + type;
    };

    window.loginEmail = async () => {
      const email = document.getElementById('email').value.trim();
      const pw = document.getElementById('password').value;
      if (!email || !pw) { status('Enter email and password.', 'error'); return; }
      const btn = document.getElementById('btnEmail');
      btn.disabled = true; btn.textContent = 'Signing in...';
      const { error } = await supabase.auth.signInWithPassword({ email, password: pw });
      if (error) {
        status(error.message, 'error');
        btn.disabled = false; btn.textContent = 'Sign In →';
      } else {
        status('Signed in! Redirecting...', 'success');
        routeByRole();
      }
    };
  </script>
</body>
</html>
