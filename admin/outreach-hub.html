// ── Load all data ─────────────────────────────────────────────
const [dmQueue, client, allLeads, todaySent] = await Promise.all([
  getManualQueue(clientId),
  getClient(clientId),
  getLeads(clientId, { qualified: true }),
  getTodaySendCount(clientId)
]);

// Load email queue:
// draft = needs approval, needs_sender = previously failed (Gmail was disconnected)
const emailQueueRes = await fetch(
  `${SUPA}/rest/v1/outreach_log?client_id=eq.${clientId}&status=in.(draft,needs_sender)&channel=eq.email&follow_up_seq=eq.0&select=id,lead_id,subject,body,status,scheduled_at,leads(business_name,email,city,state,niche,score,demo_url)&order=created_at.asc`,
  { headers: { apikey: ANON, Authorization: `Bearer ${ANON}` } }
);
let emailQueue = await emailQueueRes.json();
if (!Array.isArray(emailQueue)) emailQueue = [];

// Gmail connected = has access token right now
const gmailConnected = !!client.gmail_access;
const needsSenderIds = emailQueue.filter(r => r.status === 'needs_sender').map(r => r.id);

// ── Daily cap bar ─────────────────────────────────────────────
const cap = client.daily_email_cap ?? 20;

  <div style="font-size:12px;color:var(--color-text-muted);margin-top:6px">
    ${todaySent === 0 ? '✅ No emails sent yet today — approve below to send' : `${cap - todaySent} sends remaining · Resets at midnight UTC`}

document.getElementById('emailCount').textContent = emailQueue.length;
document.getElementById('dmCount').textContent = dmQueue.length;

// ── Tab switching ─────────────────────────────────────────────
let activeTab = 'email';
window.setTab = function(tab) {
  activeTab = tab;

  document.getElementById('tabDM').className    = tab === 'dm'    ? 'btn btn-primary' : 'btn';

  if (tab === 'email') renderEmailQueue();
  else if (tab === 'dm') renderDMQueue();
  else renderAllLeads();
};

// ── EMAIL QUEUE TAB ────────────────────────────────────────────
let currentModalId = null;

function renderEmailQueue() {
  const el = document.getElementById('tabContent');

  if (emailQueue.length === 0) {
    el.innerHTML = `
      <div style="text-align:center;padding:60px;color:var(--color-text-muted)">
        <div style="font-size:40px;margin-bottom:12px">✅</div>
        <div style="font-size:16px;font-weight:600">No emails pending approval</div>
        <div style="font-size:14px;margin-top:4px">Run the pipeline to generate new leads and outreach</div>
      </div>`;
    return;
  }

  const draftCount = emailQueue.filter(r => r.status === 'draft').length;
  const failedCount = emailQueue.filter(r => r.status === 'needs_sender').length;

  // Build the appropriate banner based on current Gmail state
  let gmailBanner = '';
  if (failedCount > 0) {
    if (gmailConnected) {
      gmailBanner = `<div style="background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.4);border-radius:10px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
        <div>
          <div style="font-weight:700;color:#6366f1;font-size:14px">✅ Gmail reconnected — ${failedCount} email${failedCount!==1?'s':''} ready to retry</div>
          <div style="font-size:12px;color:var(--color-text-muted);margin-top:3px">Click "Retry Failed" to resend the emails that previously failed.</div>
        </div>
        <button class="btn" onclick="retryFailed()" style="background:#6366f1;color:#fff;font-weight:700;font-size:13px;padding:8px 16px;white-space:nowrap">🔄 Retry Failed Emails</button>
      </div>`;
    } else {
      gmailBanner = `<div style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.4);border-radius:10px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
        <div>
          <div style="font-weight:700;color:#ef4444;font-size:14px">⚠️ Gmail disconnected — ${failedCount} email${failedCount!==1?'s':''} failed to send</div>
          <div style="font-size:12px;color:var(--color-text-muted);margin-top:3px">Reconnect Gmail then come back to retry.</div>
        </div>
        <a href="/admin/credentials.html" class="btn" style="background:#ef4444;color:#fff;font-weight:700;text-decoration:none;font-size:13px;padding:8px 16px;white-space:nowrap">🔗 Reconnect Gmail</a>
      </div>`;
    }
  }

  el.innerHTML = `
    ${gmailBanner}
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:12px">
      <div>
        <span style="font-weight:700;font-size:15px">${emailQueue.length} email${emailQueue.length !== 1 ? 's' : ''} pending</span>
        <span style="font-size:13px;color:var(--color-text-muted);margin-left:8px">via Sales@attoleads.com · ${draftCount + failedCount} ready to send</span>
      </div>
      <button class="btn btn-success" onclick="sendAll()" style="font-weight:700;font-size:14px;padding:10px 20px" ${!gmailConnected && draftCount === 0 ? 'disabled title="Reconnect Gmail first"' : ''}>
        ✈️ Approve & Send All (${emailQueue.length})
      </button>
    </div>

    ${emailQueue.map((row, i) => {
      const lead = row.leads || {};
      const subject = row.subject || '(no subject)';
      const bodyPreview = (row.body || '').slice(0, 180).replace(/\n/g, ' ');
      const hasDemo = (row.body || '').includes('vercel.app');
      const isDraft = row.status === 'draft';
      const isFailed = row.status === 'needs_sender';
      const statusBadge = isFailed
        ? `<span style="background:rgba(239,68,68,.15);color:#ef4444;font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;border:1px solid rgba(239,68,68,.4);vertical-align:middle;margin-left:8px">❌ GMAIL EXPIRED</span>`
        : isDraft
          ? `<span style="background:rgba(245,158,11,.15);color:#f59e0b;font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;border:1px solid rgba(245,158,11,.4);vertical-align:middle;margin-left:8px">⏳ NEEDS APPROVAL</span>`
          : `<span style="background:rgba(16,185,129,.15);color:#10b981;font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;border:1px solid rgba(16,185,129,.4);vertical-align:middle;margin-left:8px">✅ APPROVED</span>`;

              <div style="font-size:12px;color:var(--color-text-muted)">${lead.city || ''}, ${lead.state || ''} · ${lead.niche || ''} · Score ${lead.score || '?'}/10</div>
              <div style="font-size:12px;margin-top:4px">
                <span style="color:var(--color-text-muted)">To:</span>
                <strong>${lead.email || '—'}</strong>

              <div style="font-size:13px;font-weight:600;margin-top:6px;color:var(--color-text)">${subject}</div>

                ✈️ Send

                👁 Preview
              </button>
            </div>
          </div>
          <div style="font-size:12px;color:var(--color-text-muted);margin-top:10px;line-height:1.5;border-top:1px solid var(--color-border);padding-top:10px">
            ${bodyPreview}…
          </div>
          ${lead.demo_url ? `
          <div style="margin-top:10px">
            <a href="${lead.demo_url}" target="_blank" class="btn" style="font-size:12px;padding:6px 12px;text-decoration:none">

            </a>
          </div>` : ''}
        </div>`;
    }).join('')}`;
}

// ── Preview / Edit modal ──────────────────────────────────────
let currentModalIdx = null;

window.previewEmail = function(idx) {
  const row = emailQueue[idx];
  const lead = row.leads || {};
  currentModalId  = row.id;
  currentModalIdx = idx;

  document.getElementById('modalTitle').textContent   = lead.business_name || 'Email Preview';
  document.getElementById('modalTo').textContent      = lead.email || '—';
  document.getElementById('modalSubject').value       = row.subject || '';
  document.getElementById('modalBody').value          = row.body || '';
  document.getElementById('modalSendBtn').onclick     = () => saveAndSend(idx);
  document.getElementById('emailModal').style.display = 'block';
};

window.closeModal = function() {
  document.getElementById('emailModal').style.display = 'none';
};

// Save edits to DB without sending
window.saveEdits = async function() {
  if (!currentModalId) return;
  const newSubject = document.getElementById('modalSubject').value;
  const newBody    = document.getElementById('modalBody').value;

  await fetch(`${SUPA}/rest/v1/outreach_log?id=eq.${currentModalId}`, {
    method: 'PATCH',
    headers: { apikey: ANON, Authorization: `Bearer ${ANON}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ subject: newSubject, body: newBody })
  });

  // Update in-memory queue too
  if (currentModalIdx !== null) {
    emailQueue[currentModalIdx].subject = newSubject;
    emailQueue[currentModalIdx].body    = newBody;
  }
  toast('✅ Edits saved', 'success');
};

// Save edits then send
window.saveAndSend = async function(idx) {
  await saveEdits();
  closeModal();
  const row = emailQueue[idx];
  const lead = row.leads || {};
  await sendOne(row.id, lead.business_name || 'Business');
};

// ── Send one email ─────────────────────────────────────────────
window.sendOne = async function(outreachId, bizName) {
  const card = document.getElementById(`eq-${outreachId}`);
  const btn = card?.querySelector('.btn-success');
  if (btn) { btn.textContent = '⏳ Approving…'; btn.disabled = true; }

  try {
    // Step 1: Approve — set status=scheduled + scheduled_at=now
    const patchRes = await fetch(`${SUPA}/rest/v1/outreach_log?id=eq.${outreachId}`, {
      method: 'PATCH',
      headers: { apikey: ANON, Authorization: `Bearer ${ANON}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ status: 'scheduled', scheduled_at: new Date().toISOString() })
    });

    if (!patchRes.ok) throw new Error(`DB update failed: ${patchRes.status}`);

    // Step 2: Remove from UI immediately — it's approved, engine sends within the hour
    emailQueue = emailQueue.filter(r => r.id !== outreachId);
    card?.remove();
    document.getElementById('emailCount').textContent = emailQueue.length;
    if (emailQueue.length === 0) renderEmailQueue();

    // Step 3: Fire follow-up engine in background (don't await — non-blocking)
    fetch(`${FN}/follow-up-engine`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${ANON}` },
      body: '{}'
    }).then(r => r.json()).then(data => {
      const sent = data.results?.reduce((s, r) => s + (r.sent || 0), 0) ?? 0;
      if (sent > 0) toast(`✅ Sent to ${bizName}!`, 'success');
      else toast(`✅ Approved — email will send shortly`, 'success');
    }).catch(() => {});

    toast(`✅ ${bizName} approved`, 'success');
  } catch(e) {
    toast('Error: ' + e.message, 'error');
    if (btn) { btn.textContent = '✈️ Send'; btn.disabled = false; }
  }
};

// ── Send all ──────────────────────────────────────────────────
window.sendAll = async function() {
  if (emailQueue.length === 0) return;
  const btn = document.querySelector('[onclick="sendAll()"]');
  const count = emailQueue.length;
  if (btn) { btn.textContent = `⏳ Approving ${count}…`; btn.disabled = true; }

  try {
    // Approve all (draft + needs_sender) — set status=scheduled + scheduled_at=now in parallel
    const ids = emailQueue.map(r => r.id);
    await Promise.all(ids.map(id =>
      fetch(`${SUPA}/rest/v1/outreach_log?id=eq.${id}`, {
        method: 'PATCH',
        headers: { apikey: ANON, Authorization: `Bearer ${ANON}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
        body: JSON.stringify({ status: 'scheduled', scheduled_at: new Date().toISOString() })
      })
    ));

    // Remove all cards from UI immediately — they're approved
    emailQueue = [];
    document.getElementById('emailCount').textContent = 0;
    renderEmailQueue();
    toast(`✅ ${count} email${count !== 1 ? 's' : ''} approved — sending now via Sales@attoleads.com`, 'success');

    // Fire follow-up engine in background (non-blocking)
    fetch(`${FN}/follow-up-engine`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${ANON}` },
      body: '{}'
    }).then(r => r.json()).then(data => {
      const sent = data.results?.reduce((s, r) => s + (r.sent || 0), 0) ?? 0;
      if (sent > 0) toast(`📨 ${sent} email${sent !== 1 ? 's' : ''} delivered!`, 'success');
      else if (data.results?.[0]?.reason === 'daily cap reached') toast('Daily cap reached — remaining send at midnight', 'info');
    }).catch(() => {});
  } catch(e) {
    toast('Error: ' + e.message, 'error');
    if (btn) { btn.textContent = `✈️ Approve & Send All (${emailQueue.length})`; btn.disabled = false; }
  }
};

// ── Retry failed emails (needs_sender → scheduled → fire engine) ──
window.retryFailed = async function() {
  const failedIds = emailQueue.filter(r => r.status === 'needs_sender').map(r => r.id);
  if (!failedIds.length) return;
  const btn = document.querySelector('[onclick="retryFailed()"]');
  if (btn) { btn.textContent = '⏳ Retrying…'; btn.disabled = true; }
  try {
    await Promise.all(failedIds.map(id =>
      fetch(`${SUPA}/rest/v1/outreach_log?id=eq.${id}`, {
        method: 'PATCH',
        headers: { apikey: ANON, Authorization: `Bearer ${ANON}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
        body: JSON.stringify({ status: 'scheduled', scheduled_at: new Date().toISOString() })
      })
    ));
    // Update in-memory queue statuses
    emailQueue.forEach(r => { if (failedIds.includes(r.id)) r.status = 'scheduled'; });
    toast(`✅ ${failedIds.length} email${failedIds.length!==1?'s':''} queued — firing engine…`, 'success');

    // Fire follow-up engine
    const res = await fetch(`${FN}/follow-up-engine`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${ANON}` },
      body: '{}'
    });
    const data = await res.json().catch(() => ({}));
    const sent = data.results?.reduce((s, r) => s + (r.sent || 0), 0) ?? 0;
    if (sent > 0) {
      toast(`📨 ${sent} email${sent!==1?'s':''} delivered!`, 'success');
      // Remove sent emails from queue
      emailQueue = emailQueue.filter(r => r.status !== 'scheduled');
      document.getElementById('emailCount').textContent = emailQueue.length;
      renderEmailQueue();
    } else {
      toast('Engine ran but no emails sent — check Gmail connection', 'error');
      if (btn) { btn.textContent = '🔄 Retry Failed Emails'; btn.disabled = false; }
    }
  } catch(e) {
    toast('Error: ' + e.message, 'error');
    if (btn) { btn.textContent = '🔄 Retry Failed Emails'; btn.disabled = false; }
  }
};

// ── DM QUEUE ──────────────────────────────────────────────────

function renderDMQueue() {
  const el = document.getElementById('tabContent');
  if (queue.length === 0) {
    el.innerHTML = `
      <div style="text-align:center;padding:60px;color:var(--color-text-muted)">
        <div style="font-size:40px;margin-bottom:12px">🎉</div>
        <div style="font-size:16px;font-weight:600">All caught up!</div>
        <div style="font-size:14px;margin-top:4px">Every lead has been contacted via DM</div>
      </div>`;
    return;
  }

  el.innerHTML = `
    <div style="font-size:14px;font-weight:600;margin-bottom:12px;color:var(--color-text-muted)">
      ${queue.length} leads need a DM — takes ~${Math.ceil(queue.length * 0.5)} minutes
    </div>
    ${queue.map((item, i) => {
      const channels = JSON.parse(typeof item.channels_json === 'string' ? item.channels_json : JSON.stringify(item.channels_json ?? {}));
      const platformBtns = Object.entries(channels).map(([platform, url]) => {
        const icons = {facebook:'📘',instagram:'📷',linkedin:'💼',yelp:'⭐',whatsapp:'💬'};
        const icon = icons[platform] ?? '🔗';
        return url ? `<a href="${url}" target="_blank" class="btn" style="font-size:12px;padding:6px 12px;text-decoration:none">${icon} Open ${platform.charAt(0).toUpperCase()+platform.slice(1)}</a>` : '';
      }).filter(Boolean).join('');

      return `<div class="dm-card" id="dm-${item.id}">
        <div class="dm-header">
          <div>
            <span style="font-weight:700;font-size:15px">${item.leads?.business_name ?? 'Business'}</span>
            <span style="font-size:12px;color:var(--color-text-muted);margin-left:8px">${item.leads?.city ?? ''} · Score: ${item.leads?.score ?? '?'}/10</span>
          </div>
          <div style="display:flex;gap:8px;align-items:center">
            <button class="btn btn-success" style="font-size:13px" onclick="markDMSent('${item.id}')">✓ Sent</button>
            <button class="btn" style="font-size:13px" onclick="skipDM('${item.id}')">Skip</button>
          </div>
        </div>
        <div style="background:var(--color-surface);border-radius:8px;padding:14px;margin:12px 0;font-size:13px;line-height:1.6;white-space:pre-wrap">${item.dm_script}</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
          <span style="font-size:12px;color:var(--color-text-muted)">Open platform:</span>
          ${platformBtns || '<span style="font-size:12px;color:var(--color-text-muted)">No social links found</span>'}
        </div>
      </div>`;
    }).join('')}`;
}

window.markDMSent = async function(itemId) {
  await updateQueueItemStatus(itemId, 'sent');
  queue = queue.filter(q => q.id !== itemId);
  document.getElementById(`dm-${itemId}`)?.remove();
  document.getElementById('dmCount').textContent = queue.length;
  if (queue.length === 0) renderDMQueue();
  toast('Marked as sent ✓', 'success');
};

window.skipDM = async function(itemId) {
  await updateQueueItemStatus(itemId, 'skipped');
  queue = queue.filter(q => q.id !== itemId);
  document.getElementById(`dm-${itemId}`)?.remove();
  document.getElementById('dmCount').textContent = queue.length;
  if (queue.length === 0) renderDMQueue();
};

// ── ALL LEADS ─────────────────────────────────────────────────
function renderAllLeads() {
  const el = document.getElementById('tabContent');
  el.innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px">
      ${allLeads.map(l => `
        <div class="card" style="padding:16px">
          <div style="font-weight:600;margin-bottom:4px">${l.business_name}</div>
          <div style="font-size:12px;color:var(--color-text-muted);margin-bottom:10px">${l.city}, ${l.state} · ${l.niche} · Score ${l.score}/10</div>
          <div style="margin-bottom:8px">${channelBadge(l.contact_channels ?? [])}</div>
          <div style="font-size:12px;color:var(--color-text-muted)">
            ${l.email ? `✉️ ${l.email}` : '📧 No email found'}
            ${l.do_not_contact ? ' · 🚫 DNC' : ''}
          </div>
          ${l.demo_url ? `<div style="margin-top:8px"><a href="${l.demo_url}" target="_blank" class="btn" style="font-size:11px;padding:5px 10px;text-decoration:none">🌐 View demo</a></div>` : ''}
        </div>`).join('')}
    </div>`;
}

// Start on email queue tab
renderEmailQueue();
</script>
