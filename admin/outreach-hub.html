// ── Load all data ─────────────────────────────────────────────

// Load email queue:

const emailQueueRes = await fetch(
  `${SUPA}/rest/v1/outreach_log?client_id=eq.${clientId}&status=in.(draft,needs_sender)&channel=eq.email&follow_up_seq=eq.0&select=id,lead_id,subject,body,status,scheduled_at,leads(business_name,email,city,state,niche,score,demo_url)&order=created_at.asc`,

);

if (!Array.isArray(emailQueue)) emailQueue = [];

// Gmail connected = has access token right now
const gmailConnected = !!client.gmail_access;
const needsSenderIds = emailQueue.filter(r => r.status === 'needs_sender').map(r => r.id);

// ── Daily cap bar ─────────────────────────────────────────────

    <div style="background:${capColor};width:${pct}%;height:100%;border-radius:6px;transition:width .5s"></div>
  </div>
  <div style="font-size:12px;color:var(--color-text-muted);margin-top:6px">
    ${todaySent === 0 ? '✅ No emails sent yet today — approve below to send' : `${cap - todaySent} sends remaining · Resets at midnight UTC`}

document.getElementById('emailCount').textContent = emailQueue.length;
document.getElementById('dmCount').textContent = dmQueue.length;

// ── Tab switching ─────────────────────────────────────────────
let activeTab = 'email';
window.setTab = function(tab) {

  document.getElementById('tabEmail').className = tab === 'email' ? 'btn btn-primary' : 'btn';
  document.getElementById('tabDM').className    = tab === 'dm'    ? 'btn btn-primary' : 'btn';

// ── EMAIL QUEUE TAB ────────────────────────────────────────────
let currentModalId = null;

        <div>
          <div style="font-weight:700;color:#6366f1;font-size:14px">✅ Gmail reconnected — ${failedCount} email${failedCount!==1?'s':''} ready to retry</div>

        </div>
        <button class="btn" onclick="retryFailed()" style="background:#6366f1;color:#fff;font-weight:700;font-size:13px;padding:8px 16px;white-space:nowrap">🔄 Retry Failed Emails</button>
      </div>`;
    } else {
      gmailBanner = `<div style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.4);border-radius:10px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">

    }
  }

  el.innerHTML = `

      <div>
        <span style="font-weight:700;font-size:15px">${emailQueue.length} email${emailQueue.length !== 1 ? 's' : ''} pending</span>
        <span style="font-size:13px;color:var(--color-text-muted);margin-left:8px">via Sales@attoleads.com · ${draftCount + failedCount} ready to send</span>
      </div>
      <button class="btn btn-success" onclick="sendAll()" style="font-weight:700;font-size:14px;padding:10px 20px" ${!gmailConnected && draftCount === 0 ? 'disabled title="Reconnect Gmail first"' : ''}>

      const hasDemo = (row.body || '').includes('vercel.app');
      const isDraft = row.status === 'draft';
      const isFailed = row.status === 'needs_sender';
      const statusBadge = isFailed

          <div style="font-size:12px;color:var(--color-text-muted);margin-top:10px;line-height:1.5;border-top:1px solid var(--color-border);padding-top:10px">

// ── Preview / Edit modal ──────────────────────────────────────

window.previewEmail = function(idx) {
  const row = emailQueue[idx];
  const lead = row.leads || {};
  currentModalId  = row.id;

window.closeModal = function() {
  document.getElementById('emailModal').style.display = 'none';
};

// ── Modal tab switcher ─────────────────────────────────────────
window.switchModalTab = function(tab) {
  const editPane    = document.getElementById('modalEditPane');
  const previewPane = document.getElementById('modalPreviewPane');
  const editBtn     = document.getElementById('tabEditBtn');
  const previewBtn  = document.getElementById('tabPreviewBtn');

  if (tab === 'preview') {
    editPane.style.display    = 'none';
    previewPane.style.display = 'block';
    editBtn.style.background    = 'var(--color-surface)';
    editBtn.style.color         = 'var(--color-text)';
    previewBtn.style.background = '#6366f1';
    previewBtn.style.color      = '#fff';
    // Render the preview
    const body    = document.getElementById('modalBody').value;
    const subject = document.getElementById('modalSubject').value;
    const html    = buildPreviewHtml(body, subject);
    document.getElementById('emailPreviewFrame').srcdoc = html;
  } else {
    editPane.style.display    = 'block';
    previewPane.style.display = 'none';
    editBtn.style.background    = '#6366f1';
    editBtn.style.color         = '#fff';
    previewBtn.style.background = 'var(--color-surface)';
    previewBtn.style.color      = 'var(--color-text)';
  }
};

// ── Branded email preview — mirrors follow-up-engine's buildRawEmail ──────
function buildPreviewHtml(body, subject) {
  const DIVIDER = '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━';
  const rawParts = body.split(DIVIDER).map(p => p.trim()).filter(p => p.length > 0);
  let emailBodyText = body;
  let auditContent  = '';
  if (rawParts.length >= 2) {
    auditContent  = rawParts.slice(0, rawParts.length - 1).join('\n\n');
    emailBodyText = rawParts[rawParts.length - 1];
  }

  function esc(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function renderText(text) {
    return esc(text)
      .replace(/(https?:\/\/[^\s<>"]+)/g,'<a href="$1" style="color:#6366f1;font-weight:600">$1</a>')
      .replace(/\n/g,'<br>\n');
  }
  function renderAuditLines(text) {
    return text.split('\n').filter(l => l.trim()).map(line => {
      const safe = esc(line);
      const isHeader = /^[📊🤖🎯]/.test(line);
      return isHeader
        ? `<div style="font-size:13px;font-weight:800;color:#a5b4fc;margin-top:6px;margin-bottom:4px">${safe}</div>`
        : `<div style="font-size:12.5px;color:#cbd5e1;line-height:1.7;padding:2px 0 2px 8px;border-left:2px solid #3730a3">${safe}</div>`;
    }).join('\n');
  }

  const year = new Date().getFullYear();
  return `<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head>
<body style="margin:0;padding:0;background:#f1f5f9;font-family:Arial,Helvetica,sans-serif">
  <table width="100%" cellpadding="0" cellspacing="0">
    <tr>
      <td style="background:linear-gradient(135deg,#4f46e5 0%,#6366f1 50%,#818cf8 100%);padding:0">
        <table width="620" align="center" cellpadding="0" cellspacing="0" style="max-width:620px;margin:0 auto">
          <tr>
            <td style="padding:22px 32px 18px 32px">
              <div style="color:#fff;font-size:26px;font-weight:900;letter-spacing:-1px">AttoLeads</div>
              <div style="color:rgba(255,255,255,0.75);font-size:11px;margin-top:5px;letter-spacing:1.5px;text-transform:uppercase">AI-Powered Lead Generation &amp; Outreach</div>
            </td>
            <td style="padding:22px 32px 18px 0;text-align:right;vertical-align:middle">
              <a href="https://attoleads.com" style="background:rgba(255,255,255,0.15);color:#fff;text-decoration:none;font-size:11px;font-weight:700;padding:7px 16px;border-radius:20px;border:1px solid rgba(255,255,255,0.3)">attoleads.com ↗</a>
            </td>
          </tr>
          <tr><td colspan="2" style="height:4px;background:linear-gradient(90deg,#fbbf24,#f59e0b,#fbbf24)"></td></tr>
        </table>
      </td>
    </tr>
  </table>
  <table width="620" align="center" cellpadding="0" cellspacing="0" style="max-width:620px;margin:0 auto">
    <tr>
      <td style="background:#ffffff;padding:32px 36px 28px 36px">
        <div style="font-size:14px;line-height:1.85;color:#1e293b;white-space:pre-wrap">${renderText(emailBodyText)}</div>
        ${auditContent ? `
        <div style="background:#0f172a;border-radius:12px;padding:22px 24px;margin:28px 0 8px 0;border-top:4px solid #fbbf24;box-shadow:0 4px 24px rgba(15,23,42,0.18)">
          ${renderAuditLines(auditContent)}
        </div>` : ''}
      </td>
    </tr>
  </table>
  <table width="620" align="center" cellpadding="0" cellspacing="0" style="max-width:620px;margin:0 auto">
    <tr>
      <td style="background:#0f172a;padding:24px 36px">
        <div style="height:3px;background:linear-gradient(90deg,#6366f1,#818cf8,#6366f1);border-radius:2px;margin-bottom:18px"></div>
        <table width="100%" cellpadding="0" cellspacing="0">
          <tr>
            <td style="vertical-align:top">
              <div style="color:#e2e8f0;font-size:16px;font-weight:800">AttoLeads</div>
              <div style="color:#64748b;font-size:11px;margin-top:4px;line-height:1.6">AI-powered lead generation<br>for local businesses</div>
            </td>
            <td style="vertical-align:top;text-align:right">
              <a href="https://attoleads.com" style="color:#818cf8;font-size:12px;font-weight:700;text-decoration:none">attoleads.com</a><br>
              <span style="color:#475569;font-size:10px">© ${year} AttoLeads</span>
            </td>
          </tr>
        </table>
        <div style="margin-top:16px;padding-top:14px;border-top:1px solid #1e293b;font-size:10px;color:#475569;text-align:center">
          You received this because your business was identified as a strong match for our services.
          <br>To unsubscribe, reply with "unsubscribe".
        </div>
      </td>
    </tr>
  </table>
</body></html>`;
}

// Save edits to DB without sending
window.saveEdits = async function() {
  if (!currentModalId) return;
  const newSubject = document.getElementById('modalSubject').value;
  const newBody    = document.getElementById('modalBody').value;

  await fetch(`${SUPA}/rest/v1/outreach_log?id=eq.${currentModalId}`, {
    method: 'PATCH',
    headers: { apikey: ANON, Authorization: `Bearer ${ANON}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ subject: newSubject, body: newBody })
  });

  // Update in-memory queue too
  if (currentModalIdx !== null) {
    emailQueue[currentModalIdx].subject = newSubject;
    emailQueue[currentModalIdx].body    = newBody;
  }
  toast('✅ Edits saved', 'success');
};

// Save edits then send
window.saveAndSend = async function(idx) {
  await saveEdits();
  closeModal();
  const row = emailQueue[idx];
  const lead = row.leads || {};
  await sendOne(row.id, lead.business_name || 'Business');
};

// ── Send one email ─────────────────────────────────────────────
window.sendOne = async function(outreachId, bizName) {
  const card = document.getElementById(`eq-${outreachId}`);
  const btn = card?.querySelector('.btn-success');
  if (btn) { btn.textContent = '⏳ Approving…'; btn.disabled = true; }

  try {
    // Step 1: Approve — set status=scheduled + scheduled_at=now
    const patchRes = await fetch(`${SUPA}/rest/v1/outreach_log?id=eq.${outreachId}`, {
      method: 'PATCH',
      headers: { apikey: ANON, Authorization: `Bearer ${ANON}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ status: 'scheduled', scheduled_at: new Date().toISOString() })
    });

    if (!patchRes.ok) throw new Error(`DB update failed: ${patchRes.status}`);

    // Step 2: Remove from UI immediately — it's approved, engine sends within the hour
    emailQueue = emailQueue.filter(r => r.id !== outreachId);
    card?.remove();
    document.getElementById('emailCount').textContent = emailQueue.length;
    if (emailQueue.length === 0) renderEmailQueue();

    // Step 3: Fire follow-up engine in background (don't await — non-blocking)
    fetch(`${FN}/follow-up-engine`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${ANON}` },
      body: '{}'
    }).then(r => r.json()).then(data => {
      const sent = data.results?.reduce((s, r) => s + (r.sent || 0), 0) ?? 0;
      if (sent > 0) toast(`✅ Sent to ${bizName}!`, 'success');
      else toast(`✅ Approved — email will send shortly`, 'success');
    }).catch(() => {});

    toast(`✅ ${bizName} approved`, 'success');
  } catch(e) {
    toast('Error: ' + e.message, 'error');
    if (btn) { btn.textContent = '✈️ Send'; btn.disabled = false; }
  }
};

// ── Send all ──────────────────────────────────────────────────
window.sendAll = async function() {
  if (emailQueue.length === 0) return;
  const btn = document.querySelector('[onclick="sendAll()"]');
  const count = emailQueue.length;
  if (btn) { btn.textContent = `⏳ Approving ${count}…`; btn.disabled = true; }

  try {
    // Approve all (draft + needs_sender) — set status=scheduled + scheduled_at=now in parallel
    const ids = emailQueue.map(r => r.id);
    await Promise.all(ids.map(id =>
      fetch(`${SUPA}/rest/v1/outreach_log?id=eq.${id}`, {
        method: 'PATCH',
        headers: { apikey: ANON, Authorization: `Bearer ${ANON}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
        body: JSON.stringify({ status: 'scheduled', scheduled_at: new Date().toISOString() })
      })
    ));

    // Remove all cards from UI immediately — they're approved
    emailQueue = [];
    document.getElementById('emailCount').textContent = 0;
    renderEmailQueue();
    toast(`✅ ${count} email${count !== 1 ? 's' : ''} approved — sending now via Sales@attoleads.com`, 'success');

    // Fire follow-up engine in background (non-blocking)
    fetch(`${FN}/follow-up-engine`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${ANON}` },
      body: '{}'
    }).then(r => r.json()).then(data => {
      const sent = data.results?.reduce((s, r) => s + (r.sent || 0), 0) ?? 0;
      if (sent > 0) toast(`📨 ${sent} email${sent !== 1 ? 's' : ''} delivered!`, 'success');
      else if (data.results?.[0]?.reason === 'daily cap reached') toast('Daily cap reached — remaining send at midnight', 'info');
    }).catch(() => {});
  } catch(e) {
    toast('Error: ' + e.message, 'error');
    if (btn) { btn.textContent = `✈️ Approve & Send All (${emailQueue.length})`; btn.disabled = false; }
  }
};

// ── Retry failed emails (needs_sender → scheduled → fire engine) ──
window.retryFailed = async function() {
  const failedIds = emailQueue.filter(r => r.status === 'needs_sender').map(r => r.id);
  if (!failedIds.length) return;
  const btn = document.querySelector('[onclick="retryFailed()"]');
  if (btn) { btn.textContent = '⏳ Retrying…'; btn.disabled = true; }
  try {
    await Promise.all(failedIds.map(id =>
      fetch(`${SUPA}/rest/v1/outreach_log?id=eq.${id}`, {
        method: 'PATCH',
        headers: { apikey: ANON, Authorization: `Bearer ${ANON}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
        body: JSON.stringify({ status: 'scheduled', scheduled_at: new Date().toISOString() })
      })
    ));
    // Update in-memory queue statuses
    emailQueue.forEach(r => { if (failedIds.includes(r.id)) r.status = 'scheduled'; });
    toast(`✅ ${failedIds.length} email${failedIds.length!==1?'s':''} queued — firing engine…`, 'success');

    // Fire follow-up engine
    const res = await fetch(`${FN}/follow-up-engine`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${ANON}` },
      body: '{}'
    });
    const data = await res.json().catch(() => ({}));
    const sent = data.results?.reduce((s, r) => s + (r.sent || 0), 0) ?? 0;
    if (sent > 0) {
      toast(`📨 ${sent} email${sent!==1?'s':''} delivered!`, 'success');
      // Remove sent emails from queue
      emailQueue = emailQueue.filter(r => r.status !== 'scheduled');
      document.getElementById('emailCount').textContent = emailQueue.length;
      renderEmailQueue();
    } else {
      toast('Engine ran but no emails sent — check Gmail connection', 'error');
      if (btn) { btn.textContent = '🔄 Retry Failed Emails'; btn.disabled = false; }
    }
  } catch(e) {
    toast('Error: ' + e.message, 'error');
    if (btn) { btn.textContent = '🔄 Retry Failed Emails'; btn.disabled = false; }
  }
};

// ── DM QUEUE ──────────────────────────────────────────────────
let queue = [...dmQueue];

function renderDMQueue() {
  const el = document.getElementById('tabContent');
  if (queue.length === 0) {
    el.innerHTML = `
      <div style="text-align:center;padding:60px;color:var(--color-text-muted)">
        <div style="font-size:40px;margin-bottom:12px">🎉</div>
        <div style="font-size:16px;font-weight:600">All caught up!</div>
        <div style="font-size:14px;margin-top:4px">Every lead has been contacted via DM</div>
      </div>`;
    return;
  }

  el.innerHTML = `
    <div style="font-size:14px;font-weight:600;margin-bottom:12px;color:var(--color-text-muted)">
      ${queue.length} leads need a DM — takes ~${Math.ceil(queue.length * 0.5)} minutes
    </div>
    ${queue.map((item, i) => {
      const channels = JSON.parse(typeof item.channels_json === 'string' ? item.channels_json : JSON.stringify(item.channels_json ?? {}));
      const platformBtns = Object.entries(channels).map(([platform, url]) => {
        const icons = {facebook:'📘',instagram:'📷',linkedin:'💼',yelp:'⭐',whatsapp:'💬'};
        const icon = icons[platform] ?? '🔗';
        return url ? `<a href="${url}" target="_blank" class="btn" style="font-size:12px;padding:6px 12px;text-decoration:none">${icon} Open ${platform.charAt(0).toUpperCase()+platform.slice(1)}</a>` : '';
      }).filter(Boolean).join('');

      return `<div class="dm-card" id="dm-${item.id}">
        <div class="dm-header">
          <div>
            <span style="font-weight:700;font-size:15px">${item.leads?.business_name ?? 'Business'}</span>
            <span style="font-size:12px;color:var(--color-text-muted);margin-left:8px">${item.leads?.city ?? ''} · Score: ${item.leads?.score ?? '?'}/10</span>
          </div>
          <div style="display:flex;gap:8px;align-items:center">
            <button class="btn btn-success" style="font-size:13px" onclick="markDMSent('${item.id}')">✓ Sent</button>
            <button class="btn" style="font-size:13px" onclick="skipDM('${item.id}')">Skip</button>
          </div>
        </div>
        <div style="background:var(--color-surface);border-radius:8px;padding:14px;margin:12px 0;font-size:13px;line-height:1.6;white-space:pre-wrap">${item.dm_script}</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
          <span style="font-size:12px;color:var(--color-text-muted)">Open platform:</span>
          ${platformBtns || '<span style="font-size:12px;color:var(--color-text-muted)">No social links found</span>'}
        </div>
      </div>`;
    }).join('')}`;
}

window.markDMSent = async function(itemId) {
  await updateQueueItemStatus(itemId, 'sent');
  queue = queue.filter(q => q.id !== itemId);
  document.getElementById(`dm-${itemId}`)?.remove();
  document.getElementById('dmCount').textContent = queue.length;
  if (queue.length === 0) renderDMQueue();
  toast('Marked as sent ✓', 'success');
};

window.skipDM = async function(itemId) {
  await updateQueueItemStatus(itemId, 'skipped');
  queue = queue.filter(q => q.id !== itemId);
  document.getElementById(`dm-${itemId}`)?.remove();
  document.getElementById('dmCount').textContent = queue.length;
  if (queue.length === 0) renderDMQueue();
};

// ── CAMPAIGNS VIEW — per-lead full sequence status ─────────────
let _campaignsData = null;

async function loadCampaignData() {
  if (_campaignsData) return _campaignsData;
  // Load ALL outreach_log entries for this client, grouped by lead
  const res = await fetch(
    `${SUPA}/rest/v1/outreach_log?client_id=eq.${clientId}&channel=eq.email&select=id,lead_id,subject,status,follow_up_seq,scheduled_at,sent_at&order=lead_id.asc,follow_up_seq.asc&limit=500`,
    { headers:{ apikey:ANON, Authorization:`Bearer ${ANON}` } }
  );
  const rows = await res.json().catch(()=>[]);
  // Group by lead_id
  const groups = {};
  if (Array.isArray(rows)) {
    rows.forEach(r => {
      if (!groups[r.lead_id]) groups[r.lead_id] = [];
      groups[r.lead_id].push(r);
    });
  }
  _campaignsData = groups;
  return groups;
}

function seqPill(entry, label) {
  if (!entry) {
    return `<div style="text-align:center;padding:6px 10px;border-radius:8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);min-width:70px">
      <div style="font-size:9px;font-weight:700;color:#334155;margin-bottom:2px">${label}</div>
      <div style="font-size:10px;color:#1e293b">—</div>
    </div>`;
  }
  const s = entry.status;
  let bg, color, icon, dateStr = '';
  if (s === 'sent') {
    bg = 'rgba(16,185,129,.15)'; color = '#10b981'; icon = '✅';
    dateStr = entry.sent_at ? new Date(entry.sent_at).toLocaleDateString('en',{month:'short',day:'numeric'}) : '';
  } else if (s === 'draft' || s === 'needs_sender') {
    bg = 'rgba(245,158,11,.15)'; color = '#f59e0b'; icon = '⏳';
    dateStr = 'Needs approval';
  } else if (s === 'scheduled') {
    bg = 'rgba(99,102,241,.15)'; color = '#818cf8'; icon = '📅';
    dateStr = entry.scheduled_at ? new Date(entry.scheduled_at).toLocaleDateString('en',{month:'short',day:'numeric'}) : '';
  } else if (s === 'failed') {
    bg = 'rgba(239,68,68,.15)'; color = '#f87171'; icon = '❌'; dateStr = 'Failed';
  } else {
    bg = 'rgba(255,255,255,.04)'; color = '#64748b'; icon = '⏸'; dateStr = s;
  }
  return `<div style="text-align:center;padding:6px 10px;border-radius:8px;background:${bg};border:1px solid ${color}30;min-width:70px">
    <div style="font-size:9px;font-weight:700;color:${color};margin-bottom:2px">${label}</div>
    <div style="font-size:11px">${icon}</div>
    <div style="font-size:9px;color:${color};margin-top:2px">${dateStr}</div>
  </div>`;
}

async function renderAllLeads() {
  const el = document.getElementById('tabContent');
  el.innerHTML = `<div style="text-align:center;padding:40px;color:#64748b">Loading campaign data…</div>`;

  const groups = await loadCampaignData();

  // Summary counts
  const totalLeads = allLeads.length;
  const sentCount  = allLeads.filter(l => groups[l.id]?.some(r => r.follow_up_seq === 0 && r.status === 'sent')).length;
  const draftCount2 = allLeads.filter(l => groups[l.id]?.some(r => r.follow_up_seq === 0 && (r.status === 'draft' || r.status === 'needs_sender'))).length;

  el.innerHTML = `
    <!-- Summary strip -->
    <div style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap">
      <div style="background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);border-radius:10px;padding:12px 18px;flex:1;min-width:120px">
        <div style="font-size:22px;font-weight:900;color:#10b981">${sentCount}</div>
        <div style="font-size:12px;color:#94a3b8">Cold Emails Sent</div>
      </div>
      <div style="background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.3);border-radius:10px;padding:12px 18px;flex:1;min-width:120px">
        <div style="font-size:22px;font-weight:900;color:#f59e0b">${draftCount2}</div>
        <div style="font-size:12px;color:#94a3b8">Awaiting Approval</div>
      </div>
      <div style="background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.3);border-radius:10px;padding:12px 18px;flex:1;min-width:120px">
        <div style="font-size:22px;font-weight:900;color:#818cf8">${totalLeads - sentCount - draftCount2}</div>
        <div style="font-size:12px;color:#94a3b8">Follow-ups Scheduled</div>
      </div>
      <div style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:10px;padding:12px 18px;flex:1;min-width:120px">
        <div style="font-size:22px;font-weight:900;color:#f1f5f9">${totalLeads}</div>
        <div style="font-size:12px;color:#94a3b8">Total Leads</div>
      </div>
    </div>
    <div style="font-size:12px;color:#475569;margin-bottom:12px">📌 Each row = one lead · 4 pills = Cold email + Day 3 + Day 7 + Day 14 follow-ups</div>

    <!-- Lead rows -->
    <div style="display:flex;flex-direction:column;gap:10px">
      ${allLeads.map(l => {
        const seqs = groups[l.id] || [];
        const cold  = seqs.find(r => r.follow_up_seq === 0);
        const day3  = seqs.find(r => r.follow_up_seq === 1);
        const day7  = seqs.find(r => r.follow_up_seq === 2);
        const day14 = seqs.find(r => r.follow_up_seq === 3);
        const coldSent = cold?.status === 'sent';
        return `
          <div style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:16px;flex-wrap:wrap">
            <div style="flex:1;min-width:160px">
              <div style="font-weight:700;font-size:14px;color:#f1f5f9;margin-bottom:2px">${l.business_name}</div>
              <div style="font-size:11px;color:#64748b">${l.city}, ${l.state} · ${l.niche} · ⭐ ${l.score}/10</div>
              ${l.email ? `<div style="font-size:11px;color:#475569;margin-top:2px">✉️ ${l.email}</div>` : `<div style="font-size:11px;color:#ef4444;margin-top:2px">⚠️ No email</div>`}
            </div>
            <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
              ${seqPill(cold, 'COLD')}
              ${seqPill(day3, 'DAY 3')}
              ${seqPill(day7, 'DAY 7')}
              ${seqPill(day14, 'DAY 14')}
            </div>
            ${!coldSent && cold ? `<button onclick="setTab('email')" class="btn" style="font-size:11px;padding:6px 12px;white-space:nowrap">⏳ Approve</button>` : ''}
          </div>`;
      }).join('')}
    </div>`;
}
