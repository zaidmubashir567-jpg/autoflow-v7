async function populateNicheAdvisor() {
  try {
    // Load niche memory from DB
    const memRes = await fetch(
      `${SUPA}/rest/v1/niche_memory?client_id=eq.${clientId}&order=avg_score.desc&limit=20`,
      { headers:{ apikey:ANON, Authorization:`Bearer ${ANON}` } }
    );
    const memory = await memRes.json().catch(()=>[]);

    // Load pipeline_runs from last 24h
    const since24h = new Date(Date.now() - 24*60*60*1000).toISOString();
    const runsRes = await fetch(
      `${SUPA}/rest/v1/pipeline_runs?client_id=eq.${clientId}&created_at=gte.${since24h}&select=niche,city,created_at`,
      { headers:{ apikey:ANON, Authorization:`Bearer ${ANON}` } }
    );
    const recentRuns = await runsRes.json().catch(()=>[]);
    window._recentRuns = recentRuns;

    // Build picks — combine seasonal + past performance
    const memMap = {};
    if (Array.isArray(memory)) {
      memory.forEach(m => { memMap[`${m.niche}|${m.city}`] = m; });
    }

    // Top 3 picks = seasonal picks NOT run in last 24h
    const recentKeys = new Set((Array.isArray(recentRuns)?recentRuns:[]).map(r=>`${r.niche}|${r.city}`));
    let picks = JULY_PICKS.filter(p => !recentKeys.has(`${p.niche}|${p.city}`)).slice(0,3);
    if (picks.length < 3) picks = JULY_PICKS.slice(0,3); // fallback

    const advisorEl = document.getElementById('nicheAdvisorContent');
    const badgeEl   = document.getElementById('advisorBadge');
    if (badgeEl) badgeEl.textContent = `${picks.length} PICKS`;

    advisorEl.innerHTML = picks.map((p, i) => {
      const mem = memMap[`${p.niche}|${p.city}`];
      const hasRun = recentKeys.has(`${p.niche}|${p.city}`);
      const colors = ['rgba(99,102,241,.15)','rgba(139,92,246,.15)','rgba(59,130,246,.15)'];
      const borders = ['rgba(99,102,241,.4)','rgba(139,92,246,.4)','rgba(59,130,246,.4)'];
      const accentColors = ['#818cf8','#c4b5fd','#60a5fa'];
      return `
        <div onclick="advisorPick('${p.niche}','${p.city}','${p.state}')"
          style="background:${colors[i]};border:1px solid ${borders[i]};border-radius:10px;padding:14px;cursor:pointer;transition:all .2s;position:relative"
          onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 4px 20px rgba(99,102,241,.2)'"
          onmouseout="this.style.transform='none';this.style.boxShadow='none'">
          ${hasRun ? `<div style="position:absolute;top:8px;right:8px;font-size:9px;font-weight:700;padding:2px 6px;border-radius:6px;background:rgba(239,68,68,.2);color:#f87171;border:1px solid rgba(239,68,68,.3)">RAN TODAY</div>` : `<div style="position:absolute;top:8px;right:8px;font-size:9px;font-weight:700;padding:2px 6px;border-radius:6px;background:rgba(16,185,129,.15);color:#10b981;border:1px solid rgba(16,185,129,.3)">#${i+1} PICK</div>`}
          <div style="font-size:22px;margin-bottom:6px">${p.emoji}</div>
          <div style="font-weight:800;font-size:13px;color:${accentColors[i]};margin-bottom:2px">${p.niche}</div>
          <div style="font-size:11px;color:#64748b;margin-bottom:8px">📍 ${p.city}</div>
          <div style="font-size:11px;color:#94a3b8;line-height:1.4">${p.reason}</div>
          ${mem ? `<div style="margin-top:8px;font-size:10px;color:#10b981;font-weight:600">✓ Past run: avg score ${mem.avg_score}/10</div>` : ''}
        </div>`;
    }).join('');

  } catch(e) {
    document.getElementById('nicheAdvisorContent').innerHTML =
      `<div style="color:#64748b;font-size:13px;padding:10px">Advisor unavailable — run pipeline manually</div>`;
  }
}

window.advisorPick = function(niche, cityFull, state) {
  const city = cityFull.split(',')[0].trim();
  if (document.getElementById('nicheInput')) document.getElementById('nicheInput').value = niche;
  if (document.getElementById('cityInput'))  document.getElementById('cityInput').value  = city;
  if (document.getElementById('stateSelect')){
    document.getElementById('stateSelect').value = state;
  }
  // Switch to Apify mode
  if (window.setSourceMode) window.setSourceMode('apify');
  toast(`✅ Picked: ${niche} in ${city} — adjust settings then click Run`, 'success');
  // Scroll to config
  document.getElementById('configPanel')?.scrollIntoView({ behavior:'smooth', block:'start' });
};

  `📧 Daily send cap: <strong>${todaySent}/${cap}</strong> emails sent today
   ${todaySent >= cap ? ' — <span style="color:var(--color-danger)">cap reached</span>' : ''}`;

// Niche templates
window.showNicheTemplates = function() {
  const chips = document.getElementById('nicheChips');
  chips.innerHTML = NICHE_TEMPLATES.map(n =>
    `<button class="chip" onclick="selectNiche('${n}')">${n}</button>`
  ).join('');
};
window.selectNiche = function(n) {
  document.getElementById('nicheInput').value = n;
  document.getElementById('nicheChips').innerHTML = '';
};

window.toggleAutoMode = async function(on) {
  document.getElementById('manualConfig').style.display = on ? 'none' : 'block';
  document.getElementById('autoConfig').style.display  = on ? 'block' : 'none';

  if (on) {
    const scoutEl = document.getElementById('scoutPreview');
    scoutEl.innerHTML = `<div style="color:var(--color-text-muted);font-size:13px">🔍 Scouting best opportunity…</div>`;
    try {
      const pick = await pickNextOpportunity(clientId, {
        state: client.default_state,
        cities: client.target_cities ? JSON.parse(client.target_cities) : undefined
      });
      scoutEl.innerHTML = `
        <div style="font-size:13px">
          <div style="font-weight:600;margin-bottom:6px">Scout recommendation:</div>
          <div style="margin-bottom:4px">📍 <strong>${pick.niche}</strong> in <strong>${pick.city}, ${pick.state}</strong></div>
          <div style="color:var(--color-text-muted);font-size:12px">${pick.reason}</div>
        </div>`;
      // Store pick for startPipeline
      window._scoutPick = pick;
    } catch {
      scoutEl.innerHTML = `<div style="color:var(--color-text-muted);font-size:12px">Scout unavailable — default rotation will be used</div>`;
      window._scoutPick = null;
    }
  } else {
    window._scoutPick = null;
  }
};

// Stop pipeline
let _stopRequested = false;
window.stopPipeline = function() {
  _stopRequested = true;
  const stopBtn = document.getElementById('stopBtn');
  const runBtn  = document.getElementById('runBtn');
  if (stopBtn) { stopBtn.textContent = '⏹ Stopping…'; stopBtn.disabled = true; }
  if (runBtn)  { runBtn.disabled = false; }
  appendChatMsg({ role:'system', type:'warning', message:'⏹ Stop requested — will halt after current business finishes.', created_at: new Date().toISOString() });
};

// Start pipeline
let activeRunId = null;
let subscription = null;

window.startPipeline = async function() {
  const autoMode = document.getElementById('autoMode').checked;
  let city   = document.getElementById('cityInput')?.value?.trim();
  let state  = document.getElementById('stateSelect')?.value;
  let niche  = document.getElementById('nicheInput')?.value?.trim();

  if (autoMode) {
    // Use scout pick or fetch fresh one
    const pick = window._scoutPick ?? await pickNextOpportunity(clientId, {
      state: client.default_state,
      cities: client.target_cities ? JSON.parse(client.target_cities) : undefined
    });
    city  = pick.city;
    state = pick.state;
    niche = pick.niche;
  }

  if (!city || !state || !niche) {
    toast('Please fill in state, city, and niche', 'warning'); return;
  }

  // ── Duplicate run guard (24h cooldown) ──────────────────────
  const recentRuns = window._recentRuns || [];
  const dupRun = recentRuns.find(r =>
    r.niche?.toLowerCase() === niche.toLowerCase() &&
    r.city?.toLowerCase() === city.toLowerCase()
  );
  if (dupRun) {
    const elapsed = Math.round((Date.now() - new Date(dupRun.created_at).getTime()) / 60000);
    const dupWarn = document.getElementById('dupWarning');
    const dupText = document.getElementById('dupWarningText');
    if (dupWarn && dupText) {
      dupText.textContent = `You already ran "${niche}" in "${city}" ${elapsed} minutes ago. Running again will just create duplicates. Choose a different niche or city, or wait 24 hours.`;
      dupWarn.style.display = 'block';
      dupWarn.scrollIntoView({ behavior:'smooth', block:'center' });
    }
    toast(`⚠️ Already ran ${niche} in ${city} (${elapsed}min ago) — change niche/city`, 'warning');
    return;
  }
  // Hide warning if user changed the niche/city
  const dupWarn = document.getElementById('dupWarning');
  if (dupWarn) dupWarn.style.display = 'none';

  const maxItems = parseInt(document.getElementById('maxItemsRange')?.value ?? '20', 10);
  _stopRequested = false;
  const btn     = document.getElementById('runBtn');
  const stopBtn = document.getElementById('stopBtn');
  btn.disabled = true;
  btn.textContent = _sourceMode === 'apify' ? 'Searching Apify…' : 'Starting…';
  if (stopBtn) { stopBtn.style.display = 'block'; stopBtn.disabled = false; stopBtn.textContent = '⏹'; }

  // Create run record
  const run = await createRun({
    client_id: clientId, city: city || 'AUTO', state: state || 'AUTO',
    niche: niche || 'AUTO', status: 'running', auto_mode: autoMode,
    started_at: new Date().toISOString()
  });
  activeRunId = run.id;

  document.getElementById('runStats').style.display = 'block';
  document.getElementById('runStatus').textContent = 'running';
  document.getElementById('runStatus').className = 'status-pill status-running';

  // Subscribe to pipeline run updates
  subscription = subscribeToRun(run.id, onRunUpdate);

  // Subscribe to Claude chat messages for this run
  subscribeToChat(run.id);

  // ── Multi-call orchestration: discover → enrich each → finish ──
  const EDGE = 'https://ndwvsrtyjnaddrifafqk.supabase.co/functions/v1/run-pipeline';
  const authHeader = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${(await getSession())?.access_token}` };

  const callEdge = async (payload) => {
    const r = await fetch(EDGE, { method:'POST', headers: authHeader, body: JSON.stringify(payload) });
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    return data;
  };

  try {
    // STEP 1 — Discover businesses (single fast call ~10s)
    btn.textContent = 'Searching Apify…';
    const discovery = await callEdge({ mode:'discover', run_id: run.id, client_id: clientId, city, state, niche, max_items: maxItems });
    const businesses = discovery.businesses || [];

    if (!businesses.length) throw new Error('No businesses found — try a different city or niche');

    appendChatMsg({ role:'system', type:'info', message:`🚀 Found ${businesses.length} businesses — processing one by one…`, created_at: new Date().toISOString() });

    // STEP 2 — Enrich each business one at a time (separate call per business, ~15s each)
    let savedCount = 0;
    let totalScore = 0;

    for (let i = 0; i < businesses.length; i++) {
      if (_stopRequested) {
        appendChatMsg({ role:'system', type:'warning', message:`⏹ Stopped at ${i}/${businesses.length} — ${savedCount} leads saved.`, created_at: new Date().toISOString() });
        break;
      }
      const biz = businesses[i];
      btn.textContent = `Processing ${i+1}/${businesses.length}…`;

      try {
        const result = await callEdge({
          mode: 'enrich',
          run_id: run.id,
          client_id: clientId,
          city, state, niche,
          business_name: biz.name,
          website:       biz.website       ?? null,
          email:         biz.email         ?? null,   // from Apify contact enrichment
          phone:         biz.phone         ?? null,
          address:       biz.address       ?? null,
          google_rating: biz.google_rating ?? null,
          review_count:  biz.review_count  ?? null,
        });

        if (result.saved) {
          savedCount++;
          totalScore += result.score || 0;

          // STEP 2b — Generate demo website for each saved lead
          try {
            await fetch('https://ndwvsrtyjnaddrifafqk.supabase.co/functions/v1/generate-site', {
              method:'POST', headers: authHeader,
              body: JSON.stringify({ lead_id: result.lead_id, client_id: clientId })
            });
          } catch(_) { /* non-critical */ }
        }
      } catch(enrichErr) {
        console.warn('Enrich failed for', biz.name, enrichErr.message);
        appendChatMsg({ role:'system', type:'warning', message:`⚠️ Skipped ${biz.name}: ${enrichErr.message}`, created_at: new Date().toISOString() });
      }
    }

    // STEP 3 — Finish: save niche memory + mark complete
    btn.textContent = 'Finishing…';
    await callEdge({
      mode: 'finish',
      run_id: run.id,
      client_id: clientId,
      city, state, niche,
      leads_saved: savedCount,
      avg_score: savedCount > 0 ? Math.round(totalScore / savedCount) : 0,
    });

  } catch (e) {
    toast(e.message, 'error');
    await updateRun(run.id, { status: 'error', error_message: e.message });
    onRunUpdate({ ...run, status: 'error' });
  } finally {
    btn.disabled = false;
    btn.innerHTML = _sourceMode === 'apify' ? '🗺️ Start Apify Search' : '⚡ Run AI Pipeline';
    const stopBtn = document.getElementById('stopBtn');
    if (stopBtn) { stopBtn.style.display = 'none'; stopBtn.disabled = false; stopBtn.textContent = '⏹'; }
    _stopRequested = false;
  }
};

function onRunUpdate(run) {
  document.getElementById('nodeList').innerHTML = nodeProgress(run.current_node, run.status);
  document.getElementById('sLeads').textContent     = run.leads_found     ?? 0;
  document.getElementById('sQualified').textContent = run.leads_qualified ?? 0;
  document.getElementById('sEmails').textContent    = run.emails_found    ?? 0;
  document.getElementById('sSent').textContent      = run.emails_sent     ?? 0;
  document.getElementById('runStatus').textContent  = run.status;
  document.getElementById('runStatus').className    = `status-pill status-${run.status}`;

  appendLog(`[${run.current_node ?? run.status}] leads:${run.leads_found ?? 0} qualified:${run.leads_qualified ?? 0}`);

  if (run.status === 'paused_approval') {
    document.getElementById('approvalBanner').style.display = 'block';
    document.getElementById('runBtn').disabled = false;
    document.getElementById('runBtn').textContent = '⚡ Run Pipeline';
    const pill   = document.getElementById('brainPill');
    const bstatus = document.getElementById('brainStatus');
    if (pill)    { pill.textContent = 'DONE'; pill.style.cssText = 'margin-left:auto;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;background:rgba(16,185,129,.15);color:#34d399;border:1px solid rgba(16,185,129,.3)'; }
    if (bstatus) bstatus.textContent = 'Waiting for your approval…';
    toast('Super Brain done — review leads and approve outreach', 'warning');
  }

  if (run.status === 'completed' || run.status === 'completed_empty' || run.status === 'error') {
    subscription?.unsubscribe();
    chatSub?.unsubscribe();
    const rb = document.getElementById('runBtn');
    if (rb) { rb.disabled = false; rb.innerHTML = _sourceMode === 'apify' ? '🗺️ Start Apify Search' : '⚡ Run AI Pipeline'; }
    const sb = document.getElementById('stopBtn');
    if (sb) { sb.style.display = 'none'; }
    const msg = run.status === 'error' ? run.error_message : `Done! ${run.emails_sent ?? 0} emails queued.`;
    toast(msg, run.status === 'error' ? 'error' : 'success');
  }
}

function appendLog(msg) {
  // kept for compatibility — no longer shown (chat panel replaces it)
}

// ── Claude Super Brain chat ──────────────────────────────────────
import { supabase as _sb } from '/shared/auth.js';
let chatSub = null;

function subscribeToChat(runId) {
  const pill   = document.getElementById('brainPill');
  const status = document.getElementById('brainStatus');
  if (pill)   { pill.textContent = '● LIVE'; pill.style.cssText += ';background:rgba(139,92,246,.2);color:#c4b5fd;border:1px solid rgba(139,92,246,.3)'; }
  if (status) status.textContent = 'Running…';

  chatSub = _sb.channel('rt-pipeline-chat-' + runId)
    .on('postgres_changes', {
      event: 'INSERT', schema: 'public', table: 'pipeline_chat',
      filter: `run_id=eq.${runId}`
    }, payload => {
      appendChatMsg(payload.new);
    })
    .subscribe();
}

const TYPE_STYLE = {
  info:    { bg: 'rgba(99,102,241,.1)',   border: 'rgba(99,102,241,.25)',   icon: '💬', color: '#a5b4fc' },
  success: { bg: 'rgba(16,185,129,.1)',   border: 'rgba(16,185,129,.25)',   icon: '✅', color: '#6ee7b7' },
  warning: { bg: 'rgba(245,158,11,.1)',   border: 'rgba(245,158,11,.25)',   icon: '⚠️', color: '#fcd34d' },
  insight: { bg: 'rgba(139,92,246,.12)',  border: 'rgba(139,92,246,.3)',    icon: '💡', color: '#c4b5fd' },
  error:   { bg: 'rgba(239,68,68,.1)',    border: 'rgba(239,68,68,.25)',    icon: '❌', color: '#fca5a5' },
  user:    { bg: 'rgba(255,255,255,.05)', border: 'rgba(255,255,255,.1)',   icon: '👤', color: '#94a3b8' }
};

function appendChatMsg(row) {
  const feed = document.getElementById('chatFeed');
  if (!feed) return;

  // Clear placeholder if first message
  if (feed.querySelector('[data-placeholder]')) feed.innerHTML = '';

  const s    = row.role === 'user' ? TYPE_STYLE.user : (TYPE_STYLE[row.type] ?? TYPE_STYLE.info);
  const time = new Date(row.created_at ?? Date.now()).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

  const div = document.createElement('div');
  div.style.cssText = `
    background:${s.bg}; border:1px solid ${s.border}; border-radius:10px; padding:10px 12px;
    ${row.role === 'user' ? 'margin-left:20px;' : ''}
  `;
  div.innerHTML = `
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px">
      <span style="font-size:14px">${s.icon}</span>
      <span style="font-size:11px;font-weight:700;color:${s.color}">${row.role === 'user' ? 'You' : 'Super Brain'}</span>
      <span style="font-size:10px;color:#334155;margin-left:auto">${time}</span>
    </div>
    <div style="font-size:13px;color:#cbd5e1;line-height:1.5">${row.message.replace(/\n/g,'<br>')}</div>
  `;
  feed.appendChild(div);
  feed.scrollTop = feed.scrollHeight;
}

// User sends a message to the Super Brain
window.sendUserMessage = async function() {
  const input   = document.getElementById('userMsgInput');
  const text    = input?.value?.trim();
  if (!text || !activeRunId) return;

  input.value = '';

  // Save user message to pipeline_chat
  await _sb.from('pipeline_chat').insert({
    run_id:    activeRunId,
    client_id: clientId,
    role:      'user',
    message:   text,
    type:      'info'
  });

  // Show immediately (Realtime will also echo it, that's ok — deduplicate by checking)
  appendChatMsg({ role: 'user', message: text, type: 'info', created_at: new Date().toISOString() });
};

// Restore chat history when page loads (if a run was in progress)
async function loadChatHistory(runId) {
  const { data: msgs } = await _sb.from('pipeline_chat')
    .select('*').eq('run_id', runId).order('created_at');
  const feed = document.getElementById('chatFeed');
  if (msgs?.length) { feed.innerHTML = ''; msgs.forEach(appendChatMsg); }
}
</script>
