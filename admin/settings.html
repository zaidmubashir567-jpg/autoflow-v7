<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Settings — AutoFlow</title></head>
<body><div id="app">Loading…</div>
<script type="module">
import { requireAuth, getClientId } from '/shared/auth.js';
import { adminNav, injectSharedCSS, toast } from '/shared/ui.js';
import { getClient, updateClient } from '/shared/db.js';

// Quick connection status badges for settings page
const QUICK_SERVICES = [
  { label:'Google',   field:'gmail_access',  color:'#4285F4', logo:'https://www.google.com/favicon.ico' },
  { label:'Gemini',   field:'gemini_key',    color:'#1967D2', logo:'https://www.gstatic.com/lamda/images/gemini_favicon_f069958c85030456e93de685481c559f160ea06.svg' },
  { label:'Hunter',   field:'hunter_key',    color:'#F97316', logo:'https://hunter.io/favicon.ico' },
  { label:'Apollo',   field:'apollo_key',    color:'#6366F1', logo:'https://app.apollo.io/favicon.ico' },
  { label:'Twilio',   field:'twilio_sid',    color:'#F22F46', logo:'https://www.twilio.com/favicon.ico' },
  { label:'Lob',      field:'lob_key',       color:'#0069FF', logo:'https://www.lob.com/favicon.ico' },
  { label:'Vercel',   field:'vercel_token',  color:'#000',    logo:'https://vercel.com/favicon.ico' },
];

injectSharedCSS();
await requireAuth('admin');
const clientId = await getClientId();
const client = await getClient(clientId);

document.getElementById('app').innerHTML = `
  ${adminNav('Settings')}
  <main class="main">
    <div class="page-header"><h1 class="page-title">Settings</h1>
      <p class="page-sub">Pipeline behaviour, outreach limits, AI model selection</p>
    </div>
    <div class="page-body" style="max-width:580px">

      <div class="card" style="margin-bottom:16px">
        <div class="card-title">AI Model</div>
        <p style="font-size:13px;color:var(--color-text-muted);margin-bottom:12px">All 15 pipeline personas use this model. Switch anytime — takes effect on next run.</p>
        <div style="background:var(--color-surface);border-radius:8px;padding:12px;margin-bottom:10px">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
            <img src="https://anthropic.com/favicon.ico" width="16" height="16" style="border-radius:3px">
            <strong style="font-size:14px">Claude (Anthropic)</strong>
            <span style="font-size:11px;padding:2px 8px;border-radius:8px;background:#D1FAE5;color:#065F46;font-weight:600">Active</span>
          </div>
          <div style="font-size:12px;color:var(--color-text-muted)">All 15 pipeline personas run on Claude. Tasks are auto-tiered:</div>
          <div style="font-size:12px;color:var(--color-text-muted);margin-top:4px">
            ⚡ <strong>Haiku</strong> — bulk email copy, scoring, follow-ups (fast + cheap)<br>
            ✨ <strong>Sonnet</strong> — reply drafts, proposals, learn engine (quality)
          </div>
        </div>
        <select id="aiModel" style="width:100%;padding:10px;border:1px solid var(--color-border);border-radius:6px;font-size:14px">
          <option value="claude-haiku-default" ${!client.ai_model || client.ai_model==='claude-haiku-default'?'selected':''}>Auto-tier (Haiku for bulk · Sonnet for quality) — recommended</option>
          <option value="claude-sonnet-4-6"    ${client.ai_model==='claude-sonnet-4-6'?'selected':''}>Force Sonnet everywhere (best quality, higher cost)</option>
          <option value="claude-haiku-4-5-20251001" ${client.ai_model==='claude-haiku-4-5-20251001'?'selected':''}>Force Haiku everywhere (fastest, lowest cost)</option>
        </select>
      </div>

      <div class="card" style="margin-bottom:16px">
        <div class="card-title">Outreach Limits</div>
        <div class="form-row">
          <label>Daily email send cap</label>
          <div style="display:flex;align-items:center;gap:10px">
            <input type="range" id="dailyCap" min="1" max="100" value="${client.daily_email_cap??20}"
              oninput="document.getElementById('capVal').textContent=this.value" style="flex:1">
            <span id="capVal" style="font-weight:700;width:32px;text-align:center">${client.daily_email_cap??20}</span>
          </div>
          <div style="font-size:12px;color:var(--color-text-muted)">Priority order: FU3 → FU2 → FU1 → new (Twin pattern)</div>
        </div>
      </div>

      <div class="card" style="margin-bottom:16px">
        <div class="card-title">Appearance</div>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div><strong>Dark Mode</strong><div style="font-size:12px;color:var(--color-text-muted)">Easier on the eyes at night</div></div>
          <label class="toggle-switch">
            <input type="checkbox" id="darkToggle" ${document.documentElement.dataset.theme==='dark'?'checked':''}
              onchange="toggleDark(this.checked)">
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>

      <!-- Connected accounts quick-view -->
      <div class="card" style="margin-bottom:16px" id="connCard">
        <div class="card-title">Connected Accounts</div>
        <p style="font-size:13px;color:var(--color-text-muted);margin:0 0 12px">
          Connect Google, Hunter.io, Twilio and other services to activate pipeline channels.
        </p>
        <div id="connQuick" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px"></div>
        <a href="/admin/credentials.html" class="btn btn-primary" style="text-decoration:none;display:inline-block">
          Manage Connected Accounts →
        </a>
      </div>

      <button class="btn btn-primary" onclick="saveSettings()" style="width:100%;padding:12px;font-size:15px">
        💾 Save Settings
      </button>
    </div>
  </main>`;

// Render quick connection badges
if (document.getElementById('connQuick')) {
  document.getElementById('connQuick').innerHTML = QUICK_SERVICES.map(s => {
    const connected = !!client[s.field];
    return `<div style="display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;
              border:1px solid ${connected ? s.color : 'var(--color-border)'};
              background:${connected ? s.color+'15' : 'var(--color-surface)'}">
      <img src="${s.logo}" width="13" height="13" style="border-radius:2px" onerror="this.style.display='none'">
      <span style="font-size:12px;font-weight:600;color:${connected ? s.color : 'var(--color-text-muted)'}">
        ${s.label}
      </span>
      <span style="font-size:10px;color:${connected ? '#10B981' : 'var(--color-text-muted)'}">
        ${connected ? '✓' : '—'}
      </span>
    </div>`;
  }).join('');
}

window.toggleDark = function(on) {
  document.documentElement.dataset.theme = on ? 'dark' : '';
  localStorage.setItem('af7-theme', on ? 'dark' : '');
};
// Apply saved theme
const savedTheme = localStorage.getItem('af7-theme');
if (savedTheme) document.documentElement.dataset.theme = savedTheme;

window.saveSettings = async function() {
  await updateClient(clientId, {
    ai_model: document.getElementById('aiModel').value,
    daily_email_cap: parseInt(document.getElementById('dailyCap').value)
  });
  toast('Settings saved ✓', 'success');
};
</script>
<style>
  .form-row{margin-bottom:14px;display:flex;flex-direction:column;gap:6px}
  .form-row label{font-size:13px;font-weight:600;color:var(--color-text-muted)}
  .toggle-switch{position:relative;width:44px;height:24px;flex-shrink:0}
  .toggle-switch input{opacity:0;width:0;height:0}
  .toggle-slider{position:absolute;inset:0;background:var(--color-border);border-radius:12px;cursor:pointer;transition:.2s}
  .toggle-switch input:checked+.toggle-slider{background:var(--color-accent)}
  .toggle-slider::before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
  .toggle-switch input:checked+.toggle-slider::before{transform:translateX(20px)}
</style>
</body></html>
