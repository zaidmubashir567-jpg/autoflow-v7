<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Websites — LeadFyn</title>
  <link rel="preconnect" href="https://ndwvsrtyjnaddrifafqk.supabase.co" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="modulepreload" href="/shared/auth.js">
  <link rel="modulepreload" href="/shared/ui.js">
  <link rel="modulepreload" href="/shared/db.js">
  <link rel="modulepreload" href="/shared/api.js">  <link rel="stylesheet" href="/shared/leadfyn-theme.css">
</head>
<body><div id="app">Loading…</div>
<script type="module">
  import { injectLeadFynTheme } from '/shared/ui.js';
  injectLeadFynTheme();
import { requireAuth, getClientId } from '/shared/auth.js';
import { adminNav, injectSharedCSS, toast, dataTable } from '/shared/ui.js';
import { supabase } from '/shared/auth.js';
injectSharedCSS(); await requireAuth('admin'); const clientId = await getClientId();
document.getElementById('app').innerHTML = `${adminNav('Websites')}<main class="main">
  <div class="page-header"><h1 class="page-title">Websites</h1><p class="page-sub">Sofia-generated redesigns deployed to Vercel</p></div>
  <div class="page-body"><div class="card" id="wTable">Loading…</div></div></main>`;
// BUG FIX: generate-site saves to leads.demo_url, NOT a separate 'websites' table
const { data } = await supabase
  .from('leads')
  .select('id, business_name, city, niche, demo_url, updated_at')
  .eq('client_id', clientId)
  .not('demo_url', 'is', null)
  .order('updated_at', {ascending: false});
const cols = [
  {key:'business_name',label:'Business',render:(v,row)=>`<div style="font-weight:600">${v??'—'}</div><div style="font-size:11px;color:var(--color-text-muted)">${row?.city??''} · ${row?.niche??''}</div>`},
  {key:'demo_url',label:'Status',render:v=>v?`<span class="ds-deployed">deployed</span>`:`<span class="ds-pending">pending</span>`},
  {key:'demo_url',label:'URL',render:v=>v?`<a href="${v}" target="_blank" style="font-size:13px;color:var(--color-accent)">${v}</a>`:'—'},
  {key:'updated_at',label:'Generated',render:v=>new Date(v).toLocaleDateString()}
];
document.getElementById('wTable').innerHTML = dataTable(cols, data??[], {emptyMsg:'No websites yet — run a pipeline to generate redesigns.', colCount:4});
</script>
<style>.ds-deployed{color:var(--color-success);font-weight:600}.ds-pending{color:var(--color-warning);font-weight:600}.ds-failed{color:var(--color-danger);font-weight:600}</style>
</body></html>
