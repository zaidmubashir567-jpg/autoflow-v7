<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Dashboard — LeadFyn Portal</title>
  <link rel="preconnect" href="https://ndwvsrtyjnaddrifafqk.supabase.co" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="modulepreload" href="/shared/auth.js">
  <link rel="modulepreload" href="/shared/ui.js">
  <link rel="modulepreload" href="/shared/db.js">
  <link rel="modulepreload" href="/shared/api.js">

  <!-- ── 3D DARK OVERRIDES ───────────────────────────────── -->
  <style>
    :root {
      --d-bg:      #060614;
      --d-surface: #0d0d2b;
      --d-card:    rgba(255,255,255,0.04);
      --d-border:  rgba(255,255,255,0.09);
      --d-border2: rgba(99,102,241,0.35);
      --d-accent:  #6366f1;
      --d-accent2: #818cf8;
      --d-glow:    0 0 40px rgba(99,102,241,.18);
      --d-shadow:  0 8px 32px rgba(0,0,0,.55);
    }

    body {
      background: var(--d-bg) !important;
      background-image:
        radial-gradient(ellipse 55% 45% at 75% -5%, rgba(139,92,246,.12), transparent),
        radial-gradient(ellipse 40% 35% at 10% 85%, rgba(99,102,241,.08), transparent) !important;
      background-attachment: fixed !important;
    }
    [data-theme="dark"] {
      --color-bg:         var(--d-bg);
      --color-surface:    var(--d-surface);
      --color-border:     var(--d-border);
      --color-text:       #f1f5f9;
      --color-text-muted: #94a3b8;
      --color-accent:     var(--d-accent);
    }

    /* ── Sidebar ── */
    .sidebar {
      background: rgba(6,6,20,0.95) !important;
      border-right: 1px solid var(--d-border);
      backdrop-filter: blur(20px);
      box-shadow: 4px 0 24px rgba(0,0,0,.4);
    }
    .sidebar-brand { border-bottom: 1px solid var(--d-border) !important; }
    .brand-icon { font-size: 22px; filter: drop-shadow(0 0 8px rgba(99,102,241,.6)); }
    .nav-item.active {
      background: rgba(99,102,241,.15) !important;
      border-left-color: var(--d-accent) !important;
    }
    .nav-item:hover { background: rgba(255,255,255,.05) !important; }

    /* ── Stat cards 3D ── */
    .stat-card {
      background: var(--d-card) !important;
      border: 1px solid var(--d-border) !important;
      border-radius: 14px !important;
      backdrop-filter: blur(16px);
      box-shadow: var(--d-shadow), inset 0 1px 0 rgba(255,255,255,.07) !important;
      transform: perspective(600px) rotateX(3deg);
      transition: transform .3s ease, box-shadow .3s ease, border-color .3s !important;
      position: relative; overflow: hidden;
    }
    .stat-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(99,102,241,.5), transparent);
    }
    .stat-card:hover {
      transform: perspective(600px) rotateX(0deg) translateY(-6px) !important;
      box-shadow: var(--d-shadow), var(--d-glow), inset 0 1px 0 rgba(255,255,255,.12) !important;
      border-color: var(--d-border2) !important;
    }
    .stat-value {
      font-size: 32px !important; font-weight: 900 !important;
      background: linear-gradient(135deg, #fff, var(--d-accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .stat-icon { font-size: 26px !important; filter: drop-shadow(0 2px 6px rgba(99,102,241,.4)); }

    /* ── Activity card ── */
    .card {
      background: var(--d-card) !important;
      border: 1px solid var(--d-border) !important;
      border-radius: 14px !important;
      backdrop-filter: blur(16px);
      box-shadow: var(--d-shadow), inset 0 1px 0 rgba(255,255,255,.05) !important;
    }
    .card-title { color: #f1f5f9 !important; font-weight: 700 !important;
                  padding-bottom: 12px; border-bottom: 1px solid var(--d-border); margin-bottom: 16px !important; }

    /* ── Page header ── */
    .page-title { font-size: 24px !important; font-weight: 900 !important; }

    /* ── Welcome banner ── */
    .welcome-banner {
      background: linear-gradient(135deg, rgba(99,102,241,.12), rgba(139,92,246,.07));
      border: 1px solid rgba(99,102,241,.25);
      border-radius: 16px; padding: 20px 24px; margin-bottom: 24px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
      backdrop-filter: blur(16px);
      box-shadow: 0 4px 20px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.08);
    }
    .wb-left h2 { font-size: 18px; font-weight: 800; color: #f1f5f9; margin-bottom: 4px; }
    .wb-left p  { font-size: 13px; color: #94a3b8; }
    .wb-badge   { background: rgba(16,185,129,.15); color: #34d399; border: 1px solid rgba(16,185,129,.25);
                  font-size: 11px; font-weight: 700; padding: 4px 12px; border-radius: 20px; white-space: nowrap; }

    /* ── Activity rows ── */
    .act-row { display: flex; justify-content: space-between; align-items: center;
               padding: 10px 8px; border-bottom: 1px solid var(--d-border);
               border-radius: 8px; transition: background .15s; }
    .act-row:hover { background: rgba(99,102,241,.06); }
    .act-row:last-child { border-bottom: none; }

    /* ── Skeleton ── */
    .skeleton-line {
      background: linear-gradient(90deg, rgba(255,255,255,.04) 25%, rgba(255,255,255,.08) 50%, rgba(255,255,255,.04) 75%) !important;
      background-size: 200% 100% !important;
      animation: shimmer 1.5s infinite !important;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ── Loader ── */
    #af-loader { background: linear-gradient(90deg, var(--d-accent), #a78bfa) !important; }

    /* ── Ambient glow ── */
    .main::before {
      content: ''; position: fixed; width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(99,102,241,.05) 0%, transparent 70%);
      top: 20%; right: 8%; pointer-events: none; border-radius: 50%; z-index: 0;
    }
    .main { position: relative; z-index: 1; }

    /* ── Claude status card ── */
    .claude-card {
      background: linear-gradient(135deg, rgba(99,102,241,.08), rgba(139,92,246,.05));
      border: 1px solid rgba(99,102,241,.2);
      border-radius: 14px; padding: 20px 24px; margin-top: 20px;
      backdrop-filter: blur(16px);
      box-shadow: 0 4px 20px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.06);
    }
    .claude-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .claude-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; box-shadow: 0 0 16px rgba(99,102,241,.4);
      flex-shrink: 0;
    }
    .claude-pulse {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #6366f1;
      animation: cpulse 1.6s infinite; margin-right: 6px;
    }
    .claude-pulse.idle { background: #475569; animation: none; }
    @keyframes cpulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(.7)} }
    .client-brain-feed {
      max-height: 180px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px;
      scrollbar-width: thin; scrollbar-color: rgba(99,102,241,.3) transparent;
    }
    .client-brain-feed::-webkit-scrollbar { width: 3px; }
    .client-brain-feed::-webkit-scrollbar-thumb { background: rgba(99,102,241,.3); border-radius: 3px; }
    .cbmsg {
      font-size: 12.5px; line-height: 1.5; color: #c7d2fe;
      padding: 6px 10px; border-radius: 8px;
      background: rgba(255,255,255,.03); border-left: 2px solid rgba(99,102,241,.4);
    }
    .cbmsg.success { border-color: #10b981; color: #6ee7b7; }
    .cbmsg.insight { border-color: #f472b6; color: #fbcfe8; }
  </style>
</head>
<body>
<div id="app">Loading…</div>

<script type="module">
import { requireAuth, getClientId } from '/shared/auth.js';
import { clientNav, injectSharedCSS, statCard, skeleton } from '/shared/ui.js';
import { getRecentRuns, getLeads, getRunHistory } from '/shared/db.js';
import { supabase } from '/shared/auth.js';

injectSharedCSS();
const auth = await requireAuth('client');
const clientId = await getClientId();
const { data: clientRow } = await supabase.from('clients').select('name,plan').eq('portal_user_id', auth.user.id).single();

const planColor = clientRow?.plan === 'pro' ? '#818cf8' : clientRow?.plan === 'agency' ? '#f59e0b' : '#64748b';
const planLabel = clientRow?.plan ? clientRow.plan.toUpperCase() : 'FREE';

document.getElementById('app').innerHTML = `
  ${clientNav('Dashboard')}
  <main class="main">
    <div class="page-header">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <h1 class="page-title">Welcome back${clientRow?.name ? ', ' + clientRow.name : ''} 👋</h1>
        <span id="rt-pill-client" style="font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;
              background:rgba(16,185,129,.15);color:#34d399;border:1px solid rgba(16,185,129,.25);transition:color .4s">● LIVE</span>
      </div>
      <p class="page-sub">Your LeadFyn campaign results — updated in real time</p>
    </div>
    <div class="page-body">

      <!-- Welcome Banner -->
      <div class="welcome-banner">
        <div class="wb-left">
          <h2>🤖 LeadFyn is running your pipeline</h2>
          <p>Leads are being found, scored, and emailed on your behalf. Check your stats below.</p>
        </div>
        <span class="wb-badge" style="background:rgba(99,102,241,.15);color:${planColor};border-color:rgba(99,102,241,.25)">
          ${planLabel} PLAN
        </span>
      </div>

      <!-- Stats -->
      <div class="stats-grid" id="statsGrid" style="margin-bottom:24px">${skeleton(1)}</div>

      <!-- Activity -->
      <div class="card">
        <div class="card-title">📋 Recent Campaign Activity</div>
        <div id="activity">${skeleton(3)}</div>
      </div>

      <!-- Claude Super Brain status -->
      <div class="claude-card">
        <div class="claude-header">
          <div class="claude-avatar">🧠</div>
          <div>
            <div style="font-size:14px;font-weight:700;color:#f1f5f9">Claude Super Brain</div>
            <div style="font-size:12px;color:#94a3b8">
              <span class="claude-pulse idle" id="cpulse"></span>
              <span id="claude-status-text">Idle — waiting for next run</span>
            </div>
          </div>
          <span id="claude-pill" style="margin-left:auto;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;
                background:rgba(71,85,105,.2);color:#94a3b8;border:1px solid rgba(71,85,105,.3);white-space:nowrap">● IDLE</span>
        </div>
        <div class="client-brain-feed" id="clientBrainFeed">
          <div class="cbmsg" style="color:var(--color-text-muted)">
            Claude will report its findings here when running your campaign.
          </div>
        </div>
      </div>

    </div>
  </main>`;

const [runs, history] = await Promise.all([
  getRecentRuns(clientId, 5).catch(() => []),
  getRunHistory(clientId, 10).catch(() => [])
]);

const totalLeads     = history.reduce((s,r) => s + (r.leads_found ?? 0), 0);
const totalQualified = history.reduce((s,r) => s + (r.leads_qualified ?? 0), 0);
const avgContact     = history.length
  ? (history.reduce((s,r) => s + (r.contact_rate ?? 0), 0) / history.length).toFixed(1) : 0;

function renderStats(hist, runList) {
  const tl = hist.reduce((s,r) => s + (r.leads_found ?? 0), 0);
  const tq = hist.reduce((s,r) => s + (r.leads_qualified ?? 0), 0);
  const ac = hist.length ? (hist.reduce((s,r) => s + (r.contact_rate ?? 0), 0) / hist.length).toFixed(1) : 0;
  document.getElementById('statsGrid').innerHTML = [
    statCard('Leads Found',   tl,          'all campaigns', '👥'),
    statCard('Qualified',     tq,          'score ≥ 6',     '✅'),
    statCard('Contact Rate',  ac + '%',    'emails + DMs',  '📡'),
    statCard('Campaigns Run', runList.length, 'total runs', '⚡'),
  ].join('');
}
renderStats(history, runs);

// ── Real-time: re-render stats + activity on any pipeline change ──
import { supabase as _sb } from '/shared/auth.js';
_sb.channel('rt-client-dash')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'pipeline_runs', filter: `client_id=eq.${clientId}` }, async () => {
    const [freshRuns, freshHist] = await Promise.all([
      getRecentRuns(clientId, 5).catch(() => []),
      getRunHistory(clientId, 10).catch(() => [])
    ]);
    renderStats(freshHist, freshRuns);
    renderActivity(freshRuns);
    const pill = document.getElementById('rt-pill-client');
    if (pill) { pill.style.color = '#10b981'; setTimeout(() => { pill.style.color = '#34d399'; }, 1200); }
  })
  .subscribe();

function renderActivity(runList) {
  document.getElementById('activity').innerHTML = runList.length === 0
  ? `<p style="color:var(--color-text-muted);font-size:14px;padding:12px 0">No campaigns yet. Your team is setting things up — check back soon! 🚀</p>`
  : runList.map(r => {
      const contactPct = r.contact_rate ? r.contact_rate.toFixed(1) + '%' : '—';
      const dotColor   = r.status === 'completed' ? '#10b981' : r.status === 'running' ? '#6366f1' : '#f59e0b';
      return `<div class="act-row">
        <div style="display:flex;align-items:center;gap:12px">
          <span style="width:8px;height:8px;border-radius:50%;background:${dotColor};flex-shrink:0;box-shadow:0 0 8px ${dotColor}"></span>
          <div>
            <div style="font-size:14px;font-weight:600;color:#f1f5f9">${r.city}, ${r.state} · ${r.niche}</div>
            <div style="font-size:12px;color:var(--color-text-muted)">${new Date(r.created_at).toLocaleDateString()}</div>
          </div>
        </div>
        <div style="text-align:right">
          <div style="font-size:13px;color:#f1f5f9;font-weight:600">${r.leads_found ?? 0} leads</div>
          <div style="font-size:11px;color:var(--color-text-muted)">${contactPct} contact</div>
        </div>
      </div>`;
    }).join('');
}
renderActivity(runs);

// ── Claude Super Brain live status ────────────────────────────
(async () => {
  try {
    const latestRun = runs[0];
    if (latestRun) {
      // Load recent chat messages for this run
      const { data: chatRows } = await _sb.from('pipeline_chat')
        .select('*')
        .eq('run_id', latestRun.id)
        .order('created_at', { ascending: false })
        .limit(10);

      if (chatRows && chatRows.length > 0) {
        const feed = document.getElementById('clientBrainFeed');
        if (feed) {
          feed.innerHTML = '';
          chatRows.reverse().forEach(addClientBrainMsg);
          feed.scrollTop = feed.scrollHeight;
        }
        if (['running', 'paused_approval'].includes(latestRun.status)) {
          setClaudeStatus(latestRun.agent_message || 'Working on your leads…', latestRun.status === 'running');
        }
      }

      // Subscribe to realtime updates
      _sb.channel('client-brain-' + clientId)
        .on('postgres_changes', {
          event: 'INSERT', schema: 'public', table: 'pipeline_chat',
          filter: `client_id=eq.${clientId}`
        }, payload => {
          addClientBrainMsg(payload.new);
          const feed = document.getElementById('clientBrainFeed');
          if (feed) feed.scrollTop = feed.scrollHeight;
        })
        .on('postgres_changes', {
          event: 'UPDATE', schema: 'public', table: 'pipeline_runs',
          filter: `client_id=eq.${clientId}`
        }, payload => {
          const run = payload.new;
          if (run.agent_message) setClaudeStatus(run.agent_message, run.status === 'running');
          if (run.status === 'paused_approval') {
            setClaudeStatus('✅ Done! Your leads are ready for review.', false);
            const pill = document.getElementById('claude-pill');
            if (pill) { pill.textContent = '✅ DONE'; pill.style.background = 'rgba(16,185,129,.15)'; pill.style.color = '#34d399'; }
          }
        })
        .subscribe();
    }
  } catch (e) { console.warn('[client brain]', e); }
})();

function addClientBrainMsg(row) {
  const feed = document.getElementById('clientBrainFeed');
  if (!feed) return;
  const placeholder = feed.querySelector('[style*="color:var(--color-text-muted)"]');
  if (placeholder) placeholder.remove();
  const cls = ['success','insight'].includes(row.type) ? row.type : '';
  const icon = { info:'ℹ️', success:'✅', warning:'⚠️', insight:'💡', error:'❌' }[row.type] || 'ℹ️';
  const time = new Date(row.created_at || Date.now()).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const div = document.createElement('div');
  div.className = 'cbmsg' + (cls ? ' ' + cls : '');
  div.innerHTML = `<span style="opacity:.5;margin-right:6px;font-size:10px">${time}</span>${icon} ${row.message}`;
  feed.appendChild(div);
}

function setClaudeStatus(msg, isRunning) {
  const text  = document.getElementById('claude-status-text');
  const pulse = document.getElementById('cpulse');
  const pill  = document.getElementById('claude-pill');
  if (text)  text.textContent  = msg;
  if (pulse) pulse.className   = isRunning ? 'claude-pulse' : 'claude-pulse idle';
  if (pill && isRunning) {
    pill.textContent = '● LIVE';
    pill.style.background = 'rgba(99,102,241,.15)';
    pill.style.color = '#818cf8';
    pill.style.borderColor = 'rgba(99,102,241,.3)';
  }
}
</script>
</body>
</html>
