<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Proposals — AutoFlow Portal</title></head>
<body><div id="app">Loading…</div>
<script type="module">
import { requireAuth, getClientId } from '/shared/auth.js';
import { clientNav, injectSharedCSS, modal, closeModal } from '/shared/ui.js';
import { supabase } from '/shared/auth.js';
injectSharedCSS(); await requireAuth('client'); const clientId = await getClientId();
document.getElementById('app').innerHTML = `${clientNav('Proposals')}<main class="main">
  <div class="page-header"><h1 class="page-title">Proposals</h1><p class="page-sub">Website redesign proposals for your leads</p></div>
  <div class="page-body" id="pBody">Loading…</div></main>`;
const { data } = await supabase.from('proposals').select('*, leads(business_name,city)').eq('client_id',clientId).order('created_at',{ascending:false});
const el = document.getElementById('pBody');
if (!data?.length) { el.innerHTML = '<div class="card" style="text-align:center;padding:40px;color:var(--color-text-muted)">No proposals yet.</div>'; }
else el.innerHTML = data.map(p=>`<div class="card" style="margin-bottom:12px;cursor:pointer" onclick="viewProposal('${p.id}')">
  <div style="display:flex;justify-content:space-between;align-items:center">
    <div><div style="font-weight:600">${p.leads?.business_name??'—'}</div>
      <div style="font-size:12px;color:var(--color-text-muted)">${p.leads?.city??''} · ${new Date(p.created_at).toLocaleDateString()}</div></div>
    <div style="text-align:right">
      ${p.price?`<div style="font-weight:700;font-size:18px">$${Number(p.price).toLocaleString()}</div>`:''}
      <span class="ps-${p.status}" style="font-size:12px">${p.status}</span>
    </div>
  </div></div>`).join('');
window.viewProposal = function(id) {
  const p = data.find(x=>x.id===id); if(!p) return;
  modal(p.leads?.business_name??'Proposal',`<pre style="white-space:pre-wrap;font-size:13px;line-height:1.6">${p.content}</pre>`,
    [{label:'Close',action:closeModal}]);
};
</script>
<style>.ps-draft{color:var(--color-text-muted)}.ps-sent{color:var(--color-accent);font-weight:600}.ps-accepted{color:var(--color-success);font-weight:600}</style>
</body></html>
