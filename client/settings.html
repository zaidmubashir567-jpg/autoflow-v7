<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Settings — LeadFyn</title>
  <link rel="preconnect" href="https://ndwvsrtyjnaddrifafqk.supabase.co" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="modulepreload" href="/shared/auth.js">
  <link rel="modulepreload" href="/shared/ui.js">
  <link rel="modulepreload" href="/shared/db.js">
  <link rel="modulepreload" href="/shared/api.js"></head>
<body><div id="app">Loading…</div>
<script type="module">
import { requireAuth, getClientId, supabase } from '/shared/auth.js';
import { clientNav, injectSharedCSS, toast } from '/shared/ui.js';
import { getClient, updateClient } from '/shared/db.js';

injectSharedCSS();
await requireAuth('client');
const clientId = await getClientId();
const client   = await getClient(clientId);
const { data:{ session } } = await supabase.auth.getSession();
const userEmail = session?.user?.email ?? '';

const googleConnected = !!client.gmail_access;

document.getElementById('app').innerHTML = `
  ${clientNav('Settings')}
  <main class="main">
    <div class="page-header">
      <h1 class="page-title">Settings</h1>
      <p class="page-sub">Manage your connected accounts and preferences.</p>
    </div>
    <div class="page-body" style="max-width:560px">

      <!-- Google Account -->
      <div class="card" style="margin-bottom:16px">
        <div class="card-title">Connected Accounts</div>
        <p style="font-size:13px;color:var(--color-text-muted);margin:0 0 16px">
          Your Google account is used to sign in and receive campaign notifications.
        </p>

        <!-- Google -->
        <div class="service-row" style="border-left:3px solid ${googleConnected ? '#4285F4' : 'var(--color-border)'}">
          <div style="display:flex;align-items:center;gap:10px">
            <img src="https://www.google.com/favicon.ico" width="20" height="20" style="border-radius:3px">
            <div style="flex:1">
              <div style="font-size:14px;font-weight:600">Google Account</div>
              <div style="font-size:12px;color:var(--color-text-muted)">Sign in and receive campaign reports</div>
            </div>
            <span style="font-size:11px;padding:3px 10px;border-radius:8px;font-weight:600;
              background:${googleConnected ? '#D1FAE5' : 'var(--color-surface)'};
              color:${googleConnected ? '#065F46' : 'var(--color-text-muted)'}">
              ${googleConnected ? 'Connected' : 'Not connected'}
            </span>
          </div>
          <div style="margin-top:10px;padding-left:30px">
            ${googleConnected
              ? `<div style="display:flex;gap:10px;align-items:center">
                   <span style="font-size:12px;color:#065F46">✓ ${userEmail}</span>
                   <button class="btn" onclick="disconnectGoogle()" style="font-size:12px;padding:5px 10px">Disconnect</button>
                 </div>`
              : `<button class="conn-btn" style="background:#4285F4" onclick="connectGoogle()">
                   <img src="https://www.google.com/favicon.ico" width="14" height="14">
                   Connect with Google
                 </button>`
            }
          </div>
        </div>
      </div>

      <!-- Appearance -->
      <div class="card" style="margin-bottom:16px">
        <div class="card-title">Appearance</div>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <strong>Dark Mode</strong>
            <div style="font-size:12px;color:var(--color-text-muted)">Easier on the eyes at night</div>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" id="darkToggle"
              ${document.documentElement.dataset.theme === 'dark' ? 'checked' : ''}
              onchange="toggleDark(this.checked)">
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>

      <!-- Account info -->
      <div class="card">
        <div class="card-title">Account</div>
        <div style="font-size:13px;color:var(--color-text-muted);display:flex;flex-direction:column;gap:6px">
          <div>Email: <strong>${userEmail}</strong></div>
          <div>Role: <strong>Client</strong></div>
        </div>
        <div style="margin-top:14px">
          <button class="btn" onclick="signOutUser()" style="font-size:13px">Sign Out</button>
        </div>
      </div>

    </div>
  </main>`;

window.connectGoogle = async function() {
  const { error } = await supabase.auth.signInWithOAuth({
    provider: 'google',
    options: {
      scopes: 'openid email profile',
      redirectTo: `${location.origin}/client/settings.html`
    }
  });
  if (error) toast('Connect failed: ' + error.message, 'error');
};

window.disconnectGoogle = async function() {
  if (!confirm('Disconnect Google account?')) return;
  await supabase.auth.signOut();
  location.href = '/';
};

window.toggleDark = function(on) {
  document.documentElement.dataset.theme = on ? 'dark' : '';
  localStorage.setItem('af7-theme', on ? 'dark' : '');
};

window.signOutUser = async function() {
  await supabase.auth.signOut();
  location.href = '/';
};

// Apply saved theme
const saved = localStorage.getItem('af7-theme');
if (saved) document.documentElement.dataset.theme = saved;
</script>

<style>
  .service-row {
    background: var(--color-bg);
    border: 1px solid var(--color-border);
    border-radius: 10px;
    padding: 14px;
  }
  .conn-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: 6px; font-size: 13px; font-weight: 600;
    border: none; cursor: pointer; color: #fff; transition: opacity .15s;
  }
  .conn-btn:hover { opacity: .85; }
  .toggle-switch { position:relative; width:44px; height:24px; flex-shrink:0; }
  .toggle-switch input { opacity:0; width:0; height:0; }
  .toggle-slider { position:absolute; inset:0; background:var(--color-border); border-radius:12px; cursor:pointer; transition:.2s; }
  .toggle-switch input:checked+.toggle-slider { background:var(--color-accent); }
  .toggle-slider::before { content:''; position:absolute; width:18px; height:18px; left:3px; top:3px;
    background:#fff; border-radius:50%; transition:.2s; }
  .toggle-switch input:checked+.toggle-slider::before { transform:translateX(20px); }
</style>
</body></html>
