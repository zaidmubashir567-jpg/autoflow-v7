<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LeadFyn — Connecting…</title>
  <style>
    body { font-family: -apple-system,sans-serif; display:flex; align-items:center;
           justify-content:center; min-height:100vh; background:#0a0a0f; }
    .box { text-align:center; }
    .spinner { width:40px; height:40px; border:3px solid #1e1e2e; border-top-color:#6366f1;
               border-radius:50%; animation:spin .7s linear infinite; margin:0 auto 16px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    p { color:#64748b; font-size:15px; }
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <p id="msg">Connecting…</p>
  </div>
  <script type="module">
    import { supabase } from '/shared/auth.js';
    import { updateClient } from '/shared/db.js';
    import { routeByRole } from '/shared/router.js';

    const msg = document.getElementById('msg');
    let _handled = false;

    async function handleGmailCallback(session) {
      // Check both localStorage (new code) and sessionStorage (legacy)
      const _gcid = localStorage.getItem('_gmail_cid') || sessionStorage.getItem('_gmail_cid');

      if (!_gcid) return false;               // not a Gmail connect — normal login
      if (!session?.provider_token) {
        // provider_token missing — log and bail to credentials so user can retry
        console.warn('[auth-callback] provider_token missing from session', session);
        msg.textContent = 'Token missing — redirecting…';
        localStorage.removeItem('_gmail_cid');
        sessionStorage.removeItem('_gmail_cid');
        setTimeout(() => { location.href = '/admin/credentials.html'; }, 1500);
        return true; // mark handled so we don't routeByRole
      }

      msg.textContent = 'Saving Gmail token…';

      // Save directly to DB right here — no sessionStorage bridge needed
      const gmailUpdate = {
        gmail_access:         session.provider_token,
        gmail_user:           session.user.email,
        gmail_token_saved_at: new Date().toISOString()
      };
      if (session.provider_refresh_token) {
        gmailUpdate.gmail_refresh = session.provider_refresh_token;
      }

      try {
        await updateClient(_gcid, gmailUpdate);
        msg.textContent = 'Gmail connected ✓';
      } catch (e) {
        console.error('[auth-callback] updateClient failed', e);
        msg.textContent = 'Save failed — redirecting…';
      }

      // Clean up markers
      localStorage.removeItem('_gmail_cid');
      sessionStorage.removeItem('_gmail_cid');
      sessionStorage.removeItem('_admin_access');
      sessionStorage.removeItem('_admin_refresh');

      setTimeout(() => { location.href = '/admin/credentials.html'; }, 800);
      return true;
    }

    // Listen for the SIGNED_IN event — fires after PKCE code exchange completes
    // (provider_token IS present at this point)
    supabase.auth.onAuthStateChange(async (event, session) => {
      if (_handled) return;
      if (event === 'SIGNED_IN' && session) {
        _handled = true;
        const gmailHandled = await handleGmailCallback(session);
        if (!gmailHandled) {
          // Normal login — route by role
          await routeByRole();
        }
      } else if (event === 'SIGNED_OUT') {
        location.href = '/';
      }
    });

    // Delayed fallback: give PKCE exchange 2s to complete
    setTimeout(async () => {
      if (_handled) return;
      const { data: { session } } = await supabase.auth.getSession();
      if (session && !_handled) {
        _handled = true;
        const gmailHandled = await handleGmailCallback(session);
        if (!gmailHandled) await routeByRole();
      }
    }, 2000);

    // Hard safety net: if nothing happens in 15s, go to credentials
    setTimeout(() => {
      if (!_handled) {
        _handled = true;
        location.href = '/admin/credentials.html';
      }
    }, 15000);
  </script>
</body>
</html>
