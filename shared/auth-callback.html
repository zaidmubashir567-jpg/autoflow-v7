<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LeadFyn — Connecting…</title>
  <style>
    body { font-family: -apple-system,sans-serif; display:flex; align-items:center;
           justify-content:center; min-height:100vh; background:#0a0a0f; }
    .box { text-align:center; }
    .spinner { width:40px; height:40px; border:3px solid #1e1e2e; border-top-color:#6366f1;
               border-radius:50%; animation:spin .7s linear infinite; margin:0 auto 16px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    p { color:#64748b; font-size:15px; }
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <p id="msg">Connecting…</p>
  </div>
  <script type="module">
    import { supabase } from '/shared/auth.js';
    import { routeByRole } from '/shared/router.js';

    const SUPABASE_URL  = 'https://ndwvsrtyjnaddrifafqk.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kd3ZzcnR5am5hZGRyaWZhZnFrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4ODMxMDgsImV4cCI6MjA5MzQ1OTEwOH0.7XoOKB74DGiXac3cfSSiyvREuWZ7qbQ2QbxE6d1rnlM';

    const msg  = document.getElementById('msg');
    let _handled = false;

    async function saveGmailToken(session, _gcid) {
      // Only save columns that are in PostgREST's schema cache
      // (gmail_user + gmail_token_saved_at are in DB but schema cache not refreshed yet)
      const body = { gmail_access: session.provider_token };
      if (session.provider_refresh_token) body.gmail_refresh = session.provider_refresh_token;

      const r = await fetch(`${SUPABASE_URL}/rest/v1/clients?id=eq.${_gcid}`, {
        method: 'PATCH',
        headers: {
          'apikey':        SUPABASE_ANON,
          'Authorization': 'Bearer ' + SUPABASE_ANON,
          'Content-Type':  'application/json'
        },
        body: JSON.stringify(body)
      });
      if (!r.ok) {
        const err = await r.text();
        throw new Error(`DB save failed ${r.status}: ${err}`);
      }
    }

    async function handleGmailCallback(session) {
      const _gcid = localStorage.getItem('_gmail_cid') || sessionStorage.getItem('_gmail_cid');
      if (!_gcid) return false;  // not a Gmail connect — normal login

      if (!session?.provider_token) {
        msg.textContent = 'Auth error — no token. Try again.';
        localStorage.removeItem('_gmail_cid');
        sessionStorage.removeItem('_gmail_cid');
        setTimeout(() => { location.href = '/admin/credentials.html'; }, 2000);
        return true;
      }

      msg.textContent = 'Saving Gmail token…';
      try {
        await saveGmailToken(session, _gcid);
        msg.textContent = 'Gmail connected ✓';
      } catch(e) {
        console.error('[auth-callback]', e);
        msg.textContent = 'Error: ' + e.message;
        // Still redirect after showing error
      }

      localStorage.removeItem('_gmail_cid');
      sessionStorage.removeItem('_gmail_cid');
      setTimeout(() => { location.href = '/admin/credentials.html'; }, 1200);
      return true;
    }

    // onAuthStateChange — fires after PKCE/implicit exchange, provider_token IS present
    supabase.auth.onAuthStateChange(async (event, session) => {
      if (_handled) return;
      if (event === 'SIGNED_IN' && session) {
        _handled = true;
        const gmailHandled = await handleGmailCallback(session);
        if (!gmailHandled) await routeByRole();
      } else if (event === 'SIGNED_OUT') {
        location.href = '/';
      }
    });

    // Fallback after 2s — gives implicit flow time to fire SIGNED_IN
    setTimeout(async () => {
      if (_handled) return;
      const { data: { session } } = await supabase.auth.getSession();
      if (session && !_handled) {
        _handled = true;
        const gmailHandled = await handleGmailCallback(session);
        if (!gmailHandled) await routeByRole();
      }
    }, 2000);

    // Hard fallback: never get stuck
    setTimeout(() => {
      if (!_handled) { _handled = true; location.href = '/admin/credentials.html'; }
    }, 15000);
  </script>
</body>
</html>
