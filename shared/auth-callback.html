<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LeadFyn — Signing in…</title>
  <style>
    body { font-family: -apple-system,sans-serif; display:flex; align-items:center;
           justify-content:center; min-height:100vh; background:#f8fafc; }
    .box { text-align:center; }
    .spinner { width:40px; height:40px; border:3px solid #e2e8f0; border-top-color:#4f46e5;
               border-radius:50%; animation:spin .7s linear infinite; margin:0 auto 16px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    p { color:#64748b; font-size:15px; }
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <p id="msg">Signing you in…</p>
  </div>
  <script type="module">
    import { supabase } from '/shared/auth.js';
    import { routeByRole } from '/shared/router.js';

    async function handleGmailCallback(session) {
      // Called when OAuth completes — if _gmail_cid is set this is a Gmail connect, not login
      const _gcid = sessionStorage.getItem('_gmail_cid');
      if (!_gcid || !session?.provider_token) return false;

      document.getElementById('msg').textContent = 'Saving Gmail token…';

      // Stash the Gmail token for credentials.html to pick up
      sessionStorage.setItem('_gmail_pending', JSON.stringify({
        cid:      _gcid,
        access:   session.provider_token,
        refresh:  session.provider_refresh_token ?? null,
        user:     session.user.email,
        saved_at: new Date().toISOString()
      }));
      sessionStorage.removeItem('_gmail_cid');

      // Restore the original admin session saved before connectGoogle() was called
      const adminAccess  = sessionStorage.getItem('_admin_access');
      const adminRefresh = sessionStorage.getItem('_admin_refresh');
      sessionStorage.removeItem('_admin_access');
      sessionStorage.removeItem('_admin_refresh');

      // Clear stale role cache so it re-validates with restored session
      ['_af_role','_af_cid','_af_uid'].forEach(k => sessionStorage.removeItem(k));

      // No session to restore needed (no-auth admin) — go straight to credentials
      location.href = '/admin/credentials.html';
      return true;
    }

    // Supabase handles the hash/code exchange automatically
    supabase.auth.onAuthStateChange(async (event, session) => {
      if (event === 'SIGNED_IN' && session) {
        const handled = await handleGmailCallback(session);
        if (!handled) await routeByRole();
      } else if (event === 'SIGNED_OUT') {
        location.href = '/';
      }
    });

    // Fallback: if already have session just route
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      const handled = await handleGmailCallback(session);
      if (!handled) await routeByRole();
    }
  </script>
</body>
</html>
